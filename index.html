    return;
  }
  // 2) Falta config del cliente
  if(!c.ghl.token||!c.ghl.locationId){
    el.innerHTML=header('<button class="btn btn-sm" onclick="openGhlProxyModal()">Conexion</button>')
      +'<div style="max-width:560px">'
      +'<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Carga el token (pit-) y el Location ID de la subcuenta de <b style="color:#fff">'+esc(c.name)+'</b> en GHL.</div>'
      +'<label style="font-size:11px;color:var(--text3)">API token de la subcuenta (pit-...)</label>'
      +'<input id="cli-ghl-token" type="text" value="'+esc(c.ghl.token||'')+'" placeholder="pit-xxxxxxxx" style="width:100%;margin:4px 0 12px;padding:9px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:#fff;font-family:var(--font);outline:none">'
      +'<label style="font-size:11px;color:var(--text3)">Location ID</label>'
      +'<input id="cli-ghl-location" type="text" value="'+esc(c.ghl.locationId||'')+'" placeholder="Settings - Business Info - Location ID" style="width:100%;margin:4px 0 14px;padding:9px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:#fff;font-family:var(--font);outline:none">'
      +'<button class="btn btn-primary" onclick="saveClientGhl('+c.id+')">Guardar y sincronizar</button>'
      +'</div>';
    return;
  }

  // 3) Configurado: NO auto-sync para evitar loops - solo sincronizar manualmente
  // (El sync tarda hasta 60 seg con muchas oportunidades)

  const ops=c.ghl.opportunities||[];
  const right=(c.ghl._syncing?'<span style="font-size:11px;color:var(--text3)">sincronizando...</span>':'<span style="font-size:11px;color:var(--text3)">'+_ghlAgo(c.ghl.lastSync)+'</span>')
    +'<button class="btn btn-sm" onclick="syncGhl('+c.id+',false)">Sincronizar</button>'
    +'<button class="btn btn-sm" onclick="saveClientGhl('+c.id+')" style="display:none"></button>'
    +'<button class="btn btn-sm" onclick="(function(){var x=DB.clients.find(z=>z.id==='+c.id+');x.ghl.token=\'\';save();renderTab();})()">Cambiar token</button>'
    +'<button class="btn btn-sm" onclick="openColSelector()">Columnas</button>'
    +'<button class="btn btn-sm" onclick="openGhlProxyModal()">Conexion</button>';

  if(!ops.length){
    el.innerHTML=header(right)+'<div class="empty"><div class="empty-icon"></div><div>'+(c.ghl._syncing?'Sincronizando...':'Sin oportunidades sincronizadas todavia.')+'</div></div>';
    return;
  }

  // Metricas
  const total=ops.length;
  const won=ops.filter(function(o){return (o.status||'').toLowerCase()==='won';}).length;
  const open=ops.filter(function(o){return (o.status||'').toLowerCase()==='open';}).length;
  const valor=ops.reduce(function(s,o){return s+(Number(o.monetaryValue)||0);},0);
  const sqlCount=ops.filter(function(o){return o._sql;}).length;
  const money=function(n){return '$'+(Math.round((n||0)*100)/100).toLocaleString('en-US',{maximumFractionDigits:2});};

  // Breakdown por anuncio y por geo
  // Lee un valor de las respuestas del formulario por nombre (exacto, luego contiene)
  const faGet=function(fa,names){
    if(!fa) return ''; var keys=Object.keys(fa); var i,j;
    for(i=0;i<names.length;i++){ for(j=0;j<keys.length;j++){ if(keys[j].toLowerCase().trim()===names[i]) return fa[keys[j]]; } }
    for(j=0;j<keys.length;j++){ var kl=keys[j].toLowerCase(); for(i=0;i<names.length;i++){ if(kl.indexOf(names[i])>=0) return fa[keys[j]]; } }
    return '';
  };
  const _tzCountry=function(tz){
    tz=String(tz||'');
    if(/Argentina/i.test(tz)) return 'Argentina';
    if(/Mexico|Hermosillo|Monterrey|Cancun|Tijuana|Merida|Chihuahua|Mazatlan|Matamoros|Ojinaga|Bahia_Banderas/i.test(tz)) return 'Mexico';
    if(/Bogota/i.test(tz)) return 'Colombia';
    if(/Lima/i.test(tz)) return 'Peru';
    if(/Santiago/i.test(tz)) return 'Chile';
    if(/Montevideo/i.test(tz)) return 'Uruguay';
    if(/Sao_Paulo|Bahia|Fortaleza|Recife|Manaus/i.test(tz)) return 'Brasil';
    if(/Guayaquil/i.test(tz)) return 'Ecuador';
    if(/Caracas/i.test(tz)) return 'Venezuela';
    if(/La_Paz/i.test(tz)) return 'Bolivia';
    if(/Asuncion/i.test(tz)) return 'Paraguay';
    if(/Madrid/i.test(tz)) return 'Espana';
    if(/Guatemala/i.test(tz)) return 'Guatemala';
    if(/Costa_Rica/i.test(tz)) return 'Costa Rica';
    return '';
  };
  const adOf=function(o){
    var s=o.source||{};
    return faGet(o.formAnswers,['utm_ad','utm ad']) || s.utmAd || s.utmContent || s.utmCampaign || s.utmSource || '';
  };
  const geoOf=function(o){
    var tz=faGet(o.formAnswers,['timezone','time zone','zona horaria']);
    if(tz){ var parts=String(tz).split('/'); var city=parts[parts.length-1].replace(/_/g,' '); var loc=[city,_tzCountry(tz)].filter(Boolean).join(', '); if(loc) return loc; }
    var g=o.geo||{};
    // Prefer location derived from timezone (set by Apps Script)
    if(g.location) return g.location;
    if(g.timezone){ var tzParts=String(g.timezone).split('/'); return tzParts[tzParts.length-1].replace(/_/g,' '); }
    return [g.city,g.state,g.country].filter(function(x){return x && x!=='US';}).join(', ') || g.country || '';
  };

  const byKey=function(getter){
    const map={}; ops.forEach(function(o){var k=(getter(o)||'(sin dato)'); map[k]=(map[k]||0)+1;});
    return Object.keys(map).sort(function(a,b){return map[b]-map[a];}).map(function(k){return {k:k,n:map[k]};});
  };
  const byAd=byKey(function(o){return adOf(o)||null;});
  const byGeo=byKey(function(o){return geoOf(o)||null;});
  const byStage=byKey(function(o){return o.pipelineStage||o.status||null;});

  const chips=function(arr,max){return arr.slice(0,max||6).map(function(x){return '<span style="display:inline-flex;gap:6px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:11px;color:var(--text2);margin:0 6px 6px 0"><b style="color:#fff">'+x.n+'</b> '+esc(x.k)+'</span>';}).join('');};

  let html=header(right);
  html+='<div class="metrics-row" style="margin-bottom:16px">'
    +'<div class="metric-card"><div class="metric-label">Oportunidades</div><div class="metric-value">'+total+'</div></div>'

    +'<div class="metric-card"><div class="metric-label">Ganadas</div><div class="metric-value" style="color:#4ecfa0">'+won+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">SQLs</div><div class="metric-value"><span id="ghl-sql-count">'+sqlCount+'</span></div></div>'
    +'<div class="metric-card"><div class="metric-label">Valor total</div><div class="metric-value">'+money(valor)+'</div></div>'
    +'</div>';
  html+='<div style="margin-bottom:6px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em">Por anuncio</div><div style="margin-bottom:12px">'+chips(byAd)+'</div>';
  html+='<div style="margin-bottom:6px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em">Por ubicacion</div><div style="margin-bottom:12px">'+chips(byGeo)+'</div>';
  html+='<div style="margin-bottom:6px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em">Por stage</div><div style="margin-bottom:18px">'+chips(byStage)+'</div>';

  // Campos a NO mostrar como "respuestas" (los surfaceamos aparte)
  const faHide=['utm_ad','utm ad','timezone','time zone','zona horaria','ip','order id','payment status','email verified','phone verified','submission date','url'];

  // Tabla
  html+='<div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr style="text-align:left;color:var(--text3)">'
    +(_ghlCols||['Contacto','Stage','Estado','Valor','Fecha']).map(function(h){return '<th style="padding:10px 12px;font-weight:500;border-bottom:1px solid var(--border)">'+h+'</th>';}).join('')
    +'</tr></thead><tbody>';
  ops.forEach(function(o){
    const ad=adOf(o)||'-';
    const geo=geoOf(o)||'-';
    var fuente='-';
    if(o.source){
      var ref=(o.source.referrer||'').toLowerCase();
      var src=(o.source.utmSource||'').toLowerCase();
      var isMeta=src==='meta'||src==='facebook'||src==='instagram';
      var isFbRef=ref.indexOf('facebook.com')>=0||ref.indexOf('instagram.com')>=0||ref.indexOf('l.facebook')>=0;
      var isLanding=ref.length>0&&!isFbRef&&(ref.indexOf('http')===0);
      if(isLanding&&isMeta) fuente='Landing (Meta)';
      else if(isLanding) fuente='Landing';
      else if(isMeta||isFbRef) fuente='Meta';
      else if(src) fuente=o.source.utmSource;
      else if(o.formAnswers&&(o.formAnswers['Lead Source']||o.formAnswers['source'])) fuente=o.formAnswers['Lead Source']||o.formAnswers['source'];
    }
    const fa=o.formAnswers||{};
    const faKeys=Object.keys(fa).filter(function(k){var kl=k.toLowerCase().trim();return faHide.indexOf(kl)<0 && String(fa[k]||'').trim()!=='';}).slice(0,3);
    const faTxt=faKeys.length?('<div style="font-size:10px;color:var(--text3);margin-top:3px">'+faKeys.map(function(k){return esc(k.length>28?k.slice(0,28)+'...':k)+': '+esc(fa[k]);}).join(' - ')+'</div>'):'';
    const stColor=(o.status||'').toLowerCase()==='won'?'#4ecfa0':(o.status||'').toLowerCase()==='lost'?'#f07050':'#f0a830';
    const cols=_ghlCols||['Contacto','Stage','Estado','Valor','Fecha'];
    const oId=o.id||'';
    const cells={
      'Contacto':'<td style="padding:10px 12px;color:#fff;cursor:pointer" onclick="openOppDetail(&#39;'+oId+'&#39;)">'+esc(o.contactName||o.name||'-')+faTxt+'</td>',
      'Anuncio':'<td style="padding:10px 12px;color:var(--text2)">'+esc(ad)+'</td>',
      'Fuente':'<td style="padding:10px 12px;color:var(--text2)">'+esc(fuente)+'</td>',
      'Ubicacion':'<td style="padding:10px 12px;color:var(--text2)">'+esc(geo)+'</td>',
      'Stage':'<td style="padding:10px 12px;color:var(--text2)">'+esc(o.pipelineStage||'-')+'</td>',
      'Estado':'<td style="padding:10px 12px;color:'+stColor+'">'+esc(o.status||'-')+'</td>',
      'Valor':'<td style="padding:10px 12px;color:var(--text2)">'+money(o.monetaryValue)+'</td>',
      'Email':'<td style="padding:10px 12px;color:var(--text2)">'+esc(o.contactEmail||'-')+'</td>',
      'Telefono':'<td style="padding:10px 12px;color:var(--text2)">'+esc(o.contactPhone||'-')+'</td>',
      'Fecha':'<td style="padding:10px 12px;color:var(--text2)">'+(o.createdAt?new Date(o.createdAt).toLocaleDateString('es-AR'):'-')+'</td>',
      'UTM campaign':'<td style="padding:10px 12px;color:var(--text2)">'+esc((o.source&&o.source.utmCampaign)||'-')+'</td>',
      'SQL':'<td style="padding:10px 12px;text-align:center"><input type="checkbox" '+(o._sql?'checked':'')
        +' onchange="toggleSQL('+c.id+',&#39;'+oId+'&#39;,this.checked)" style="width:16px;height:16px;cursor:pointer;accent-color:#1D9E75"></td>',
      'Notas':'<td style="padding:10px 12px"><button class="btn btn-sm" style="font-size:10px;padding:3px 8px" onclick="openOppDetail(&#39;'+oId+'&#39;)">Ver notas</button></td>'
    };
    html+='<tr style="border-bottom:1px solid var(--border)">'+cols.map(function(c){return cells[c]||'<td></td>';}).join('')+'</tr>';
  });
  html+='</tbody></table></div>';

}

function toggleTask(clientId, taskId, checked){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.tasks) return;
  var t=c.tasks.find(function(x){return x.id===taskId;});
  if(t){t.done=checked;save();renderTab();}
}

function deleteTask(clientId, taskId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  c.tasks=(c.tasks||[]).filter(function(x){return x.id!==taskId;});
  save();renderTab();
}

function addTaskManual(clientId){
  var text=prompt('Descripcion de la tarea:');
  if(!text||!text.trim()) return;
  var resp=prompt('Responsable (ej: Angie, Cliente):');
  var due=prompt('Fecha limite YYYY-MM-DD (opcional):');
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  c.tasks=c.tasks||[];
  c.tasks.unshift({id:Date.now(),text:text.trim(),responsible:resp||'',due:due||'',done:false,source:'Manual'});
  save();renderTab();
}

async function delegateTask(clientId, taskId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  var t=(c.tasks||[]).find(function(x){return x.id===taskId;});
  if(!t) return;
  var apiKey=localStorage.getItem('evold-anthropic-key');
  if(!apiKey){toast('Configura tu API key de Anthropic','red');return;}

  // Show loading modal
  var modal=document.getElementById('modal-root');
  if(!modal) return;
  modal.innerHTML='<div class="modal-overlay"><div class="modal" style="max-width:560px;text-align:center;padding:40px">'
    +'<div style="font-size:13px;color:var(--text2);margin-bottom:8px">Preparando delegacion...</div>'
    +'<div style="font-size:11px;color:var(--text3)">Claude esta buscando el contexto del proyecto</div>'
    +'</div></div>';

  var lastCall=(c.fathomCalls||[])[0];
  var lines=(c.conversionLines||[]);
  var lastLine=lines[lines.length-1];
  var sqlCount=(c.ghl&&c.ghl.opportunities||[]).filter(function(o){return o._sql;}).length;

  var callContext=lastCall
    ?'ULTIMA LLAMADA CON EL CLIENTE ('+lastCall.date+' - '+lastCall.title+'):\n'+(lastCall.summary||'Sin resumen disponible')
    :'Sin llamadas registradas';

  var projectContext='CLIENTE: '+c.name+(c.industry?' ('+c.industry+')':'')+'\n'
    +(lastLine?'LINEA ACTIVA: '+(lastLine.version||lastLine.campaign||'Linea activa')+'\n':'')
    +(sqlCount?'SQLs calificados: '+sqlCount+'\n':'')
    +'\n'+callContext;

  var delegationTemplate='SISTEMA DE DELEGACION DE TAREAS:\n'
    +'- Colaboradora: Ashy (ashy@evolvemindhub.com)\n'
    +'- Firmante: Angie\n'
    +'- Template: estilo "4 Horas Semanales" - directo, sin ambiguedad, con autonomia clara\n'
    +'- El asunto debe tener formato: [#TICKET-N] Accion requerida: [TAREA] - Deadline [FECHA]\n'
    +'- Incluir checklist si corresponde al tipo (Implementacion Embudos, Campanas, Cambios Urgentes)\n'
    +'- Incluir sistema de confirmacion de 3 preguntas y regla de silencio\n'
    +'- Siempre firmar como Angie';

  var prompt='Sos un asistente especializado en redactar mails de delegacion de tareas.\n\n'
    +delegationTemplate+'\n\n'
    +'TAREA A DELEGAR:\n'
    +'- Descripcion: '+t.text+'\n'
    +(t.responsible?'- Responsable: '+t.responsible+'\n':'')
    +(t.due?'- Deadline: '+t.due+'\n':'')
    +'\nCONTEXTO DEL PROYECTO:\n'+projectContext+'\n\n'
    +'INSTRUCCIONES:\n'
    +'1. Usa el numero de ticket #1 por ahora (indicar que sera reemplazado automaticamente)\n'
    +'2. Infiere el tipo de tarea y agrega el checklist correspondiente si aplica\n'
    +'3. Determina el nivel de autonomia segun la tarea\n'
    +'4. Usa la informacion de la llamada para dar contexto especifico\n'
    +'5. Redacta SOLO el mail completo con asunto y cuerpo, nada mas\n'
    +'6. Si no hay deadline especifico, usa "a confirmar" pero igual redacta el mail completo\n\n'
    +'Formato de respuesta:\n'
    +'ASUNTO: [el asunto completo]\n'
    +'---\n'
    +'[el cuerpo completo del mail]';

  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1500,messages:[{role:'user',content:prompt}]})
    });
    var data=await r.json();
    if(data.error) throw new Error(data.error.message);
    var raw=data.content[0].text.trim();

    // Parse subject and body
    var subjectMatch=raw.match(/ASUNTO:\s*(.+)/);
    var subject=subjectMatch?subjectMatch[1].trim():'[Delegacion] '+t.text;
    var body=raw.replace(/ASUNTO:\s*.+/,'').replace(/^---\s*/m,'').trim();

    // Show preview modal with OK / Edit buttons
    modal.innerHTML='<div class="modal-overlay"><div class="modal" style="max-width:620px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
      +'<div class="modal-title">Borrador de delegacion</div>'
      +'<div style="font-size:11px;color:var(--text3)">Revisa antes de enviar</div>'
      +'</div>'
      +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px">'
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:4px">ASUNTO</div>'
      +'<input id="delegate-subject" value="'+esc(subject)+'" style="width:100%;background:none;border:none;color:var(--text);font-size:12px;font-weight:500;outline:none">'
      +'</div>'
      +'<textarea id="delegate-body" style="width:100%;min-height:260px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;padding:12px;line-height:1.6;resize:vertical">'+esc(body)+'</textarea>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:8px">Al confirmar: se crea el borrador en Gmail + evento en Calendar Tasks con el deadline.</div>'
      +'<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">'
      +'<button class="btn btn-sm" onclick="closeModal()">Cancelar</button>'
      +'<button class="btn btn-sm btn-primary" onclick="confirmDelegate('+clientId+','+taskId+')">OK - Crear borrador y evento</button>'
      +'</div></div></div>';

    // Store draft data for confirmation step
    window._pendingDelegate={clientId:clientId,taskId:taskId,subject:subject,body:body,task:t};

  }catch(e){
    modal.innerHTML='<div class="modal-overlay"><div class="modal" style="max-width:400px">'
      +'<div class="modal-title" style="color:#f07050">Error</div>'
      +'<div style="font-size:12px;color:var(--text2);margin:12px 0">'+esc(e.message)+'</div>'
      +'<button class="btn btn-sm" onclick="closeModal()">Cerrar</button>'
      +'</div></div>';
  }
}

async function confirmDelegate(clientId, taskId){
  var subject=document.getElementById('delegate-subject');
  var body=document.getElementById('delegate-body');
  if(!subject||!body) return;
  var subjectVal=subject.value.trim();
  var bodyVal=body.value.trim();
  var t=window._pendingDelegate&&window._pendingDelegate.task;

  var modal=document.getElementById('modal-root');
  if(modal) modal.innerHTML='<div class="modal-overlay"><div class="modal" style="max-width:400px;text-align:center;padding:40px">'
    +'<div style="font-size:13px;color:var(--text2)">Creando borrador en Gmail y evento en Calendar...</div>'
    +'</div></div>';

  var apiKey=localStorage.getItem('evold-anthropic-key');
  var c=DB.clients.find(function(x){return x.id===clientId;});

  // Call Claude to orchestrate Gmail draft + Calendar event using MCP
  var orchestratePrompt='Ejecuta este flujo de delegacion de tarea:\n\n'
    +'1. Busca en Gmail los threads enviados a ashy@evolvemindhub.com para encontrar el ultimo numero de ticket\n'
    +'2. Calcula el proximo numero de ticket (ultimo + 1, o #1 si no hay)\n'
    +'3. Actualiza el asunto reemplazando "#1" o "TICKET-1" con el numero correcto\n'
    +'4. Crea el borrador en Gmail con:\n'
    +'   - Para: ashy@evolvemindhub.com\n'
    +'   - Asunto: '+subjectVal+'\n'
    +'   - Cuerpo: (el mail completo)\n'
    +'5. Crea un evento de 10 minutos en el calendario "Tasks"'+(t&&t.due?' con deadline '+t.due:'')+'\n'
    +'6. Responde SOLO con un JSON: {"ticket":"#N","draftCreated":true,"eventCreated":true,"subject":"asunto final"}\n\n'
    +'CUERPO DEL MAIL:\n'+bodyVal;

  try{
    // Use MCP via Anthropic API to create Gmail draft and Calendar event
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-5',
        max_tokens:500,
        mcp_servers:[
          {type:'url',url:'https://gmailmcp.googleapis.com/mcp/v1',name:'gmail-mcp'},
          {type:'url',url:'https://calendarmcp.googleapis.com/mcp/v1',name:'calendar-mcp'},
          {type:'url',url:'https://drivemcp.googleapis.com/mcp/v1',name:'drive-mcp'}
        ],
        messages:[{role:'user',content:orchestratePrompt}]
      })
    });
    var data=await r.json();
    if(data.error) throw new Error(data.error.message);

    // Parse result
    var resultText=data.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    var result={ticket:'#?',draftCreated:false,eventCreated:false};
    try{
      var jsonMatch=resultText.match(/\{[\s\S]*\}/);
      if(jsonMatch) result=JSON.parse(jsonMatch[0]);
    }catch(e){}

    // Mark task as delegated
    if(c){
      var task=(c.tasks||[]).find(function(x){return x.id===taskId;});
      if(task){task.delegated=true;task.delegatedAt=new Date().toISOString();task.ticket=result.ticket||'';save();}
    }

    if(modal) modal.innerHTML='<div class="modal-overlay"><div class="modal" style="max-width:400px">'
      +'<div class="modal-title" style="color:#1D9E75;margin-bottom:16px">Delegacion creada</div>'
      +'<div style="font-size:12px;color:var(--text2);line-height:1.8">'
      +(result.draftCreated?'<div>Borrador en Gmail</div>':'')
      +(result.eventCreated?'<div>Evento en Calendar Tasks'+(t&&t.due?' ('+t.due+')':'')+'</div>':'')
      +(result.ticket?'<div style="margin-top:8px;font-weight:500">Ticket: '+esc(result.ticket)+'</div>':'')
      +'</div>'
      +'<button class="btn btn-sm btn-primary" style="margin-top:16px" onclick="closeModal();renderTab()">Listo</button>'
      +'</div></div>';
  }catch(e){
    if(modal) modal.innerHTML='<div class="modal-overlay"><div class="modal" style="max-width:400px">'
      +'<div class="modal-title" style="color:#f07050">Error al crear</div>'
      +'<div style="font-size:12px;color:var(--text2);margin:12px 0">'+esc(e.message)+'</div>'
      +'<button class="btn btn-sm" onclick="closeModal()">Cerrar</button>'
      +'</div></div>';
  }
}

    +'Responde SOLO con un array JSON valido, sin texto adicional, sin markdown:\n'
    +'[{"text":"descripcion concreta de la tarea","responsible":"nombre del responsable","due":"YYYY-MM-DD o vacio"}]\n'
    +'El responsable puede ser "Angie", el nombre del cliente, u otra persona mencionada.\n'
    +'Solo tareas concretas y accionables.';
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,messages:[{role:'user',content:prompt}]})
    });
    var data=await r.json();
    if(data.error) throw new Error(data.error.message);
    var text=data.content[0].text.trim();
    // Strip any markdown fences
    text=text.replace(/^[^\[]*\[/,'[').replace(/\][^\]]*$/,']');
    var extracted=JSON.parse(text);
    c.tasks=c.tasks||[];
    var added=0;
    extracted.forEach(function(t){
      var dup=(c.tasks||[]).some(function(e){return e.text.toLowerCase()===t.text.toLowerCase();});
      if(!dup){
        c.tasks.unshift({id:Date.now()+added,text:t.text,responsible:t.responsible||'',due:t.due||'',done:false,source:lastCall.date+' - '+lastCall.title});
        added++;
      }
    });
    save();renderTab();
    toast(added+' tareas extraidas de la ultima llamada');
  }catch(e){
    toast('Error: '+e.message,'red');
  }
  if(btn){btn.disabled=false;btn.textContent='Extraer de: '+esc(lastCall.date);}
}

async function runSQLAnalysis(clientId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  var apiKey=localStorage.getItem('evold-anthropic-key');
  if(!apiKey){toast('Configura tu API key de Anthropic primero','red');return;}
  var btn=document.getElementById('sql-diag-btn');
  var res=document.getElementById('sql-diag-result');
  if(btn){btn.disabled=true;btn.textContent='Analizando...';}
  if(res) res.innerHTML='<span style="color:var(--text3)">Generando analisis...</span>';

  var sqlLeads=(c.ghl&&c.ghl.opportunities||[]).filter(function(o){return o._sql;});
  var lines=c.conversionLines||[];

  function findLine(opp){
    var d=opp.createdAt?new Date(opp.createdAt):null;
    if(!d) return lines[lines.length-1]||null;
    for(var i=0;i<lines.length;i++){
      var s=lines[i].dateStart?new Date(lines[i].dateStart):null;
      var e=lines[i].dateEnd?new Date(lines[i].dateEnd):new Date();
      if(s&&d>=s&&d<=e) return lines[i];
    }
    return lines[lines.length-1]||null;
  }

  var leadText=sqlLeads.map(function(o,i){
    var l=findLine(o);
    return (i+1)+'. '+(o.contactName||o.name||'Lead')
      +' | Fecha: '+(o.createdAt?new Date(o.createdAt).toLocaleDateString('es-AR'):'-')
      +' | Anuncio: '+(o.source&&(o.source.utmAd||o.source.utmCampaign)||'sin dato')
      +' | Ubicacion: '+(o.geo&&(o.geo.location||o.geo.city)||'sin dato')
      +' | Stage: '+(o.pipelineStage||'sin dato')
      +' | Linea: '+(l?(l.version||l.campaign||'linea'):'sin dato');
  }).join('\n');

  var linesText=lines.map(function(l){
    return '- '+(l.version||'Linea')+': '+l.campaign
      +(l.dateStart?' desde '+l.dateStart:'')
      +(l.dateEnd?' hasta '+l.dateEnd:' (activa)')
      +(l.metrics&&l.metrics.cpl?' CPL $'+l.metrics.cpl:'');
  }).join('\n');

  var calls=c.fathomCalls||[];
  var callsText=calls.length?calls.slice(0,6).map(function(cl){
    return '- '+cl.date+' '+cl.title+(cl.summary?': '+cl.summary.substring(0,250):'');
  }).join('\n'):'Sin llamadas registradas';

  var prompt='Sos analista de performance para una agencia de software B2B.\n\n'
    +'CLIENTE: '+c.name+(c.industry?' ('+c.industry+')':'')+'\n\n'
    +'LEADS SQL ('+sqlLeads.length+'):\n'+leadText+'\n\n'
    +'LINEAS DE CONVERSION:\n'+linesText+'\n\n'
    +'LLAMADAS CON EL CLIENTE (Fathom):\n'+callsText+'\n\n'
    +'Analiza estos SQLs y genera un informe con estas secciones:\n'
    +'1. PATRON DE ANUNCIOS: que anuncios generaron mas SQLs\n'
    +'2. PERFIL GEOGRAFICO: de donde vienen\n'
    +'3. LINEA DE CONVERSION: en que bloque calificaron\n'
    +'4. VOZ DEL CLIENTE: que dijo el cliente sobre estos leads en las llamadas\n'
    +'5. RECOMENDACIONES: 3 acciones concretas para la proxima linea\n\n'
    +'Responde en espanol, conciso y accionable. Usa <strong> para titulos y <br><br> entre secciones.';

  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    var data=await r.json();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    if(!data.content||!data.content[0]) throw new Error('Respuesta vacia: '+JSON.stringify(data));
    var text=data.content[0].text||'Sin respuesta';
    c._sqlAnalysis=text;
    save();
    if(res) res.innerHTML=text;
  }catch(e){
    if(res) res.innerHTML='<span style="color:#f07050">Error: '+esc(e.message)+'</span>';
  }
  if(btn){btn.disabled=false;btn.textContent='Regenerar';}
}

function toggleSQL(clientId, oppId, checked){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.ghl||!c.ghl.opportunities) return;
  var opp=c.ghl.opportunities.find(function(o){return o.id===oppId;});
  if(!opp) return;
  opp._sql=checked;
  save();
  // Update SQL count in header metrics without full re-render
  var sqlCount=c.ghl.opportunities.filter(function(o){return o._sql;}).length;
  var el=document.getElementById('ghl-sql-count');
  if(el) el.textContent=sqlCount;
}

function saveColSelector(){
  const checks=document.querySelectorAll('#modal-root input[type=checkbox]');
  const selected=[];
  checks.forEach(function(ch){if(ch.checked) selected.push(ch.value);});
  if(!selected.length){toast('Selecciona al menos una columna','red');return;}
  const needsEnrich=['Anuncio','Fuente','Ubicacion','UTM campaign'];
  const wantsEnrich=selected.some(function(col){return needsEnrich.indexOf(col)>=0;});
  _ghlCols=selected;
  closeModal();
  renderTab();
  // If user selected a column that needs enrichment, start background enrichment
  if(wantsEnrich){
    const c=DB.clients.find(function(x){return x.id===S.clientId;});
    const proxy=getGhlProxy();
    if(c&&c.ghl&&c.ghl.opportunities&&proxy.url){
      toast('Cargando datos de contactos...');
      enrichContactsBackground(c, proxy);
    }
  }
}

async function openOppDetail(oppId){
  const c=DB.clients.find(function(x){return x.id===S.clientId;});
  if(!c) return;
  const opp=(c.ghl&&c.ghl.opportunities||[]).find(function(o){return o.id===oppId;});
  if(!opp) return;
  const stColor=(opp.status||'').toLowerCase()==='won'?'#4ecfa0':(opp.status||'').toLowerCase()==='lost'?'#f07050':'#f0a830';

  function renderModal(notes, loading, err){
    let notesHtml='';
    if(loading){
      notesHtml='<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">Cargando notas...</div>';
    } else if(err){
      notesHtml='<div style="padding:16px;color:#f07050;font-size:12px">'+err+'</div>';
    } else if(!notes||!notes.length){
      notesHtml='<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">Sin notas registradas.</div>';
    } else {
      notesHtml=notes.map(function(n){
        const date=n.createdAt?new Date(n.createdAt).toLocaleDateString('es-AR'):'';
        if(n.isLink){
          return '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px">'
            +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
            +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;background:rgba(55,138,221,0.15);color:#6aabf0">Llamada grabada</span>'
            +(date?'<span style="font-size:10px;color:var(--text3)">'+date+'</span>':'')+'</div>'
            +(n.linkText?'<div style="font-size:12px;color:var(--text2);margin-bottom:6px">'+n.linkText+'</div>':'')
            +'<a href="'+n.linkUrl+'" target="_blank" style="font-size:12px;color:var(--green);text-decoration:none">Ver grabacion</a>'
            +'</div>';
        } else {
          return '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px">'
            +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
            +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--bg4);color:var(--text2)">Nota del closer</span>'
            +(date?'<span style="font-size:10px;color:var(--text3)">'+date+'</span>':'')+'</div>'
            +'<div style="font-size:12px;color:var(--text);line-height:1.6">'+n.body+'</div>'
            +'</div>';
        }
      }).join('');
    }
    document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
      +'<div class="modal" style="max-width:520px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">'
      +'<div><div class="modal-title">'+esc(opp.contactName||opp.name)+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">'
      +'<span style="font-size:11px;color:'+stColor+'">'+esc(opp.status||'')+'</span>'
      +(opp.pipelineStage?'<span style="font-size:11px;color:var(--text3)">'+esc(opp.pipelineStage)+'</span>':'')
      +(opp.monetaryValue?'<span style="font-size:11px;color:var(--text2)">'+money(opp.monetaryValue)+'</span>':'')
      +'</div></div>'
      +'<button class="btn btn-sm" onclick="closeModal()">Cerrar</button></div>'
      +'<div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">Notas</div>'
      +'<div id="notes-content">'+notesHtml+'</div>'
      +'</div></div>';
  }

  renderModal(null, true, null);
  const proxy=getGhlProxy();
  if(!proxy.url||!proxy.secret||!c.ghl||!c.ghl.token){
    renderModal(null,false,'Configura la conexion con GHL primero'); return;
  }
  const base=proxy.url+(proxy.url.indexOf('?')>=0?'&':'?')
    +'secret='+encodeURIComponent(proxy.secret)
    +'&token='+encodeURIComponent(c.ghl.token)
    +'&location='+encodeURIComponent(c.ghl.locationId);
  try{
    // Fetch notes and contact in parallel
    const notesUrl=base+'&action=notes'+(opp.contactId?'&contactId='+encodeURIComponent(opp.contactId):'&opportunityId='+encodeURIComponent(oppId));
    const contactUrl=opp.contactId ? base+'&action=contact&contactId='+encodeURIComponent(opp.contactId) : null;
    const reqs=[fetch(notesUrl)];
    if(contactUrl) reqs.push(fetch(contactUrl));
    const responses=await Promise.all(reqs);
    const notesData=await responses[0].json();
    if(!notesData.ok) throw new Error(notesData.error||'Error al traer notas');
    if(responses[1]){
      const cData=await responses[1].json();
      if(cData.ok){
        if(cData.utmAd && !opp.source.utmAd) opp.source.utmAd=cData.utmAd;
        if(cData.location && !opp.geo.location) opp.geo.location=cData.location;
        if(cData.utmCampaign && !opp.source.utmCampaign) opp.source.utmCampaign=cData.utmCampaign;
        save();
      }
    }
    renderModal(notesData.notes,false,null);
  }catch(e){
    renderModal(null,false,e.message);
  }
}

// Init
load();renderSidebar();showOverview();
</script>
