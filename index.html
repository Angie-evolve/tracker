<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLD - Agency Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-bg: #E1F5EE;
  --green-text: #0F6E56;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --amber-text: #854F0B;
  --red: #D85A30;
  --red-bg: #FCEBEB;
  --red-text: #A32D2D;
  --blue: #378ADD;
  --blue-bg: #E6F1FB;
  --blue-text: #185FA5;
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2)}
.main{flex:1;overflow-y:auto;background:var(--bg)}

.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-text{font-size:20px;font-weight:600;letter-spacing:-0.5px;color:#fff}
.logo-text span{color:var(--green)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.08em}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-label{font-size:10px;font-weight:500;color:var(--text3);padding:10px 8px 4px;text-transform:uppercase;letter-spacing:0.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;color:var(--text2);font-size:13px;font-weight:400;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--text);border-color:var(--border)}
.nav-item-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.nav-item-info{flex:1;min-width:0}
.nav-item-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item-sub{font-size:10px;color:var(--text3);margin-top:1px}
.health-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}

.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)}
.page-title{font-size:16px;font-weight:500;color:#fff}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px}
.topbar-actions{display:flex;gap:8px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font)}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark);border-color:var(--green-dark)}
.btn-ghost{border-color:transparent}
.btn-ghost:hover{background:var(--bg3);border-color:var(--border)}
.btn-danger{border-color:rgba(216,90,48,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(216,90,48,0.08)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}

.content{padding:20px 24px}

.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.metric-value{font-size:22px;font-weight:500;color:#fff;line-height:1}
.metric-delta{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}
.delta-neutral{color:var(--text3)}

.health-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.health-score-big{font-size:42px;font-weight:600;line-height:1;color:#fff;min-width:70px}
.health-score-big span{font-size:18px;font-weight:400;color:var(--text2)}
.health-right{flex:1}
.health-label-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.health-label-text{font-size:12px;color:var(--text2)}
.health-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.health-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(.4,0,.2,1)}
.health-ticks{display:flex;justify-content:space-between;margin-top:5px}
.health-tick{font-size:10px;color:var(--text3)}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.pill-green{background:rgba(29,158,117,0.15);color:#4ecfa0}
.pill-amber{background:rgba(186,117,23,0.15);color:#f0a830}
.pill-red{background:rgba(216,90,48,0.15);color:#f07050}
.pill-blue{background:rgba(55,138,221,0.15);color:#6aabf0}
.pill-gray{background:var(--bg4);color:var(--text2)}

.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text2);transition:all 0.15s;white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--text)}
.tab.active{color:#fff;border-bottom-color:var(--green);font-weight:500}

.cl-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)}
.cl-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.cl-table th{font-size:10px;font-weight:500;color:var(--text3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;background:var(--bg2)}
.cl-table .row-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;background:var(--bg2);padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap;border-right:1px solid var(--border)}
.cl-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.cl-table tr:last-child td,.cl-table tr:last-child .row-label{border-bottom:none}
.cl-table tr:hover td,.cl-table tr:hover .row-label{background:rgba(255,255,255,0.02)}
.active-col{background:rgba(29,158,117,0.04)}
.na{color:var(--text3);font-style:italic;font-size:11px}

.diag-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;transition:border-color 0.15s}
.diag-card:hover{border-color:var(--border2)}
.diag-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.diag-title-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.diag-title-text{font-size:13px;font-weight:500;color:#fff;line-height:1.4}
.diag-body{font-size:12px;color:var(--text2);line-height:1.7;margin-left:40px}

.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-left{display:flex;flex-direction:column;align-items:center;gap:0;padding-top:4px}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl-line{width:1px;flex:1;background:var(--border);margin-top:4px}
.tl-content{flex:1;padding-bottom:4px}
.tl-ver{font-size:13px;font-weight:500;color:#fff}
.tl-dates{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.tl-note{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.6}
.tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tl-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.2s}
.ov-card:hover{border-color:var(--border2);transform:translateY(-1px)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:580px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.modal-title{font-size:16px;font-weight:500;color:#fff;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.form-section{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green)}
.form-row select option{background:var(--bg3)}
.form-row input::placeholder{color:var(--text3)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Fix: date input color in dark mode */
.form-row input[type="date"]{color-scheme:dark}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:12px;color:var(--text);z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(.4,0,.2,1)}
.toast.show{transform:translateY(0);opacity:1}

.notes-area{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.7}
.notes-area strong{color:var(--text);font-weight:500}

.sync-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sync-info{font-size:12px;color:var(--text2)}
.sync-info strong{color:var(--text);font-weight:500}
.sync-actions{display:flex;gap:6px}

.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.4}

/* Success Tracker */
.st-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.st-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;position:relative;overflow:hidden}
.st-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.st-card.ok::before{background:#1D9E75}
.st-card.warn::before{background:#BA7517}
.st-card.danger::before{background:#D85A30}
.st-card.na::before{background:#555}
.st-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.st-name{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;line-height:1.4}
.st-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.st-badge.ok{background:rgba(29,158,117,0.15);color:#4ecfa0}
.st-badge.warn{background:rgba(186,117,23,0.15);color:#f0a830}
.st-badge.danger{background:rgba(216,90,48,0.15);color:#f07050}
.st-badge.na{background:var(--bg4);color:var(--text3)}
.st-val{font-size:24px;font-weight:500;color:#fff;line-height:1;margin-bottom:3px}
.st-val span{font-size:13px;font-weight:400;color:var(--text2)}
.st-target{font-size:11px;color:var(--text3)}
.st-target strong{color:var(--text2);font-weight:500}
.st-bar{margin-top:10px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.st-fill{height:100%;border-radius:2px}
.st-fill.ok{background:#1D9E75}
.st-fill.warn{background:#BA7517}
.st-fill.danger{background:#D85A30}
.st-guarantee{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:20px}
.st-g-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st-g-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:6px}
.st-g-fill{height:100%;border-radius:4px;background:#1D9E75;transition:width 0.6s}
.st-g-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.st-contract{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.st-upload{border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:20px;text-align:center;cursor:pointer;transition:background 0.15s;margin-bottom:16px}
.st-upload:hover{background:var(--bg3)}
.st-tl{position:relative;padding-left:26px}
.st-tl-line{position:absolute;left:7px;top:6px;bottom:0;width:1px;background:var(--border)}
.st-tl-dot{position:absolute;left:-22px;top:5px;width:9px;height:9px;border-radius:50%}
.st-tl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 13px;margin-bottom:16px}
.st-tl-card:hover{border-color:var(--border2)}
.st-tl-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.st-tl-title{font-size:13px;font-weight:500;color:#fff}
.st-tl-date{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.st-tl-body{font-size:12px;color:var(--text2);line-height:1.6}
.st-tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
/* Adsets & Ads */
.adset-block{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.adset-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.adset-name{font-size:13px;font-weight:500;color:#fff;flex:1}
.adset-audience{font-size:11px;color:var(--text3)}
.ads-list{padding:8px}
.ad-row{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.ad-row:last-child{margin-bottom:0}
.ad-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);cursor:pointer}
.ad-name{font-size:12px;font-weight:500;color:#fff;flex:1}
.ad-metrics-mini{display:flex;gap:10px;font-size:11px;color:var(--text2)}
.ad-metrics-mini span{display:flex;align-items:center;gap:3px}
.ad-body{padding:12px;border-top:1px solid var(--border);background:var(--bg)}
.ad-metrics-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.ad-metric{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.ad-metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.ad-metric-val{font-size:14px;font-weight:500;color:#fff}
.ad-guion{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.6}
.ad-guion strong{color:var(--text);font-weight:500}
.ad-link{font-size:11px;color:var(--green);text-decoration:none}
.ad-link:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">EV<span>OLD</span></div>
      <div class="logo-sub">Agency Dashboard</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-label">Vista</div>
      <div class="nav-item" id="nav-overview" onclick="showOverview()">
        <div class="nav-item-icon" style="background:#1a1a1a">⊞</div>
        <div class="nav-item-name">Panel general</div>
      </div>
      <div class="nav-label" style="margin-top:6px">Clientes</div>
      <div id="client-list"></div>
    </div>
    <div class="sidebar-bottom">
      <button class="btn btn-primary" onclick="openNewClientModal()" style="justify-content:center;width:100%">+ Nuevo cliente</button>
    </div>
  </div>

  <div class="main" id="main-content"></div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
const LS_KEY = 'evold-v1';
function esc(s){return String(s===null||s===undefined?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function money(v){return '$'+(parseFloat(v)||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
const COLORS = ['#1D9E75','#378ADD','#D85A30','#D4537E','#BA7517','#7F77DD'];
const BG_COLORS = ['rgba(29,158,117,0.15)','rgba(55,138,221,0.15)','rgba(216,90,48,0.15)','rgba(212,83,126,0.15)','rgba(186,117,23,0.15)','rgba(127,119,221,0.15)'];

const DEFAULT = {clients:[{

  health:{score:61,label:'En desarrollo',color:'amber'},
  monthlyLeads:16, monthlyBudget:370, avgCPL:23.18,
  conversionLines:[
    {id:'l1',version:'Suris 1',dateStart:'2025-01-01',dateEnd:'2025-02-28',

    {id:'l2',version:'Suris 1.1',dateStart:'2025-03-01',dateEnd:'2025-04-15',
     campaign:'Trafico Frio Evolve v2',adset:'Clientes potenciales',ad:'AD "2"',
     filtro:'MEDIO',destino:'LP',
     metrics:{adSpent:153.38,pageViews:1200,cpm:10.73,cpc:0.31,optIn:0.33,cpl:38,registros:4,sql:null},
     status:'historico',notes:'Bajo filtro a MEDIO. Mejora en opt-in (0.10->0.33%). CPL baja de $108 a $38.'},
    {id:'l3',version:'Suris 1.2',dateStart:'2025-05-01',dateEnd:null,
     campaign:'Clientes potenciales meta forms',adset:'Meta Forms',ad:'AD "1" / "2"',
     filtro:'MEDIO',destino:'Meta Forms',
     metrics:{adSpent:370,pageViews:null,cpm:15.04,cpc:1.12,optIn:null,cpl:23.18,registros:16,sql:null},
     status:'activa',notes:'Cambio a Meta Forms. Mejor CPL ($23.18). Sin page views ni opt-in.'}
  ],

const SHEET_ID = '1Rq06BLxfsWXbtlLskawouGr65xnxNkW8T5Ve2ijam9g';
const SHEETS_API = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/`;
const API_KEY = ''; // Set via openSyncConfigModal

// -- Fuzzy column resolver ----------------------------------------
// Normaliza a minusculas sin tildes para comparar
function _n(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

// Dado un objeto fila y una lista de terminos, devuelve el valor de la primera
// columna cuyo nombre (normalizado) contiene TODOS los terminos.
// Ejemplo: col(row, 'inversion','semanal') matchea "Inversion Semanal", "INVERSION SEMANAL", etc.
function col(row, ...terms){
  const nt = terms.map(_n);
  const key = Object.keys(row).find(k => nt.every(t => _n(k).includes(t)));
  return key != null ? row[key] : '';
}

function parseNum(v){
  if(v===null||v===undefined||v===''||v==='N/A'||v==='-') return null;
  const s = String(v).replace(/[$,%\s]/g,'').replace(',','.');
  const n = parseFloat(s);
  return isNaN(n)?null:n;
}

function colNum(row, ...terms){ return parseNum(col(row, ...terms)); }

function sumCol(rows, ...terms){ 
  let t=null; 
  rows.forEach(r=>{ const v=colNum(r,...terms); if(v!==null) t=(t||0)+v; }); 
  return t!==null?Math.round(t*100)/100:null; 
}
function avgCol(rows, ...terms){ 
  const vals=[]; 
  rows.forEach(r=>{ const v=colNum(r,...terms); if(v!==null) vals.push(v); }); 
  return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*100)/100:null; 
}

function isHeaderRow(row){
  const vals = row.map(c=>_n(c||''));
  return vals.some(v=>v==='cliente') && vals.some(v=>v==='semana'||v.includes('campa'));
}

async function fetchSheetBlocks(sheetName, apiKey){
  const range = encodeURIComponent(`${sheetName}!A1:AK300`);
  const url = `${SHEETS_API}${range}?key=${apiKey}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} para "${sheetName}"`);
  const data = await res.json();
  const rawRows = data.values || [];
  if(rawRows.length < 2) return [];

  const blocks = [];
  let pendingName = '';
  let i = 0;

  while(i < rawRows.length){
    const row = rawRows[i];
    if(isHeaderRow(row)){
      const headers = row;
      const name = pendingName || `Bloque ${blocks.length+1}`;
      pendingName = '';
      const dataRows = [];
      i++;
      let lastWeek='', lastCampaign='', lastAdset='';

      while(i < rawRows.length && !isHeaderRow(rawRows[i])){
        const r = rawRows[i];
        const nonEmpty = r.filter(c=>(c||'').trim()!=='');
        // Skip block-name rows (few non-empty cells, no $ or digits)
        if(nonEmpty.length <= 2 && nonEmpty.every(c=>!/[$0-9]/.test((c||'').trim()[0]||''))){
          if(nonEmpty.length > 0) pendingName = nonEmpty[0];
          i++; continue;
        }
        const obj={};
        headers.forEach((h,hi)=>obj[h]=(r[hi]||'').trim());
        // Propagar Semana, Campana, Adset, Anuncio usando col() fuzzy
        const semanaVal=col(obj,'semana');
        const campanaVal=col(obj,'campa');
        const adsetVal=col(obj,'adset');
        const anuncioVal=col(obj,'anuncio');
        if(semanaVal && /^W\d+$/i.test(semanaVal)) lastWeek=semanaVal;
        obj['_semana']=lastWeek;
        if(campanaVal) lastCampaign=campanaVal; obj['_campaign']=lastCampaign;
        if(adsetVal) lastAdset=adsetVal; obj['_adset']=lastAdset;
        obj['_anuncio']=anuncioVal;
        dataRows.push(obj);
        i++;
      }
      if(dataRows.length > 0) blocks.push({name, rows: dataRows});
    } else {
      const nonEmpty = row.filter(c=>(c||'').trim()!=='');
      if(nonEmpty.length > 0 && nonEmpty.length <= 3) pendingName = nonEmpty[0]||'';
      i++;
    }
  }
  return blocks;
}

async function fetchSheetData(sheetName, apiKey){
  const blocks = await fetchSheetBlocks(sheetName, apiKey);
  return blocks.flatMap(b=>b.rows);
}

// normKey/fuzzyGet/sumCol/avgCol replaced by col()/sumCol()/avgCol() above

async function syncClient(client, apiKey){
  const sheetName = client.sheetName || client.name;
  try {
    const blocks = await fetchSheetBlocks(sheetName, apiKey);
    if(!blocks.length) return {ok:false, msg:'Sin datos en el sheet'};

    let created=0, updated=0;

    for(const block of blocks){
      const {name, rows} = block;
      // Filas con anuncio especifico vs filas resumen (sin anuncio)
      const detailRows = rows.filter(r=>r._anuncio!=='');
      const summaryRows = rows.filter(r=>r._anuncio==='');
      const metricsSource = summaryRows.length ? summaryRows : detailRows;
      const cpmSource = detailRows.length ? detailRows : metricsSource;

      // adSpent: intenta fila resumen, si no suma filas de detalle
      const adSpentSummary = sumCol(metricsSource, 'inversion','semanal');
      const adSpentDetail  = sumCol(detailRows.length ? detailRows : rows, 'inversion','semanal');
      const metrics = {
        adSpent:   adSpentSummary || adSpentDetail,
        // Registros: usa 'registros' si existe, sino 'resultados' (Meta Forms)
        registros: sumCol(metricsSource, 'registros') || sumCol(metricsSource, 'resultados'),
        sql:       sumCol(metricsSource, 'sql'),
        pageViews: sumCol(metricsSource, 'visitas'),
        cpm:       avgCol(cpmSource,     'cpm'),
        cpc:       avgCol(cpmSource,     'cpc'),
        optIn:     avgCol(metricsSource, 'optin'),
        cpl:       avgCol(metricsSource, 'cpl'),
      };

      // Adsets & ads usando col() fuzzy
      const adsetMap = {};
      detailRows.forEach(row=>{
        const adsetName = (row._adset||'Adset').trim();
        const adName    = (row._anuncio||'').trim();
        if(!adName) return;
        const linkVal = col(row,'link');
        if(!adsetMap[adsetName]) adsetMap[adsetName]={name:adsetName,audience:'',ads:[]};
        adsetMap[adsetName].ads.push({
          name: adName, link: linkVal||'',
          cpl:         colNum(row,'cpl')||null,
          registros:   colNum(row,'registros')||null,
          ctr:         colNum(row,'ctr')||null,
          cpc:         colNum(row,'cpc')||null,
          impresiones: colNum(row,'frecuencia')||null,
          guion: ''
        });
      });
      const adsets = Object.values(adsetMap);

      const firstRow = rows[0]||{};
      const campaign = firstRow._campaign||'';
      const adset    = firstRow._adset||'';

      // Fechas: buscar la primera fila que tenga fecha de inicio
      const summaryRow = rows.find(r=>col(r,'fecha','inicio'))||firstRow;
      const dateStart = toInputDate(col(summaryRow,'fecha','inicio'), true);
      const dateEnd   = toInputDate(col(summaryRow,'fecha','fin'),    true);
      const isLatest = block === blocks[blocks.length-1];
      const blockKey = name.trim();

      const existingIdx = client.conversionLines.findIndex(l=>l.blockKey===blockKey);
      if(existingIdx>=0){
        const existing = client.conversionLines[existingIdx];
        Object.entries(metrics).forEach(([k,v])=>{if(v!==null) existing.metrics[k]=Math.round(v*100)/100;});
        const destVal = col(summaryRow,'destino'); if(destVal) existing.destino = destVal;
        existing.adsets = adsets;
        updated++;
      } else {
        if(isLatest) client.conversionLines.forEach(l=>{if(!l.blockKey) l.status='historico';});
        client.conversionLines.push({
          id: 'l'+Date.now()+Math.random().toString(36).slice(2),
          blockKey, version: blockKey,
          dateStart: dateStart||null, dateEnd: dateEnd||null,
          campaign, adset, ad:'', filtro:'MEDIO', destino: col(summaryRow,'destino')||'',
          metrics: {
            adSpent: metrics.adSpent, pageViews: metrics.pageViews,
            cpm: metrics.cpm, cpc: metrics.cpc,
            optIn: metrics.optIn, cpl: metrics.cpl,
            registros: metrics.registros, sql: metrics.sql
          },
          adsets,
          notes: `Importado desde sheet - ${blockKey}`,
          status: isLatest?'activa':'historico'
        });
        created++;
      }
    }

    // Para bloques historicos sin dateEnd, usar el dateStart del siguiente bloque
    const syncedLines = client.conversionLines.filter(l=>l.blockKey);
    syncedLines.forEach((l,i)=>{
      if(!l.dateEnd && i < syncedLines.length-1){
        const nextStart = syncedLines[i+1].dateStart;
        if(nextStart) l.dateEnd = nextStart;
      }
    });

    const latestLine = client.conversionLines[client.conversionLines.length-1];
    if(latestLine?.metrics){
      if(latestLine.metrics.registros) client.monthlyLeads = latestLine.metrics.registros;
      if(latestLine.metrics.cpl) client.avgCPL = latestLine.metrics.cpl;
      if(latestLine.metrics.adSpent) client.monthlyBudget = Math.round(latestLine.metrics.adSpent);
    }

    return {ok:true, msg:`${blocks.length} bloques - ${created} creados - ${updated} actualizados`};
  } catch(e){
    return {ok:false, msg:e.message};
  }
}

// Utils
function hc(c){return{green:'#1D9E75',amber:'#BA7517',red:'#D85A30',gray:'#555'}[c]||'#555'}
function pillClass(c){return{green:'pill-green',amber:'pill-amber',red:'pill-red',blue:'pill-blue',gray:'pill-gray'}[c]||'pill-gray'}
function days(s,e){if(!s)return null;const d=Math.floor((new Date(e||Date.now())-new Date(s))/86400000);return d>=0?d:0;}
function fmtDateRange(s,e){
  if(!s)return '-';
  const fmt=d=>{
    // Normalize to YYYY-MM-DD first, then format as DD/MM/YYYY
    const iso=toInputDate(d);
    if(!iso)return d;
    const [y,m,day]=iso.split('-');
    return `${day}/${m}/${y}`;
  };
  return fmt(s)+' -> '+(e?fmt(e):'hoy');
}

// FIX: Normalize any date format to YYYY-MM-DD for input[type=date]
function toInputDate(d, fromSheet){
  if(!d) return '';
  d = String(d).trim();
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  // MM/DD/YYYY - Google Sheets format (fromSheet=true)
  if(fromSheet && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){
    const [month,day,year]=d.split('/');
    return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  }
  // DD/MM/YYYY - manual input format
  if(!fromSheet && /^\d{2}\/\d{2}\/\d{4}$/.test(d)){
    const [day,month,year]=d.split('/');
    return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  }
  // DD-MM-YYYY
  if(/^\d{2}-\d{2}-\d{4}$/.test(d)){
    const [day,month,year]=d.split('-');
    return `${year}-${month}-${day}`;
  }
  // Try native Date parsing as last resort
  try{
    const dt=new Date(d);
    if(!isNaN(dt)){return dt.toISOString().split('T')[0];}
  }catch(e){}
  return '';
}

function fmtVal(v,t){
  if(v===null||v===undefined||v==='') return '<span class="na">N/A</span>';
  if(t==='$') return '$'+parseFloat(v).toFixed(2);
  if(t==='%') return parseFloat(v).toFixed(2)+'%';
  return String(v);
}

// Client view
function selectClient(id){S.clientId=id;S.view='client';S.tab='lineas';renderSidebar();renderClient();}
function setMetricsView(v){S.metricsView=v;renderClient();}

function renderClient(){
  const c=DB.clients.find(x=>x.id===S.clientId);if(!c)return;
  const al=c.conversionLines.find(l=>l.status==='activa')||c.conversionLines[c.conversionLines.length-1];
  const m=al?.metrics||{};
  const daysActive=days(al?.dateStart,al?.dateEnd);

  // ---- Acumulados historicos (toda la cuenta, todas las lineas) ----
  const _allLines=c.conversionLines||[];
  const _num=function(v){const n=Number(v);return isNaN(n)?0:n;};
  const accSpent=_allLines.reduce(function(s,l){return s+_num(l.metrics&&l.metrics.adSpent);},0);
  const accReg=_allLines.reduce(function(s,l){return s+_num(l.metrics&&l.metrics.registros);},0);
  const accSql=_allLines.reduce(function(s,l){return s+_num(l.metrics&&l.metrics.sql);},0);
  const costPorReg=accReg>0?accSpent/accReg:null;
  const costPorSql=accSql>0?accSpent/accSql:null;
  let _wCpm=0,_wCpc=0,_wDen=0;
  _allLines.forEach(function(l){var sp=_num(l.metrics&&l.metrics.adSpent),cpm=Number(l.metrics&&l.metrics.cpm),cpc=Number(l.metrics&&l.metrics.cpc);if(sp>0){if(!isNaN(cpm))_wCpm+=cpm*sp;if(!isNaN(cpc))_wCpc+=cpc*sp;_wDen+=sp;}});
  const accCpm=_wDen>0?_wCpm/_wDen:null;
  const accCpc=_wDen>0?_wCpc/_wDen:null;
  let _earliest=null;_allLines.forEach(function(l){if(l.dateStart){var d=new Date(l.dateStart);if(!_earliest||d<_earliest)_earliest=d;}});
  const diasHist=_earliest?days(_earliest.toISOString().slice(0,10),null):null;
  // Costo por SQL idoneo (del contrato) para colorear
  const _ct=c.contract||{};
  const costoSqlIdoneo=(_ct.minDailyBudget&&_ct.durationDays&&_ct.totalOCs)?(_ct.minDailyBudget*_ct.durationDays)/_ct.totalOCs:null;
  const _money=function(n){return n===null||n===undefined?'-':'$'+(Math.round(n*100)/100).toLocaleString('en-US',{maximumFractionDigits:2});};
  let _sqlColor='#fff';
  if(costPorSql!==null&&costoSqlIdoneo!==null) _sqlColor=(costPorSql<=costoSqlIdoneo?'#4ecfa0':costPorSql<=costoSqlIdoneo*1.3?'#f0a830':'#f07050');

  // ---- Valores del bloque activo ----
  const blkSpent=_num(m.adSpent), blkReg=_num(m.registros), blkSql=_num(m.sql);
  const blkCostReg=blkReg>0?blkSpent/blkReg:null;
  const blkCostSql=blkSql>0?blkSpent/blkSql:null;
  const blkCpm=(m.cpm===undefined||m.cpm===null||m.cpm==='')?null:Number(m.cpm);
  const blkCpc=(m.cpc===undefined||m.cpc===null||m.cpc==='')?null:Number(m.cpc);
  let _blkSqlColor='#fff';
  if(blkCostSql!==null&&costoSqlIdoneo!==null) _blkSqlColor=(blkCostSql<=costoSqlIdoneo?'#4ecfa0':blkCostSql<=costoSqlIdoneo*1.3?'#f0a830':'#f07050');

  // ---- Eleccion segun el toggle ----
  const _isHist=(S.metricsView!=='bloque');
  const disp={
    costReg:_isHist?costPorReg:blkCostReg,
    costSql:_isHist?costPorSql:blkCostSql,
    sqlColor:_isHist?_sqlColor:_blkSqlColor,
    reg:_isHist?accReg:blkReg,
    sql:_isHist?accSql:blkSql,
    spent:_isHist?accSpent:blkSpent,
    cpm:_isHist?accCpm:blkCpm,
    cpc:_isHist?accCpc:blkCpc,
    dias:_isHist?diasHist:daysActive,
    tag:_isHist?'historico':('bloque '+(al?.version||'activo'))
  };

  document.getElementById('main-content').innerHTML=`
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:38px;height:38px;border-radius:9px;background:${BG_COLORS[c.color%BG_COLORS.length]};color:${COLORS[c.color%COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600">${c.avatar}</div>
        <div><div class="page-title">${c.name}</div><div class="page-sub">${c.industry} - ${c.conversionLines.length} linea${c.conversionLines.length!==1?'s':''} de conversion</div></div>
      </div>
      <div class="topbar-actions">
        <span class="pill ${pillClass(c.health.color)}">${c.health.label}</span>
        <button class="btn" onclick="openEditHealthModal(${c.id})">? Salud</button>
        <button class="btn" onclick="openSyncModal()" style="border-color:rgba(29,158,117,0.4);color:#4ecfa0"> Sheet</button>
        <button class="btn" onclick="openNewLineModal(${c.id})">? Nueva linea</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteClient(${c.id})"></button>
      </div>
    </div>
    <div class="content">
      <div class="health-wrap">
        <div><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Salud del embudo</div>
          <div class="health-score-big" style="color:${hc(c.health.color)}">${c.health.score!==null?c.health.score+'<span>/100</span>':'<span style="font-size:18px;font-style:italic">Sin score</span>'}</div>
        </div>
        <div class="health-right">
          <div class="health-label-row">
            <span class="pill ${pillClass(c.health.color)}">${c.health.label}</span>
            <span style="font-size:11px;color:var(--text3)">Linea activa: ${al?.version||'-'} - ${daysActive!==null?daysActive+' dias':'-'}</span>
          </div>
          <div class="health-track"><div class="health-fill" style="background:${hc(c.health.color)};width:${c.health.score!==null?c.health.score:0}%"></div></div>
          <div class="health-ticks"><span class="health-tick">Critico</span><span class="health-tick">Atencion</span><span class="health-tick">Saludable</span><span class="health-tick">?ptimo</span></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-bottom:10px">
        <span style="font-size:11px;color:var(--text3);margin-right:4px;text-transform:uppercase;letter-spacing:0.05em">Metricas:</span>
        <button class="btn btn-sm" onclick="setMetricsView('historico')" style="${_isHist?'border-color:rgba(29,158,117,0.5);color:#4ecfa0':'color:var(--text3)'}">Historico</button>
        <button class="btn btn-sm" onclick="setMetricsView('bloque')" style="${!_isHist?'border-color:rgba(29,158,117,0.5);color:#4ecfa0':'color:var(--text3)'}">Bloque activo</button>
      </div>
      <div class="metrics-row">
        <div class="metric-card"><div class="metric-label">Costo / registro</div><div class="metric-value" style="color:${disp.costReg!==null?'#4ecfa0':'#fff'}">${_money(disp.costReg)}</div><div class="metric-delta" style="color:var(--text3)">${disp.tag}</div></div>
        <div class="metric-card"><div class="metric-label">Costo / SQL</div><div class="metric-value" style="color:${disp.sqlColor}">${_money(disp.costSql)}</div><div class="metric-delta" style="color:var(--text3)">${costoSqlIdoneo!==null?'idoneo '+_money(costoSqlIdoneo):disp.tag}</div></div>
        <div class="metric-card"><div class="metric-label">Registros</div><div class="metric-value">${disp.reg||0}</div></div>
        <div class="metric-card"><div class="metric-label">SQLs</div><div class="metric-value">${disp.sql||0}</div></div>
        <div class="metric-card"><div class="metric-label">Ad Spent</div><div class="metric-value">${_money(disp.spent)}</div></div>
        <div class="metric-card"><div class="metric-label">CPM${_isHist?' prom.':''}</div><div class="metric-value">${_money(disp.cpm)}</div></div>
        <div class="metric-card"><div class="metric-label">CPC${_isHist?' prom.':''}</div><div class="metric-value">${_money(disp.cpc)}</div></div>
        <div class="metric-card"><div class="metric-label">Dias${_isHist?'':' activa'}</div><div class="metric-value">${disp.dias!==null?disp.dias:'-'}</div></div>
      </div>
      <div class="tabs">
        <button class="tab ${S.tab==='lineas'?'active':''}" onclick="switchTab('lineas')">Lineas de conversion</button>
        <button class="tab ${S.tab==='success'?'active':''}" onclick="switchTab('success')">Success tracker</button>
        <button class="tab ${S.tab==='ads'?'active':''}" onclick="switchTab('ads')">Ads & Guiones</button>
        <button class="tab ${S.tab==='diagnostico'?'active':''}" onclick="switchTab('diagnostico')">Diagnostico</button>
        <button class="tab ${S.tab==='timeline'?'active':''}" onclick="switchTab('timeline')">Historial</button>
        <button class="tab ${S.tab==='ventas'?'active':''}" onclick="switchTab('ventas')">Conversion de ventas</button>
        <button class="tab ${S.tab==='tareas'?'active':''}" onclick="switchTab('tareas')">Tareas</button>
      </div>
      <div id="tab-content"></div>
    </div>`;
  renderTab();
}

function switchTab(t){S.tab=t;document.querySelectorAll('.tab').forEach(el=>{el.classList.toggle('active',el.textContent.trim().toLowerCase().startsWith({lineas:'li',success:'su',ads:'ad',diagnostico:'di',timeline:'hi',ventas:'co',tareas:'ta'}[t]))});renderTab();}

    el.innerHTML=`
      <div class="cl-table-wrap">

          <thead><tr>
            <th style="min-width:130px;position:sticky;left:0;background:var(--bg2)">Metrica</th>

                <span style="font-size:12px;font-weight:500;color:${l.status==='activa'?'#4ecfa0':'var(--text2)'}">${l.version}</span>
                ${l.status==='activa'?'<span class="pill pill-green" style="font-size:9px;padding:1px 6px">activa</span>':''}
                <button class="btn btn-ghost btn-sm btn-icon" onclick="openEditLineModal(${c.id},'${l.id}')" title="Editar" style="margin-left:auto;font-size:11px">?</button>
              </div>
            </th>`).join('')}
          </tr></thead>
          <tbody>
            ${ROWS.map(r=>`<tr>
              <td class="row-label" style="position:sticky;left:0">${r.label}</td>
              ${c.conversionLines.map(l=>`<td class="${l.status==='activa'?'active-col':''}">${r.get(l)}</td>`).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="notes-area">
        ${c.conversionLines.map(l=>`<div style="margin-bottom:5px"><strong>${l.version}:</strong> ${l.notes}</div>`).join('')}
      </div>
      ${c.conversionLines.some(l=>l.adsets?.length)?`
      <div style="margin-top:16px">
        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">Adsets & Ads - Linea activa</div>
        ${(c.conversionLines.find(l=>l.status==='activa')||c.conversionLines[c.conversionLines.length-1])?.adsets?.map(adset=>`
          <div class="adset-block">

                ${adset.audience?`<div class="adset-audience">${adset.audience}</div>`:''}
              </div>
              <span class="pill pill-gray" style="font-size:10px">${adset.ads?.length||0} ads</span>
            </div>
            <div class="ads-list">
              ${(adset.ads||[]).map((ad,ai)=>`

                  <div class="ad-header" onclick="toggleAd(this)">

  else if(S.tab==='success'){

    const guarColor = guarPct>=80?'#1D9E75':guarPct>=50?'#BA7517':'#D85A30';

    // Timeline hitos
    const hitos = c.milestones||[];

    el.innerHTML=`
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px">

            <div style="font-size:14px;font-weight:500;color:#fff">Reporte para llamada</div>

        </div>

        <div class="st-contract">
          <span style="font-size:18px;color:#4ecfa0"></span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500;color:#fff">${contract.fileName||'Contrato vinculado'}</div>

          </div>
          <div style="display:flex;gap:6px">
            ${contract.driveUrl?`<button class="btn btn-sm" onclick="window.open('${contract.driveUrl}','_blank')"> Abrir</button>`:''}
            <button class="btn btn-sm" onclick="removeContract(${c.id})">x</button>
          </div>
        </div>`:`
        <div style="margin-bottom:16px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">Vincular contrato desde Google Drive <span style="cursor:pointer;color:var(--green)" onclick="openAnthropicKeyModal()">? API key IA</span></div>

            <input id="contract-upload-${c.id}" type="file" accept=".pdf,.doc,.docx" style="display:none" onchange="uploadContract(${c.id},this)">

        </div>`}

        ${contractLoaded && minDaily!==null ? `
        <div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px">Condiciones de garantia</div>
        <div class="st-grid" style="grid-template-columns:repeat(2,1fr)">

          <div style="font-size:13px;color:var(--text2)">? Analizando contrato con IA...</div>

        <div style="margin-bottom:20px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

          ${fathomCallsHTML(c)}

            <div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:500">Mapeo de cliente - palabras clave en titulo de reunion</div>
            <div style="display:flex;gap:8px">
              <input type="text" value="${(c.fathomKeywords||[]).join(', ')}" placeholder="Ej: Vado Devs, Vado, Perla" 
                onchange="updateFathomKeywords(${c.id},this.value)"
                style="flex:1;padding:6px 10px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:#fff;font-family:var(--font);outline:none">
            </div>
          </div>
        </div>

        <div style="height:0.5px;background:var(--border);margin-bottom:16px"></div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">

          <div class="st-tl-line"></div>
          ${hitos.map((h,hi)=>`
            <div style="position:relative;margin-bottom:16px">
              <div class="st-tl-dot" style="background:${{firma:'#1D9E75',lanzamiento:'#378ADD',cambio:'#BA7517',hito:'#7F77DD',alerta:'#D85A30'}[h.type]||'#555'};box-shadow:0 0 0 2px var(--bg)"></div>
              <div class="st-tl-card">
                <div class="st-tl-top">
                  <div class="st-tl-title">${h.title}</div>
                  <div style="display:flex;align-items:center;gap:6px">
                    <div class="st-tl-date">${h.date||''}</div>
                    <button class="btn btn-sm" style="padding:2px 6px;font-size:10px;color:var(--text3);border-color:transparent" onclick="removeMilestone(${c.id},${hi})">x</button>
                  </div>
                </div>
                ${h.body?`<div class="st-tl-body">${h.body}</div>`:''}
                ${h.tags?.length?`<div class="st-tl-tags">${h.tags.map(t=>`<span class="tl-tag">${t}</span>`).join('')}</div>`:''}
              </div>
            </div>`).join('')}
        </div>`}

        ${contractLoaded?`
        <div style="margin-top:16px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg)">
          <div style="font-size:11px;font-weight:500;color:var(--text);margin-bottom:8px">Condiciones extraidas del contrato <span style="color:var(--text3);font-weight:400">(editables)</span></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            <div><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Inversion min. diaria ($)</div>
              <input type="number" value="${minDaily||''}" placeholder="-" onchange="updateContractField(${c.id},'minDailyBudget',+this.value)" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:#fff;font-family:var(--font)"></div>
            <div><div style="font-size:10px;color:var(--text3);margin-bottom:4px">OCs garantizadas/mes</div>
              <input type="number" value="${minOCsMonth||''}" placeholder="-" onchange="updateContractField(${c.id},'minOCsMonth',+this.value)" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:#fff;font-family:var(--font)"></div>
            <div><div style="font-size:10px;color:var(--text3);margin-bottom:4px">OCs totales garantizadas</div>
              <input type="number" value="${totalOCs||''}" placeholder="-" onchange="updateContractField(${c.id},'totalOCs',+this.value)" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:#fff;font-family:var(--font)"></div>

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px">
            <div><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Fecha firma</div>
              <input type="date" value="${contract.startDate||''}" onchange="updateContractField(${c.id},'startDate',this.value)" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:#fff;font-family:var(--font);color-scheme:dark"></div>
            <div><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Duracion (dias)</div>
              <input type="number" value="${contractDays||''}" placeholder="-" onchange="updateContractField(${c.id},'durationDays',+this.value)" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:#fff;font-family:var(--font)"></div>
            <div><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Fecha vencimiento</div>
              <input type="date" value="${contract.endDate||''}" onchange="updateContractField(${c.id},'endDate',this.value)" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:#fff;font-family:var(--font);color-scheme:dark"></div>
          </div>
        </div>`:''}
      </div>`;
  }

  else if(S.tab==='ads'){
    const activeLine = c.conversionLines.find(l=>l.status==='activa')||c.conversionLines[c.conversionLines.length-1];
    if(!activeLine||!activeLine.adsets?.length){
      el.innerHTML=`<div class="empty"><div class="empty-icon"></div><div>No hay ads cargados en la linea activa.</div><div style="margin-top:6px;font-size:12px">Edita la linea activa y agrega adsets y ads.</div></div>`;
      return;
    }
    el.innerHTML=`<div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:13px;font-weight:500;color:#fff">Linea activa: <span style="color:#4ecfa0">${activeLine.version}</span></div>
      <button class="btn btn-sm" onclick="openEditLineModal(${c.id},'${activeLine.id}')">? Editar ads</button>
    </div>`+
    (activeLine.adsets||[]).map(adset=>`
      <div class="adset-block" style="margin-bottom:12px">
        <div class="adset-header">
          <div>
            <div class="adset-name">${adset.name||'Adset sin nombre'}</div>
            ${adset.audience?`<div class="adset-audience">${adset.audience}</div>`:''}
          </div>
          <span class="pill pill-gray" style="font-size:10px">${adset.ads?.length||0} ads</span>
        </div>
        <div class="ads-list">
          ${(adset.ads||[]).map(ad=>`
            <div class="ad-row">
              <div class="ad-header" onclick="toggleAd(this)">
                <div class="ad-name">${ad.name||'Ad sin nombre'}</div>
                <div class="ad-metrics-mini">
                  ${ad.cpl?`<span>CPL <strong style="color:#4ecfa0">$${ad.cpl}</strong></span>`:''}
                  ${ad.registros?`<span>Reg <strong>${ad.registros}</strong></span>`:''}
                  ${ad.ctr?`<span>CTR <strong>${ad.ctr}%</strong></span>`:''}
                </div>
                <span style="font-size:10px;color:var(--text3);margin-left:4px">?</span>
              </div>
              <div class="ad-body" style="display:none">
                <div class="ad-metrics-grid">
                  <div class="ad-metric"><div class="ad-metric-label">CPL</div><div class="ad-metric-val">${ad.cpl?'$'+ad.cpl:'-'}</div></div>
                  <div class="ad-metric"><div class="ad-metric-label">Registros</div><div class="ad-metric-val">${ad.registros||'-'}</div></div>
                  <div class="ad-metric"><div class="ad-metric-label">CTR</div><div class="ad-metric-val">${ad.ctr?ad.ctr+'%':'-'}</div></div>
                  <div class="ad-metric"><div class="ad-metric-label">CPC</div><div class="ad-metric-val">${ad.cpc?'$'+ad.cpc:'-'}</div></div>
                  <div class="ad-metric"><div class="ad-metric-label">Impresiones</div><div class="ad-metric-val">${ad.impresiones||'-'}</div></div>
                </div>
                ${ad.guion?`<div class="ad-guion">${ad.guion}</div>`:''}
                ${ad.link?`<a href="${ad.link}" target="_blank" class="ad-link" style="display:inline-block;margin-top:8px"> Ver en Meta Ads</a>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  else if(S.tab==='diagnostico'){
    const sqlLeads=(c.ghl&&c.ghl.opportunities||[]).filter(function(o){return o._sql;});
    const calls=c.fathomCalls||[];
    const noSql=sqlLeads.length===0;
    el.innerHTML=
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
      +'<div>'
      +'<div style="font-size:14px;font-weight:500;color:var(--text)">Analisis de SQLs</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:2px">'
      +(noSql?'Sin SQLs marcados - ve a Conversion de ventas y marca los leads calificados'
        :(sqlLeads.length+' SQLs + '+calls.length+' llamadas de Fathom'))
      +'</div></div>'
      +(noSql?'':'<button class="btn btn-sm btn-primary" id="sql-diag-btn" onclick="runSQLAnalysis('+c.id+')">Generar analisis</button>')
      +'</div>'
      +'<div id="sql-diag-result" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;font-size:12px;color:var(--text2);line-height:1.8;min-height:120px">'
      +(noSql
        ?'<span style="color:var(--text3)">Marca SQLs en la tab Conversion de ventas para activar el analisis.</span>'
        :(c._sqlAnalysis||'<span style="color:var(--text3)">Hace clic en "Generar analisis" - Claude va a cruzar los SQLs con las lineas de conversion y las llamadas de Fathom.</span>'))
      +'</div>';
  }

  else if(S.tab==='timeline'){
    el.innerHTML=`<div style="padding:4px 0">`+
      [...c.conversionLines].reverse().map((l,i,arr)=>`
        <div class="tl-item">
          <div class="tl-left">
            <div class="tl-dot" style="background:${l.status==='activa'?'#1D9E75':'#378ADD'}"></div>
            ${i<arr.length-1?'<div class="tl-line"></div>':''}
          </div>
          <div class="tl-content">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="tl-ver">${l.version}</div>
              ${l.status==='activa'?'<span class="pill pill-green" style="font-size:10px">activa</span>':''}
            </div>
            <div class="tl-dates">${fmtDateRange(l.dateStart,l.dateEnd)} - ${days(l.dateStart,l.dateEnd)!==null?days(l.dateStart,l.dateEnd)+' dias':'-'}</div>
            <div class="tl-note">${l.notes}</div>
            <div class="tl-tags">
              ${[l.campaign,l.filtro?`Filtro ${l.filtro}`:null,l.destino,l.metrics.cpl?`CPL $${l.metrics.cpl}`:null].filter(Boolean).map(t=>`<span class="tl-tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>`).join('')+'</div>';
  }
  else if(S.tab==='tareas'){
    var tasks=c.tasks||[];
    var overdue=tasks.filter(function(t){return !t.done&&t.due&&new Date(t.due)<new Date();});
    var pending=tasks.filter(function(t){return !t.done&&!(t.due&&new Date(t.due)<new Date());});
    var done=tasks.filter(function(t){return t.done;});
    var lastCall=(c.fathomCalls||[])[0];
    el.innerHTML=
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
      +'<div style="font-size:13px;font-weight:500;color:var(--text)">Tareas'
      +(overdue.length?' <span style="background:rgba(216,90,48,0.15);color:#f07050;padding:2px 8px;border-radius:20px;font-size:11px">'+overdue.length+' vencidas</span>':'')
      +'</div>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="btn btn-sm" onclick="addTaskManual('+c.id+')">+ Nueva</button>'
      +'<button class="btn btn-sm btn-primary" id="extract-tasks-btn" onclick="extractTasksFromCalls('+c.id+')">'
      +(lastCall?'Extraer de: '+esc(lastCall.date):'Sin llamadas')+'</button>'
      +'</div></div>'
      +(lastCall?'<div style="font-size:11px;color:var(--text3);margin-bottom:12px">Ultima llamada: '+esc(lastCall.title)+' ('+esc(lastCall.date)+')</div>':'')
      +(overdue.length
        ?'<div style="font-size:11px;font-weight:500;color:#f07050;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Vencidas</div>'
          +overdue.map(function(t){return renderTaskRow(t,c.id);}).join('')
        :'')
      +(pending.length
        ?'<div style="font-size:11px;font-weight:500;color:var(--text3);margin:'+(overdue.length?'16':'0')+'px 0 6px;text-transform:uppercase;letter-spacing:.5px">Pendientes</div>'
          +pending.map(function(t){return renderTaskRow(t,c.id);}).join('')
        :'<div style="padding:40px;text-align:center;color:var(--text3);font-size:12px">Sin tareas pendientes. Hace clic en Extraer para leer la ultima llamada.</div>')
      +(done.length
        ?'<div style="font-size:11px;font-weight:500;color:var(--text3);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.5px">Completadas</div>'
          +done.slice(0,5).map(function(t){return renderTaskRow(t,c.id);}).join('')
        :'');
  }

  else if(S.tab==='ventas'){
    renderVentasTab(c, el);
  }
}

// Modals
function openNewClientModal(){
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">Nuevo cliente</div>
        <div class="modal-sub">Crea el perfil del cliente. Despues podes agregar su primera linea de conversion.</div>
        <div class="form-2col">
          <div class="form-row"><label class="form-label">Nombre / empresa</label><input id="nc-name" placeholder="Ej: InmoMax SA" autofocus></div>
          <div class="form-row"><label class="form-label">Industria</label><input id="nc-industry" placeholder="Ej: Inmobiliaria"></div>
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="createClient()">Crear cliente</button>
        </div>
      </div>

function createClient(){
  const name=document.getElementById('nc-name').value.trim();
  const industry=document.getElementById('nc-industry').value.trim();
  if(!name)return;
  const ci=DB.clients.length%COLORS.length;
  DB.clients.push({
    id:Date.now(),name,industry,
    avatar:name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(),
    color:ci,health:{score:null,label:'Sin datos',color:'gray'},
    monthlyLeads:0,monthlyBudget:0,avgCPL:0,conversionLines:[],
    diagnosis:[{type:'info',title:'Cliente nuevo',body:'Registra la primera linea de conversion para activar el diagnostico.',icon:'',color:'blue'}]
  });
  save();closeModal();renderSidebar();showOverview();toast('Cliente creado OK');
}

function gv(id,type){
  const v=document.getElementById(id)?.value;
  if(v===''||v===null||v===undefined)return null;
  if(type==='float')return parseFloat(v)||null;
  if(type==='int')return parseInt(v)||null;
  return v;
}

function saveLine(clientId, lineId){
  const c=DB.clients.find(x=>x.id===clientId);
  const isEdit=!!lineId;
  // FIX: normalize dates to YYYY-MM-DD on save
  const rawStart=gv('nl-start');
  const rawEnd=gv('nl-end');
  const data={
    id:lineId||('l'+Date.now()),
    version:gv('nl-ver')||('v'+(c.conversionLines.length+(isEdit?0:1))),
    dateStart:rawStart?toInputDate(rawStart):null,
    dateEnd:rawEnd?toInputDate(rawEnd):null,
    campaign:gv('nl-campaign')||'',adset:gv('nl-adset')||'',ad:gv('nl-ad')||'',
    filtro:gv('nl-filtro'),destino:gv('nl-dest'),
    metrics:{
      adSpent:gv('nl-spent','float'),pageViews:gv('nl-pv','int'),
      cpm:gv('nl-cpm','float'),cpc:gv('nl-cpc','float'),
      optIn:gv('nl-optin','float'),cpl:gv('nl-cpl','float'),
      registros:gv('nl-reg','int'),sql:gv('nl-sql','int')
    },
    notes:gv('nl-note')||'',
    adsets:getModalAdsets(),
    status:isEdit?(c.conversionLines.find(x=>x.id===lineId)?.status||'historico'):'activa'
  };
  if(!isEdit){
    c.conversionLines.forEach(l=>l.status='historico');
    c.conversionLines.push(data);
    const reg=data.metrics.registros||0,cpl=data.metrics.cpl||0;
    if(reg>0&&cpl>0){c.monthlyLeads=reg;c.avgCPL=cpl;c.monthlyBudget=Math.round(cpl*reg);}
  } else {
    const idx=c.conversionLines.findIndex(x=>x.id===lineId);
    if(idx>=0)c.conversionLines[idx]={...c.conversionLines[idx],...data};
  }
  save();closeModal();renderClient();toast(isEdit?'Linea actualizada OK':'Linea guardada OK');
}

function uploadContract(clientId, inputEl){
  const c=DB.clients.find(x=>x.id===clientId);
  if(!c||!inputEl.files[0]) return;
  const f=inputEl.files[0];
  if(!c.contract) c.contract={};
  c.contract.fileName=f.name;
  c.contract.fileSize=Math.round(f.size/1024)+'KB';
  c.contract.driveUrl=null;
  save();renderTab();
  // Read file as base64 for PDF or text
  const reader=new FileReader();
  reader.onload=ev=>{
    const base64=ev.target.result.split(',')[1];
    const key=localStorage.getItem('evold-anthropic-key')||'';
    if(!key){
      openAnthropicKeyModal();
      // Store file data temporarily so user can retry after entering key
      if(c.contract) c.contract._pendingFile={base64,name:f.name,type:f.type};
      save();renderTab();
      return;
    }
    extractContractWithAI(clientId, {base64, name:f.name, type:f.type}, null);
  };
  reader.readAsDataURL(f);
}

async function extractContractWithAI(clientId, file, driveUrl){
  const c=DB.clients.find(x=>x.id===clientId);
  if(!c) return;
  // Check API key FIRST before anything
  const anthropicKey = localStorage.getItem('evold-anthropic-key')||'';
  if(!anthropicKey){
    openAnthropicKeyModal();
    // After modal closes, user must re-upload - clear the analyzing state
    if(c.contract) { c.contract._analyzing=false; }
    save(); renderTab();
    return;
  }
  // Mark as analyzing in UI
  if(c.contract) c.contract._analyzing=true;
  save(); renderTab();
  toast('Analizando contrato con IA...');
  try {
    let messages;
    if(file){
      messages=[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:file.type||'application/pdf',data:file.base64}},
        {type:'text',text:'Extrae del contrato los siguientes campos y responde SOLO con un JSON valido sin markdown ni texto extra: { "minDailyBudget": numero en USD por dia, "minOCsMonth": numero de OCs/registros calificados garantizados por mes, "totalOCs": numero total de OCs garantizadas en el contrato, "durationDays": duracion del contrato en dias, "startDate": fecha de firma en formato YYYY-MM-DD o null, "endDate": fecha de vencimiento en formato YYYY-MM-DD o null, "signDate": fecha de firma en formato DD/MM/YYYY o null }'}
      ]}];
    } else {
      // Drive URL - can't access directly, skip AI and let user fill manually
      const c2=DB.clients.find(x=>x.id===clientId);
      if(c2){const el=document.getElementById('st-analyzing-'+clientId);if(el)el.closest('div').remove();}
      toast('Contrato vinculado. Completa las condiciones manualmente.');
      return;
    }
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:600,messages})
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(`API ${res.status}: ${err?.error?.message||res.statusText}`);
    }
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    let extracted;
    try{ extracted=JSON.parse(clean); }
    catch(pe){ throw new Error('Respuesta invalida del modelo: '+text.slice(0,100)); }
    Object.entries(extracted).forEach(([k,v])=>{if(v!==null&&v!==undefined) c.contract[k]=v;});
    c.contract._analyzing=false;
    save();renderTab();
    toast('Contrato analizado OK');
  } catch(e){
    if(c.contract) c.contract._analyzing=false;
    save();renderTab();
    toast('Error: '+e.message,'red');
    console.error('Contract AI error:',e);
  }
}

function importFathomJSON(clientId){
  const c=DB.clients.find(x=>x.id===clientId);
  if(!c) return;
  const raw=document.getElementById('fathom-json-input').value.trim();
  let calls=[];
  try{
    const clean=raw.replace(/` + '```' + `json|` + '```' + `/g,'').trim();
    calls=JSON.parse(clean);
    if(!Array.isArray(calls)) throw new Error();
  }catch(e){
    toast('JSON invalido, revisa el formato','red');
    return;
  }
  if(!calls.length){toast('No hay llamadas en el JSON','red');return;}
  c.fathomCalls=calls;
  const existingIds=new Set((c.milestones||[]).map(m=>m.fathomId).filter(Boolean));
  const newMilestones=calls
    .filter(cl=>!existingIds.has(cl.id))
    .map(cl=>({
      type:cl.sentiment==='satisfecho'?'hito':'alerta',
      title:cl.title,
      date:cl.date,
      body:cl.summary+(cl.actionItems&&cl.actionItems.length?'\n\nAction items: '+cl.actionItems.join(', '):'')+(cl.riskFlags&&cl.riskFlags.length?'\n\nRiesgos: '+cl.riskFlags.join(', '):''),
      tags:[cl.sentiment==='satisfecho'?'Llamada':'Llamada - atencion',cl.duration].filter(Boolean),
      fathomId:cl.id
    }));
  if(!c.milestones) c.milestones=[];
  c.milestones=[...c.milestones,...newMilestones];
  c.milestones.sort((a,b)=>b.date.split('/').reverse().join('').localeCompare(a.date.split('/').reverse().join('')));
  save();closeModal();renderTab();
  toast(calls.length+' llamadas importadas');
}

// ---------- Reporte de llamada con IA ----------
function buildReportContext(c){
  const contract = c.contract||{};
  const lines = (c.conversionLines||[]).map(function(l){
    var m = l.metrics||{};
    return {
      bloque: l.version||l.blockKey||'-',
      estado: l.status||'-',
      rango: (l.dateStart||'?')+' a '+(l.dateEnd||'actual'),
      campana: l.campaign||'-',
      filtro: l.filtro||'-',
      destino: l.destino||'-',
      adSpent: m.adSpent, cpl: m.cpl, cpm: m.cpm, cpc: m.cpc,
      optIn: m.optIn, registros: m.registros, sql: m.sql, pageViews: m.pageViews,
      nota: l.notes||''
    };
  });
  const hitos = (c.milestones||[]).map(function(h){
    return { tipo:h.type, titulo:h.title, fecha:h.date, detalle:h.body||'' };
  });
  const llamadas = (c.fathomCalls||[]).map(function(cl){
    return {
      titulo: cl.title, fecha: cl.date, sentiment: cl.sentiment,
      resumen: cl.summary||'',
      actionItems: cl.actionItems||[],
      riesgos: cl.riskFlags||[]
    };
  });
  // ---- Matematica del contrato (pre-calculada para que la IA no haga cuentas) ----
  const r2=function(n){return (n===null||n===undefined||isNaN(n))?null:Math.round(n*100)/100;};
  const minDaily=contract.minDailyBudget||null;
  const durationDays=contract.durationDays||null;
  const totalOCs=contract.totalOCs||null;
  const minOCsMonth=contract.minOCsMonth||null;
  const inversionTotalContrato=(minDaily&&durationDays)?minDaily*durationDays:null;
  const costoSqlIdoneo=(inversionTotalContrato&&totalOCs)?inversionTotalContrato/totalOCs:null;
  const ocsAcumuladas=(c.conversionLines||[]).reduce(function(s,l){var v=l.metrics&&l.metrics.sql;return s+((v!==null&&v!==undefined)?Number(v):0);},0);
  const inversionAcumulada=(c.conversionLines||[]).reduce(function(s,l){return s+((l.metrics&&l.metrics.adSpent)||0);},0);
  const diasTranscurridos=days(contract.startDate, null)|| (c.conversionLines[0]?days(c.conversionLines[0].dateStart,null):null);
  const dailySpendReal=(inversionAcumulada&&diasTranscurridos)?inversionAcumulada/diasTranscurridos:null;
  const costoSqlReal=(inversionAcumulada&&ocsAcumuladas>0)?inversionAcumulada/ocsAcumuladas:null;
  const ocsEsperadasAHoy=(totalOCs&&durationDays&&diasTranscurridos)?Math.round(totalOCs/durationDays*diasTranscurridos):null;
  // Remediacion si el costo real supera el idoneo
  let inversionExtra=null, diasExtension=null;
  if(costoSqlReal!==null&&costoSqlIdoneo!==null&&costoSqlReal>costoSqlIdoneo&&totalOCs&&minDaily){
    inversionExtra=totalOCs*costoSqlReal-inversionTotalContrato;
    diasExtension=Math.round(inversionExtra/minDaily);
  }
  let estadoCosto='sin_datos';
  if(costoSqlReal!==null&&costoSqlIdoneo!==null) estadoCosto=(costoSqlReal<=costoSqlIdoneo)?'en_o_bajo_idoneo':'sobre_idoneo';
  const estadoRitmo=(ocsEsperadasAHoy!==null)?(ocsAcumuladas>=ocsEsperadasAHoy?'en_ritmo':'atrasado'):'sin_datos';
  const presupuestoSubejecutado=(dailySpendReal!==null&&minDaily!==null)?(dailySpendReal < minDaily*0.8):null;

  return {
    cliente: c.name,
    tipo: c.subtitle||'',
    objetivos: {
      inversionDiariaMin: minDaily,
      ocsMensualesGarantizadas: minOCsMonth,
      ocsTotalesGarantizadas: totalOCs,
      duracionDias: durationDays,
      cplObjetivo: c.targetCPL||null,
      fechaFirma: contract.signDate||null,
      vencimiento: contract.endDate||null
    },
    metricasCalculadas: {
      inversionTotalContrato: r2(inversionTotalContrato),
      costoSqlIdoneo: r2(costoSqlIdoneo),
      ocsAcumuladas: ocsAcumuladas,
      inversionAcumulada: r2(inversionAcumulada),
      diasTranscurridos: diasTranscurridos,
      dailySpendReal: r2(dailySpendReal),
      costoSqlReal: r2(costoSqlReal),
      ocsEsperadasAHoy: ocsEsperadasAHoy,
      estadoCosto: estadoCosto,
      estadoRitmo: estadoRitmo,
      presupuestoSubejecutado: presupuestoSubejecutado,
      inversionExtraParaCumplir: r2(inversionExtra),
      diasExtensionParaCumplir: diasExtension
    },
    lineasDeConversion: lines,
    hitosYCambios: hitos,
    llamadas: llamadas
  };
}

function reportToPlainText(r){
  let out = (r.titulo||'Reporte')+'\n';
  if(r.periodo) out += 'Periodo: '+r.periodo+'\n';
  out += '\n';
  (r.secciones||[]).forEach(function(s){
    out += (s.titulo||'').toUpperCase()+'\n';
    (s.items||[]).forEach(function(it){ out += '  - '+it+'\n'; });
    out += '\n';
  });
  return out.trim();
}

function copyCallReport(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.lastReport) return;
  const txt=reportToPlainText(c.lastReport);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('Reporte copiado OK');},function(){toast('No se pudo copiar','red');});
  } else {
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast('Reporte copiado OK');}catch(e){toast('No se pudo copiar','red');}
    document.body.removeChild(ta);
  }
}

function downloadCallReport(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.lastReport) return;
  const txt=reportToPlainText(c.lastReport);
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='reporte-'+(c.name||'cliente').toLowerCase().replace(/\s+/g,'-')+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Reporte descargado');
}

function loadScriptOnce(src){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src=src; s.async=true;

    document.head.appendChild(s);
  });
}
async function ensurePptx(){
  if(typeof PptxGenJS!=='undefined') return true;
  var urls=[
    'https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js',

    'https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js'
  ];
  for(var i=0;i<urls.length;i++){

}

async function getGoogleToken(){
  await loadGis();
  return new Promise(function(resolve,reject){

    if(!_gisTokenClient){
      _gisTokenClient=google.accounts.oauth2.initTokenClient({
        client_id:GOOGLE_CLIENT_ID,
        scope:'https://www.googleapis.com/auth/drive.file',
        callback:function(resp){
          if(resp && resp.access_token){ _gAccessToken=resp.access_token; if(_pendingTokenResolve)_pendingTokenResolve(resp.access_token); }
          else { if(_pendingTokenReject)_pendingTokenReject(new Error('No se obtuvo permiso de Google')); }
        },
        error_callback:function(){ if(_pendingTokenReject)_pendingTokenReject(new Error('Login de Google cancelado')); }
      });
    }
    try{ _gisTokenClient.requestAccessToken({prompt: _gAccessToken?'':'consent'}); }
    catch(e){ reject(e); }
  });

async function syncGhl(clientId, silent){
  const c=DB.clients.find(function(x){return x.id===clientId;}); if(!c) return;
  const proxy=getGhlProxy();
  c.ghl=c.ghl||{};
  if(!proxy.url||!proxy.secret){ if(!silent) toast('Configura primero la conexion con GHL','red'); return; }
  if(!c.ghl.token||!c.ghl.locationId){ if(!silent) toast('Falta el token o el location del cliente','red'); return; }
  if(c.ghl._syncing) return;
  c.ghl._syncing=true; if(!silent) toast('Sincronizando con GHL...'); renderTab();
  const pageLimit=100; // fetch 100 per page
  const controller=new AbortController();
  const timer=setTimeout(function(){ controller.abort(); }, 180000);
  try{
    // Paginate through all opportunities
    var allOpps=[];
    var startAfter=null;
    var page=1;
    while(true){
      var u=proxy.url+(proxy.url.indexOf('?')>=0?'&':'?')
        +'secret='+encodeURIComponent(proxy.secret)
        +'&token='+encodeURIComponent(c.ghl.token)
        +'&location='+encodeURIComponent(c.ghl.locationId)
        +'&action=opportunities&limit='+pageLimit;
      if(startAfter) u+='&startAfter='+encodeURIComponent(startAfter);
      toast('Sincronizando pagina '+page+'... ('+allOpps.length+' hasta ahora)');
      const res=await fetch(u, {method:'GET', signal:controller.signal});
      const text=await res.text();
      let data;
      try{ data=JSON.parse(text); }
      catch(pe){ throw new Error('El proxy no devolvio JSON. Empieza con: '+text.slice(0,80)); }
      if(!data || data.ok===false) throw new Error((data&&data.error)||'Respuesta invalida del proxy');
      const batch=data.opportunities||[];
      allOpps=allOpps.concat(batch);
      // Stop conditions
      const metaTotal=data.meta&&data.meta.total ? parseInt(data.meta.total) : null;
      if(metaTotal && allOpps.length >= metaTotal){ break; } // got all
      if(batch.length < pageLimit){ break; } // last page - got fewer than requested
      // Only paginate if startAfter is a NEW value we haven't used
      const nextSA=data.meta&&data.meta.startAfter;
      if(!nextSA || nextSA===startAfter){ break; } // no new cursor
      startAfter=nextSA;
      page++;
      if(page>5) break; // safety: max 500
    }
    clearTimeout(timer);
    c.ghl.opportunities=allOpps;
    c.ghl.lastSync=new Date().toISOString();
    c.ghl._syncing=false; save();
    toast(allOpps.length+' oportunidades sincronizadas');
    renderTab();
    enrichContactsBackground(c, proxy);
  }catch(e){
    clearTimeout(timer);
    c.ghl._syncing=false;
    c.ghl._syncError=e.name==='AbortError'?'Tardo demasiado. Reintenta.':(e.message||'fallo la sincronizacion');
    save();
    const msg='Error GHL: '+c.ghl._syncError;
    toast(msg,'red');
    console.error('GHL sync error',e);
    // Don't call renderTab here to avoid infinite loop
    const el=document.getElementById('tab-content');
    if(el) el.innerHTML='<div style="padding:20px;color:#f07050;font-size:13px">Error: '+c.ghl._syncError+'<br><button class="btn btn-sm" style="margin-top:10px" onclick="syncGhl('+clientId+',false)">Reintentar</button></div>';
  }
}

async function enrichContactsBackground(c, proxy){
  // Find opps that are missing utmAd or geo.location and have a contactId
  const toEnrich=(c.ghl.opportunities||[]).filter(function(o){
    return o.contactId && (!o.source.utmAd || !o.geo.location);
  });
  if(!toEnrich.length) return;
  const base=proxy.url+(proxy.url.indexOf('?')>=0?'&':'?')
    +'secret='+encodeURIComponent(proxy.secret)
    +'&token='+encodeURIComponent(c.ghl.token)
    +'&location='+encodeURIComponent(c.ghl.locationId);
  var enriched=0;
  for(var i=0;i<toEnrich.length;i++){
    var opp=toEnrich[i];
    try{
      var url=base+'&action=contact&contactId='+encodeURIComponent(opp.contactId);
      var res=await fetch(url);
      var data=await res.json();
      if(data.ok){
        if(data.utmAd) opp.source.utmAd=data.utmAd;
        if(data.location) opp.geo.location=data.location;
        if(data.utmCampaign && !opp.source.utmCampaign) opp.source.utmCampaign=data.utmCampaign;
        enriched++;
        if(enriched%10===0){ save(); }
      }
    }catch(e){}
    await new Promise(function(r){setTimeout(r,100);}); // 100ms between requests
  }
  if(enriched>0){ save(); renderTab(); toast(enriched+' contactos enriquecidos'); }
}

function _ghlAgo(iso){
  if(!iso) return 'nunca';
  const mins=Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if(mins<1) return 'recien'; if(mins<60) return 'hace '+mins+' min';
  const h=Math.floor(mins/60); if(h<24) return 'hace '+h+' h'; return 'hace '+Math.floor(h/24)+' d';
}

function renderVentasTab(c, el){
  const esc=function(s){return String(s===null||s===undefined?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
  const proxy=getGhlProxy();
  c.ghl=c.ghl||{};
  const header=function(right){
    return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px">'

      +'<div style="display:flex;gap:8px;align-items:center">'+(right||'')+'</div></div>';
  };

  // 1) Falta proxy
  if(!proxy.url||!proxy.secret){
    el.innerHTML=header('<button class="btn btn-primary" onclick="openGhlProxyModal()">Configurar conexion GHL</button>')
      +'<div class="empty"><div class="empty-icon"></div><div>Primero conecta GHL.</div>'
