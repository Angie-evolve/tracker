function changeMetaDays(clientId, days){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  var activeLine=c.conversionLines&&getActiveLine(c.conversionLines);
  if(!activeLine) return;
  if(days==='custom'){
    activeLine.metaDays='custom';
    if(!activeLine.metaSince){
      var now=new Date();
      activeLine.metaUntil=now.toISOString().slice(0,10);
      activeLine.metaSince=new Date(now-30*24*60*60*1000).toISOString().slice(0,10);
    }
    save();
    renderTab();
    return;
  }
  activeLine.metaDays=parseInt(days);
  save();
  syncMetaAds(clientId);
}

function changeMetaCustomRange(clientId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  var activeLine=c.conversionLines&&getActiveLine(c.conversionLines);
  if(!activeLine) return;
  var since=document.getElementById('meta-since-input').value;
  var until=document.getElementById('meta-until-input').value;
  if(!since||!until) return;
  activeLine.metaSince=since;
  activeLine.metaUntil=until;
  save();
  syncMetaAds(clientId);
}

function toggleCampaignInclude(clientId, lineId, campId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  var line=(c.conversionLines||[]).find(function(l){return l.id===lineId;});
  if(!line) return;
  line.excludedCampaigns=line.excludedCampaigns||[];
  var idx=line.excludedCampaigns.indexOf(campId);
  if(idx>=0) line.excludedCampaigns.splice(idx,1);
  else line.excludedCampaigns.push(campId);
  save();
  renderTab();
}

async function syncMetaAds(clientId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.metaToken||!c.metaAccountId) return;
  var btn=document.getElementById('meta-sync-btn');
  if(btn){btn.disabled=true;btn.textContent='Sincronizando...';}

  var token=c.metaToken;
  var actId='act_'+c.metaAccountId;
  var activeLine=c.conversionLines&&getActiveLine(c.conversionLines);
  // If no line exists, create a temporary meta-only line
  if(!activeLine){
    if(!c.conversionLines) c.conversionLines=[];
    activeLine={id:'meta-'+Date.now(),version:'Meta Ads',status:'activa',adsets:[],metaDays:30,metrics:{adSpent:null,pageViews:null,cpm:null,cpc:null,optIn:null,cpl:null,registros:null,sql:null}};
    c.conversionLines.push(activeLine);
    save();
  }

  // Date range from activeLine.metaDays
  var days=activeLine.metaDays||30;
  var now=new Date();
  var since, until;
  if(days==='custom'&&activeLine.metaSince&&activeLine.metaUntil){
    since=activeLine.metaSince;
    until=activeLine.metaUntil;
  } else {
    since=new Date(now-days*24*60*60*1000).toISOString().slice(0,10);
    until=now.toISOString().slice(0,10);
  }
  var timeRange='{"since":"'+since+'","until":"'+until+'"}';

  try{
    // Fetch campaigns with insights
    var insFields='spend,reach,impressions,frequency,clicks,cpc,ctr,cpm,actions,cost_per_action_type';
    var fieldsStr='id,name,status,daily_budget,lifetime_budget,insights.time_range('+timeRange+'){'+insFields+'}';
    var url='https://graph.facebook.com/v19.0/'+actId+'/campaigns'
      +'?fields='+encodeURIComponent(fieldsStr)
      +'&access_token='+token
      +'&limit=50';
    var resp=await fetch(url);
    var data=await resp.json();
    console.log('Meta campaigns response:', JSON.stringify(data).slice(0,500));
    if(data.error) throw new Error(data.error.message);

    var campaigns=data.data||[];
    if(!campaigns.length){toast('Sin campanas en ese periodo');if(btn){btn.disabled=false;btn.textContent='Sincronizar Meta';}return;}

    // Fetch adsets + ads for each campaign
    for(var ci=0;ci<campaigns.length;ci++){
      try{
        var adsetFieldsStr='id,name,status,daily_budget,lifetime_budget,insights.time_range('+timeRange+'){'+insFields+'}';
        var adsetUrl='https://graph.facebook.com/v19.0/'+campaigns[ci].id+'/adsets'
          +'?fields='+encodeURIComponent(adsetFieldsStr)
          +'&access_token='+token
          +'&limit=20';
        var asResp=await fetch(adsetUrl);
        var asData=await asResp.json();
        var adsets=asData.data||[];

        // Fetch ads for each adset
        for(var ai=0;ai<adsets.length;ai++){
          try{
            var adsFieldsStr='id,name,status,creative{id,name,thumbnail_url},insights.time_range('+timeRange+'){'+insFields+'}';
            var adsUrl='https://graph.facebook.com/v19.0/'+adsets[ai].id+'/ads'
              +'?fields='+encodeURIComponent(adsFieldsStr)
              +'&access_token='+token
              +'&limit=20';
            var adsResp=await fetch(adsUrl);
            var adsData=await adsResp.json();
            var adsList=(adsData.data||[]).map(function(ad){
              var ins=ad.insights&&ad.insights.data&&ad.insights.data[0];
              var m=extractIns(ins);
              return {
                id:ad.id,name:ad.name,status:ad.status,previewUrl:'',
                thumbnail:ad.creative&&ad.creative.thumbnail_url||'',
                spend:m.spend,impressions:m.impressions,reach:m.reach,frequency:m.frequency,
                clicks:m.clicks,ctr:m.ctr,cpc:m.cpc,cpm:m.cpm,
                leads:m.leads,cpl:m.cpl,
                landingViews:m.landingViews,costPerLanding:m.costPerLanding,
                thruPlays:m.thruPlays,costPerThruPlay:m.costPerThruPlay,
                results:m.results,costPerResult:m.costPerResult,
                igFollows:m.igFollows,igProfileVisits:m.igProfileVisits
              };
            });
            // Fetch preview URL for each ad
            for(var di=0;di<adsList.length;di++){
              try{
                var prevUrl='https://graph.facebook.com/v19.0/'+adsList[di].id+'/previews'
                  +'?ad_format=DESKTOP_FEED_STANDARD'
                  +'&access_token='+token;
                var prevResp=await fetch(prevUrl);
                var prevData=await prevResp.json();
                var iframe=(prevData.data&&prevData.data[0]&&prevData.data[0].body)||'';
                var match=iframe.match(/src="([^"]+fb\.me\/adspreview[^"]+)"/);
                if(match) adsList[di].previewUrl=match[1].replace(/&amp;/g,'&');
              }catch(e){}
            }
            adsets[ai].ads=adsList;
          }catch(e){ console.log('ads fetch error:',e.message); adsets[ai].ads=[]; }
        }
        console.log('adsets before map:', JSON.stringify(adsets.map(function(a){return {id:a.id,name:a.name,adsLen:a.ads&&a.ads.length};})));
        campaigns[ci].adsets=adsets.map(function(as){
          var ins=as.insights&&as.insights.data&&as.insights.data[0];
          var m=extractIns(ins);
          var bud=as.daily_budget||as.lifetime_budget||0;
          return {
            id:as.id,name:as.name,status:as.status,
            spend:m.spend,budget:parseFloat(bud/100||0).toFixed(0),
            impressions:m.impressions,reach:m.reach,frequency:m.frequency,
            clicks:m.clicks,ctr:m.ctr,cpc:m.cpc,cpm:m.cpm,
            leads:m.leads,cpl:m.cpl,
            landingViews:m.landingViews,costPerLanding:m.costPerLanding,
            thruPlays:m.thruPlays,costPerThruPlay:m.costPerThruPlay,
            results:m.results,costPerResult:m.costPerResult,
            igFollows:m.igFollows,igProfileVisits:m.igProfileVisits,
            ads:(as.ads||[])
          };
        });
        console.log('Adsets saved for camp '+campaigns[ci].id+':', campaigns[ci].adsets.map(function(a){return {id:a.id,name:a.name,ads:a.ads&&a.ads.length};}));
      }catch(e){ campaigns[ci].adsets=[]; }
    }

    // Helper to extract metrics from insights
    function extractIns(ins, budget){
      if(!ins) return {spend:0,impressions:0,reach:0,frequency:0,clicks:0,ctr:'0',cpc:'0',cpm:'0',leads:0,cpl:'',landingViews:0,thruPlays:0,costPerThruPlay:'',results:0,costPerResult:'',igFollows:0,igProfileVisits:0};
      var actions=ins.actions||[];
      function getAction(type){ var a=actions.find(function(x){return x.action_type===type;}); return a?parseInt(a.value||0):0; }
      function getActionF(type){ var a=actions.find(function(x){return x.action_type===type;}); return a?parseFloat(a.value||0):0; }
      var leads=getAction('lead')+getAction('onsite_conversion.lead_grouped')+getAction('onsite_conversion.messaging_first_reply')+getAction('onsite_web_lead');
      var landingViews=getAction('landing_page_view');
      var thruPlays=getAction('video_thruplay_watched');
      var igFollows=getAction('follow')+getAction('onsite_conversion.post_save');
      var igProfileVisits=getAction('onsite_conversion.messaging_first_reply');
      var spend=parseFloat(ins.spend||0);
      var results=leads||landingViews||parseInt(ins.clicks||0);
      // Cost per result from API
      var cpr='';
      var cprArr=ins.cost_per_action_type||[];
      if(cprArr.length) cpr=parseFloat(cprArr[0].value||0).toFixed(2);
      else if(results>0) cpr=(spend/results).toFixed(2);
      return {
        spend:spend,
        impressions:parseInt(ins.impressions||0),
        reach:parseInt(ins.reach||0),
        frequency:parseFloat(ins.frequency||0).toFixed(2),
        clicks:parseInt(ins.clicks||0),
        ctr:parseFloat(ins.ctr||0).toFixed(2),
        cpc:parseFloat(ins.cpc||0).toFixed(2),
        cpm:parseFloat(ins.cpm||0).toFixed(2),
        leads:leads,
        cpl:leads>0?(spend/leads).toFixed(2):'',
        landingViews:landingViews,
        costPerLanding:landingViews>0?(spend/landingViews).toFixed(2):'',
        thruPlays:thruPlays,
        costPerThruPlay:thruPlays>0?(spend/thruPlays).toFixed(2):'',
        results:results,
        costPerResult:cpr,
        igFollows:igFollows,
        igProfileVisits:igProfileVisits,
        budget:budget||0
      };
    }

    // Store campaigns with adsets included
    console.log('Saving campaigns:', campaigns.map(function(c){return {id:c.id,adsets:c.adsets&&c.adsets.length,ads:c.adsets&&c.adsets[0]&&c.adsets[0].ads&&c.adsets[0].ads.length};}));
    activeLine.metaCampaigns=campaigns.map(function(camp){
      var ins=camp.insights&&camp.insights.data&&camp.insights.data[0];
      var m=extractIns(ins);
      var bud=camp.daily_budget||camp.lifetime_budget||0;
      return {
        id:camp.id,name:camp.name,status:camp.status,
        spend:m.spend,budget:parseFloat(bud/100||0).toFixed(0),
        impressions:m.impressions,reach:m.reach,frequency:m.frequency,
        clicks:m.clicks,ctr:m.ctr,cpc:m.cpc,cpm:m.cpm,
        leads:m.leads,cpl:m.cpl,
        landingViews:m.landingViews,costPerLanding:m.costPerLanding,
        thruPlays:m.thruPlays,costPerThruPlay:m.costPerThruPlay,
        results:m.results,costPerResult:m.costPerResult,
        igFollows:m.igFollows,igProfileVisits:m.igProfileVisits,
        adsets:(camp.adsets||[])
      };
    });
    activeLine.metaSyncAt=new Date().toISOString();
    save();
    renderTab();
    toast('Meta sincronizado - '+campaigns.length+' campanas');
  }catch(e){
    toast('Error Meta: '+e.message,'red');
  }
  if(btn){btn.disabled=false;btn.textContent='Sincronizar Meta';}
}

function scheduleTask(clientId, taskId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  var t=(c.tasks||[]).find(function(x){return x.id===taskId;});
  if(!t) return;

  // Build Google Calendar URL for "Estrategia" calendar
  var title='['+c.name+'] '+t.text;
  var details='Tarea: '+t.text+(t.responsible?'\nResponsable: '+t.responsible:'')+(t.source?'\nDe: '+t.source:'');

  var calUrl='https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent(title)
    +'&details='+encodeURIComponent(details)
    +(t.due?'&dates='+t.due.replace(/-/g,'')+'T120000/'+t.due.replace(/-/g,'')+'T130000':'')
    +'&ctz=America/Argentina/Buenos_Aires';

  // Mark as scheduled
  t.scheduled=true;
  t.scheduledAt=new Date().toISOString();
  save();
  renderTab();

  window.open(calUrl,'_blank');
  toast('Abriendo Calendar...');
}

function toggleTask(clientId, taskId, checked){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.tasks) return;
  var t=c.tasks.find(function(x){return x.id===taskId;});

    t.done=checked;
    if(checked) t.doneAt=new Date().toISOString(); else delete t.doneAt;
    save();
    if(S.view==='tickets') showTickets(); else renderTab();

}

function deleteTask(clientId, taskId){

  c.tasks=(c.tasks||[]).filter(function(x){return x.id!==taskId;});

}

    (c.tasks||[]).forEach(function(t){

      var n=parseInt(String(t.ticket).replace(/[^0-9]/g,''),10);
      if(!isNaN(n)&&n>max) max=n;

function confirmDelegate(clientId, taskId){
  var subjectEl=document.getElementById('delegate-subject');
  var bodyEl=document.getElementById('delegate-body');
  if(!subjectEl||!bodyEl) return;
  var subjectVal=subjectEl.value.trim();
  var bodyVal=bodyEl.value.trim();
  var t=window._pendingDelegate&&window._pendingDelegate.task;
  var c=DB.clients.find(function(x){return x.id===clientId;});
  var modal=document.getElementById('modal-root');

  // Save ticket number and mark task as delegated
  var usedTicket=window._pendingDelegate&&window._pendingDelegate.ticket||null;
  if(usedTicket) localStorage.setItem('evold-last-ticket',usedTicket);
  if(c){
    var task=(c.tasks||[]).find(function(x){return x.id===taskId;});
    if(task){task.delegated=true;task.delegatedAt=new Date().toISOString();task.ticket='#'+usedTicket;save();}
  }

  // Gmail compose URL
  var gmailUrl='https://mail.google.com/mail/?view=cm&to=ashy%40evolvemindhub.com'
    +'&su='+encodeURIComponent(subjectVal)
    +'&body='+encodeURIComponent(bodyVal);

  // Google Calendar URL
  var calUrl='';
  if(t&&t.due){
    var d=t.due.replace(/-/g,'');
    calUrl='https://calendar.google.com/calendar/render?action=TEMPLATE'
      +'&text='+encodeURIComponent('Deadline: '+t.text)
      +'&dates='+d+'T120000/'+d+'T121000'
      +'&details='+encodeURIComponent('Tarea delegada a Ashy: '+t.text)
      +'&add=ashy%40evolvemindhub.com';
  }

  // Write to Sheet via sheets proxy
  if(t&&c){
    var logUrl=TICKETS_PROXY
      +'?secret=evolve-tracker'
      +'&action=log_task'
      +'&ticket='+encodeURIComponent(usedTicket||'')
      +'&task='+encodeURIComponent(t.text||'')
      +'&client='+encodeURIComponent(c.name||'')
      +'&deadline='+encodeURIComponent(t.due||'')
      +'&responsible='+encodeURIComponent(t.responsible||'Ashy')
      +'&priority='+encodeURIComponent(t.priority||'');
    fetch(logUrl)
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok){
          localStorage.setItem('evold-last-ticket', usedTicket||'1');
          toast('Tarea #'+usedTicket+' registrada en el Sheet');
        }
      })
      .catch(function(){});
  }

  // Crear el borrador REAL en Gmail (casilla de Angie) via el script de tickets
  var _setSt=function(id,html){var e=document.getElementById(id);if(e)e.innerHTML=html;};
  var _sendDirect=(function(){
    var cb=document.getElementById('dg-send-direct');
    var v=cb?(cb.checked?'1':'0'):(localStorage.getItem('evold-delegate-send')||'0');
    localStorage.setItem('evold-delegate-send',v);
    return v==='1';
  })();
  fetch(TICKETS_PROXY+'?secret=evolve-tracker&action=create_draft'
      +'&to='+encodeURIComponent('ashy@evolvemindhub.com')
      +'&subject='+encodeURIComponent(subjectVal)
      +'&body='+encodeURIComponent(bodyVal)
      +(_sendDirect?'&send=1':''))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.ok){
        _setSt('dg-draft-st',_sendDirect&&d.sent
          ?'<span style="color:var(--accent)">Mail ENVIADO a ashy@evolvemindhub.com</span>'
          :'<span style="color:var(--accent)">Borrador creado en Gmail (Borradores de Angie) - solo falta apretar Enviar</span>');
        var gb=document.getElementById('dg-gmail-btn'); if(gb) gb.style.display='none';
      } else {
        _setSt('dg-draft-st','<span style="color:var(--amberx)">Borrador automatico no disponible ('+esc((d&&d.error)||'instala el addon en el script de tickets')+') - usa el boton de Gmail</span>');
      }
    })
    .catch(function(){_setSt('dg-draft-st','<span style="color:var(--amberx)">Borrador automatico no disponible - usa el boton de Gmail</span>');});

  // Crear el evento en el calendario "Tasks" (10 min, invita a Ashy)
  if(t&&t.due){
    fetch(TICKETS_PROXY+'?secret=evolve-tracker&action=create_event'
        +'&date='+encodeURIComponent(t.due)
        +'&title='+encodeURIComponent('[#TICKET-'+(usedTicket||'')+'] Deadline: '+(t.text||'').slice(0,80))
        +'&desc='+encodeURIComponent('Deadline para: '+(t.text||'')+'\n\nTicket: #'+(usedTicket||'')+'\nCliente: '+(c?c.name:'')+'\nAsignado a: Ashy'))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d&&d.ok){
          _setSt('dg-event-st','<span style="color:var(--accent)">Evento creado en Calendar ('+esc(d.calendar||'Tasks')+') - '+esc(t.due)+' 12:00, 10 min, Ashy invitada</span>');
          var cb=document.getElementById('dg-cal-btn'); if(cb) cb.style.display='none';
        } else {
          _setSt('dg-event-st','<span style="color:var(--amberx)">Evento automatico no disponible ('+esc((d&&d.error)||'instala el addon en el script de tickets')+') - usa el boton de Calendar</span>');
        }
      })
      .catch(function(){_setSt('dg-event-st','<span style="color:var(--amberx)">Evento automatico no disponible - usa el boton de Calendar</span>');});
  }

  if(modal) modal.innerHTML='<div class="modal-overlay"><div class="modal" style="max-width:480px">'
    +'<div class="modal-title" style="color:#1D9E75;margin-bottom:12px">Ticket #'+esc(String(usedTicket||''))+' delegado</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px;font-size:11.5px;margin-bottom:14px">'
    +'<div id="dg-draft-st" style="color:var(--text3)">'+(localStorage.getItem('evold-delegate-send')==='1'?'Enviando mail a Ashy...':'Creando borrador en Gmail...')+'</div>'
    +(t&&t.due?'<div id="dg-event-st" style="color:var(--text3)">Creando evento en Calendar (Tasks)...</div>':'<div style="color:var(--text3)">Sin deadline - no se crea evento de Calendar</div>')
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px">'
    +'<a id="dg-gmail-btn" href="'+gmailUrl+'" target="_blank" class="btn btn-primary" style="text-align:center;text-decoration:none;padding:10px 16px">'
    +'Abrir en Gmail - ashy@evolvemindhub.com</a>'
    +(calUrl?'<a id="dg-cal-btn" href="'+calUrl+'" target="_blank" class="btn btn-sm" style="text-align:center;text-decoration:none;padding:8px">'
      +'Crear evento en Calendar (deadline '+esc(t.due)+')</a>':'')
    +'</div>'
    +'<div style="margin-top:16px;display:flex;justify-content:flex-end">'
    +'<button class="btn btn-sm" onclick="_delegateClose()">Cerrar</button>'
    +'</div></div></div>';
}


async function extractTasksFromCalls(clientId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  var apiKey=localStorage.getItem('evold-anthropic-key');
  if(!apiKey){toast('Configura tu API key de Anthropic','red');return;}
  var calls=c.fathomCalls||[];
  if(!calls.length){toast('No hay llamadas de Fathom cargadas','red');return;}
  // Only use the latest call
  var lastCall=calls[0];
  var btn=document.getElementById('extract-tasks-btn');
  if(btn){btn.disabled=true;btn.textContent='Extrayendo...';}
  var callText='Llamada: '+lastCall.date+' - '+lastCall.title+'\n'+(lastCall.summary||'');
  var prompt='De esta llamada con el cliente '+c.name+', extrae TODAS las tareas y proximos pasos mencionados.\n\n'
    +callText+'\n\n'
    +'Responde SOLO con un array JSON valido, sin texto adicional, sin markdown:\n'
    +'[{"text":"descripcion concreta de la tarea","responsible":"nombre del responsable","due":"YYYY-MM-DD o vacio"}]\n'
    +'El responsable puede ser "Angie", el nombre del cliente, u otra persona mencionada.\n'
    +'Solo tareas concretas y accionables.';
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,messages:[{role:'user',content:prompt}]})
    });
    var data=await r.json();
    if(data.error) throw new Error(data.error.message);
    var text=data.content[0].text.trim();
    // Strip any markdown fences
    text=text.replace(/^[^\[]*\[/,'[').replace(/\][^\]]*$/,']');
    var extracted=JSON.parse(text);
    c.tasks=c.tasks||[];
    var added=0;
    extracted.forEach(function(t){
      var dup=(c.tasks||[]).some(function(e){return e.text.toLowerCase()===t.text.toLowerCase();});
      if(!dup){
        c.tasks.unshift({id:Date.now()+added,text:t.text,responsible:t.responsible||'',due:t.due||'',done:false,source:lastCall.date+' - '+lastCall.title});
        added++;
      }
    });
    save();renderTab();
    toast(added+' tareas extraidas de la ultima llamada');
  }catch(e){
    toast('Error: '+e.message,'red');
  }
  if(btn){btn.disabled=false;btn.textContent='Extraer de: '+esc(lastCall.date);}
}

async function runSQLAnalysis(clientId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  var apiKey=localStorage.getItem('evold-anthropic-key');
  if(!apiKey){toast('Configura tu API key de Anthropic primero','red');return;}
  var btn=document.getElementById('sql-diag-btn');
  var res=document.getElementById('sql-diag-result');
  if(btn){btn.disabled=true;btn.textContent='Analizando...';}
  if(res) res.innerHTML='<span style="color:var(--text3)">Generando analisis...</span>';

  var sqlLeads=(c.ghl&&c.ghl.opportunities||[]).filter(function(o){return o._sql;});
  var lines=c.conversionLines||[];

  function findLine(opp){
    var d=opp.createdAt?new Date(opp.createdAt):null;
    if(!d) return lines[lines.length-1]||null;
    for(var i=0;i<lines.length;i++){
      var s=lines[i].dateStart?new Date(lines[i].dateStart):null;
      var e=lines[i].dateEnd?new Date(lines[i].dateEnd):new Date();
      if(s&&d>=s&&d<=e) return lines[i];
    }
    return lines[lines.length-1]||null;
  }

  var leadText=sqlLeads.map(function(o,i){
    var l=findLine(o);
    return (i+1)+'. '+(o.contactName||o.name||'Lead')
      +' | Fecha: '+(o.createdAt?new Date(o.createdAt).toLocaleDateString('es-AR'):'-')
      +' | Anuncio: '+(o.source&&(o.source.utmAd||o.source.utmCampaign)||'sin dato')
      +' | Ubicacion: '+(o.geo&&(o.geo.location||o.geo.city)||'sin dato')
      +' | Stage: '+(o.pipelineStage||'sin dato')
      +' | Linea: '+(l?(l.version||l.campaign||'linea'):'sin dato');
  }).join('\n');

  var linesText=lines.map(function(l){
    return '- '+(l.version||'Linea')+': '+l.campaign
      +(l.dateStart?' desde '+l.dateStart:'')
      +(l.dateEnd?' hasta '+l.dateEnd:' (activa)')
      +(l.metrics&&l.metrics.cpl?' CPL $'+l.metrics.cpl:'');
  }).join('\n');

  var calls=c.fathomCalls||[];
  var callsText=calls.length?calls.slice(0,6).map(function(cl){
    return '- '+cl.date+' '+cl.title+(cl.summary?': '+cl.summary.substring(0,250):'');
  }).join('\n'):'Sin llamadas registradas';

  var prompt='Sos analista de performance para una agencia de software B2B.\n\n'
    +'CLIENTE: '+c.name+(c.industry?' ('+c.industry+')':'')+'\n\n'
    +'LEADS SQL ('+sqlLeads.length+'):\n'+leadText+'\n\n'
    +'LINEAS DE CONVERSION:\n'+linesText+'\n\n'
    +'LLAMADAS CON EL CLIENTE (Fathom):\n'+callsText+'\n\n'
    +'Analiza estos SQLs y genera un informe con estas secciones:\n'
    +'1. PATRON DE ANUNCIOS: que anuncios generaron mas SQLs\n'
    +'2. PERFIL GEOGRAFICO: de donde vienen\n'
    +'3. LINEA DE CONVERSION: en que bloque calificaron\n'
    +'4. VOZ DEL CLIENTE: que dijo el cliente sobre estos leads en las llamadas\n'
    +'5. RECOMENDACIONES: 3 acciones concretas para la proxima linea\n\n'
    +'Responde en espanol, conciso y accionable. Usa <strong> para titulos y <br><br> entre secciones.';

  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    var data=await r.json();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    if(!data.content||!data.content[0]) throw new Error('Respuesta vacia: '+JSON.stringify(data));
    var text=data.content[0].text||'Sin respuesta';
    c._sqlAnalysis=text;
    save();
    if(res) res.innerHTML=text;
  }catch(e){
    if(res) res.innerHTML='<span style="color:var(--redx)">Error: '+esc(e.message)+'</span>';
  }
  if(btn){btn.disabled=false;btn.textContent='Regenerar';}
}

function toggleSQL(clientId, oppId, checked){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.ghl||!c.ghl.opportunities) return;
  var opp=c.ghl.opportunities.find(function(o){return o.id===oppId;});
  if(!opp) return;
  opp._sql=checked;
  save();
  // Update SQL count in header metrics without full re-render
  var sqlCount=c.ghl.opportunities.filter(function(o){return o._sql;}).length;
  var el=document.getElementById('ghl-sql-count');
  if(el) el.textContent=sqlCount;
}

function saveColSelector(){
  const checks=document.querySelectorAll('#modal-root input[type=checkbox]');
  const selected=[];
  checks.forEach(function(ch){if(ch.checked) selected.push(ch.value);});
  if(!selected.length){toast('Selecciona al menos una columna','red');return;}
  const needsEnrich=['Anuncio','Fuente','Ubicacion','UTM campaign'];
  const wantsEnrich=selected.some(function(col){return needsEnrich.indexOf(col)>=0;});
  _ghlCols=selected;
  closeModal();
  renderTab();
  // If user selected a column that needs enrichment, start background enrichment
  if(wantsEnrich){
    const c=DB.clients.find(function(x){return x.id===S.clientId;});
    const proxy=getGhlProxy();
    if(c&&c.ghl&&c.ghl.opportunities&&proxy.url){
      toast('Cargando datos de contactos...');
      enrichContactsBackground(c, proxy);
    }
  }
}

async function openOppDetail(oppId){
  const c=DB.clients.find(function(x){return x.id===S.clientId;});
  if(!c) return;
  const opp=(c.ghl&&c.ghl.opportunities||[]).find(function(o){return o.id===oppId;});
  if(!opp) return;
  const _est=deriveEstado(opp);
  const stColor=_est.color;

  function renderModal(notes, loading, err){
    let notesHtml='';
    if(loading){
      notesHtml='<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">Cargando notas...</div>';
    } else if(err){
      notesHtml='<div style="padding:16px;color:var(--redx);font-size:12px">'+err+'</div>';
    } else if(!notes||!notes.length){
      notesHtml='<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">Sin notas registradas.</div>';
    } else {
      notesHtml=notes.map(function(n){
        const date=n.createdAt?new Date(n.createdAt).toLocaleDateString('es-AR'):'';
        if(n.isLink){
          return '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px">'
            +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
            +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;background:rgba(55,138,221,0.15);color:#6aabf0">Llamada grabada</span>'
            +(date?'<span style="font-size:10px;color:var(--text3)">'+date+'</span>':'')+'</div>'
            +(n.linkText?'<div style="font-size:12px;color:var(--text2);margin-bottom:6px">'+n.linkText+'</div>':'')
            +'<a href="'+n.linkUrl+'" target="_blank" style="font-size:12px;color:var(--green);text-decoration:none">Ver grabacion</a>'
            +'</div>';
        } else {
          return '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px">'
            +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
            +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--bg4);color:var(--text2)">Nota del closer</span>'
            +(date?'<span style="font-size:10px;color:var(--text3)">'+date+'</span>':'')+'</div>'
            +'<div style="font-size:12px;color:var(--text);line-height:1.6">'+n.body+'</div>'
            +'</div>';
        }
      }).join('');
    }
    const faHide2=['utm_ad','utm ad','timezone','time zone','zona horaria','ip','order id','payment status','email verified','phone verified','submission date','url'];
    const faAll=Object.keys(opp.formAnswers||{}).filter(function(k){var kl=k.toLowerCase().trim();return faHide2.indexOf(kl)<0 && String((opp.formAnswers||{})[k]||'').trim()!=='';});
    const faHtml=faAll.length?('<div style="margin-bottom:16px"><div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Respuestas del formulario</div>'
      +faAll.map(function(k){return '<div style="display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text3)">'+esc(k)+'</span><span style="color:var(--text2);text-align:right">'+esc((opp.formAnswers||{})[k])+'</span></div>';}).join('')
      +'</div>'):'';
    const tagsAll=opp.tags||[];
    const tagsHtml2=tagsAll.length?('<div style="margin-bottom:16px"><div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Tags</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:6px">'+tagsAll.map(function(t){return '<span class="pill" style="font-size:10px;padding:3px 9px;background:var(--bg3);border:0.5px solid var(--border);color:var(--text2)">'+esc(t)+'</span>';}).join('')+'</div></div>'):'';
    const utmHtml=(opp.source&&(opp.source.utmSource||opp.source.utmAd||opp.source.utmCampaign))?('<div style="margin-bottom:16px"><div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Origen (UTM)</div>'
      +[['UTM Source',opp.source.utmSource],['UTM Ad',opp.source.utmAd],['UTM Campaign',opp.source.utmCampaign]].filter(function(p){return p[1];}).map(function(p){return '<div style="display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text3)">'+p[0]+'</span><span style="color:var(--text2)">'+esc(p[1])+'</span></div>';}).join('')
      +'</div>'):'';
    document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
      +'<div class="modal" style="max-width:520px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">'
      +'<div><div class="modal-title">'+esc(opp.contactName||opp.name)+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">'
      +'<span style="font-size:11px;color:'+stColor+'">'+esc(_est.label)+'</span>'
      +(opp.pipelineStage?'<span style="font-size:11px;color:var(--text3)">'+esc(opp.pipelineStage)+'</span>':'')
      +(opp.monetaryValue?'<span style="font-size:11px;color:var(--text2)">'+money(opp.monetaryValue)+'</span>':'')
      +'</div></div>'
      +'<button class="btn btn-sm" onclick="closeModal()">Cerrar</button></div>'
      +tagsHtml2
      +utmHtml
      +faHtml
      +'<div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">Notas</div>'
      +'<div id="notes-content">'+notesHtml+'</div>'
      +'</div></div>';
  }

  renderModal(null, true, null);
  const proxy=getGhlProxy();
  if(!proxy.url||!proxy.secret||!c.ghl||!c.ghl.token){
    renderModal(null,false,'Configura la conexion con GHL primero'); return;
  }
  const base=proxy.url+(proxy.url.indexOf('?')>=0?'&':'?')
    +'secret='+encodeURIComponent(proxy.secret)
    +'&token='+encodeURIComponent(c.ghl.token)
    +'&location='+encodeURIComponent(c.ghl.locationId);
  try{
    // Fetch notes and contact in parallel
    const notesUrl=base+'&action=notes'+(opp.contactId?'&contactId='+encodeURIComponent(opp.contactId):'&opportunityId='+encodeURIComponent(oppId));
    const contactUrl=opp.contactId ? base+'&action=contact&contactId='+encodeURIComponent(opp.contactId) : null;
    const reqs=[fetch(notesUrl)];
    if(contactUrl) reqs.push(fetch(contactUrl));
    const responses=await Promise.all(reqs);
    const notesData=await responses[0].json();
    if(!notesData.ok) throw new Error(notesData.error||'Error al traer notas');
    if(responses[1]){
      const cData=await responses[1].json();
      if(cData.ok){
        if(cData.utmAd && !opp.source.utmAd) opp.source.utmAd=cData.utmAd;
        if(cData.location && !opp.geo.location) opp.geo.location=cData.location;
        if(cData.utmCampaign && !opp.source.utmCampaign) opp.source.utmCampaign=cData.utmCampaign;
        if(cData.utmSource && !opp.source.utmSource) opp.source.utmSource=cData.utmSource;
        const cTags=cData.tags||cData.contactTags||null;
        if(cTags && Array.isArray(cTags) && cTags.length) opp.tags=cTags;
        save();
      }
    }
    renderModal(notesData.notes,false,null);
  }catch(e){
    renderModal(null,false,e.message);
  }
}

// Init
function applyTheme(t){
  document.body.classList.toggle('light', t==='light');
  var b=document.getElementById('theme-toggle-btn');
  if(b) b.innerHTML=(t==='light'?'&#9789; Modo oscuro':'&#9788; Modo claro');
}
function toggleTheme(){
  var t=document.body.classList.contains('light')?'dark':'light';
  localStorage.setItem('evold-theme',t);
  applyTheme(t);
}
applyTheme(localStorage.getItem('evold-theme')||'dark');
load();
if(localStorage.getItem('evold-sidebar-collapsed')==='1'){
  document.getElementById('sidebar').classList.add('collapsed');
}
renderSidebar();showOverview();
</script>
