<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLD — Agency Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-bg: #E1F5EE;
  --green-text: #0F6E56;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --amber-text: #854F0B;
  --red: #D85A30;
  --red-bg: #FCEBEB;
  --red-text: #A32D2D;
  --blue: #378ADD;
  --blue-bg: #E6F1FB;
  --blue-text: #185FA5;
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2)}
.main{flex:1;overflow-y:auto;background:var(--bg)}

.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-text{font-size:20px;font-weight:600;letter-spacing:-0.5px;color:#fff}
.logo-text span{color:var(--green)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.08em}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-label{font-size:10px;font-weight:500;color:var(--text3);padding:10px 8px 4px;text-transform:uppercase;letter-spacing:0.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;color:var(--text2);font-size:13px;font-weight:400;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--text);border-color:var(--border)}
.nav-item-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.nav-item-info{flex:1;min-width:0}
.nav-item-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item-sub{font-size:10px;color:var(--text3);margin-top:1px}
.health-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}

.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)}
.page-title{font-size:16px;font-weight:500;color:#fff}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px}
.topbar-actions{display:flex;gap:8px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font)}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark);border-color:var(--green-dark)}
.btn-ghost{border-color:transparent}
.btn-ghost:hover{background:var(--bg3);border-color:var(--border)}
.btn-danger{border-color:rgba(216,90,48,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(216,90,48,0.08)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}

.content{padding:20px 24px}

.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.metric-value{font-size:22px;font-weight:500;color:#fff;line-height:1}
.metric-delta{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}
.delta-neutral{color:var(--text3)}

.health-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.health-score-big{font-size:42px;font-weight:600;line-height:1;color:#fff;min-width:70px}
.health-score-big span{font-size:18px;font-weight:400;color:var(--text2)}
.health-right{flex:1}
.health-label-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.health-label-text{font-size:12px;color:var(--text2)}
.health-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.health-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(.4,0,.2,1)}
.health-ticks{display:flex;justify-content:space-between;margin-top:5px}
.health-tick{font-size:10px;color:var(--text3)}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.pill-green{background:rgba(29,158,117,0.15);color:#4ecfa0}
.pill-amber{background:rgba(186,117,23,0.15);color:#f0a830}
.pill-red{background:rgba(216,90,48,0.15);color:#f07050}
.pill-blue{background:rgba(55,138,221,0.15);color:#6aabf0}
.pill-gray{background:var(--bg4);color:var(--text2)}

.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text2);transition:all 0.15s;white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--text)}
.tab.active{color:#fff;border-bottom-color:var(--green);font-weight:500}

.cl-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)}
.cl-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.cl-table th{font-size:10px;font-weight:500;color:var(--text3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;background:var(--bg2)}
.cl-table .row-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;background:var(--bg2);padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap;border-right:1px solid var(--border)}
.cl-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.cl-table tr:last-child td,.cl-table tr:last-child .row-label{border-bottom:none}
.cl-table tr:hover td,.cl-table tr:hover .row-label{background:rgba(255,255,255,0.02)}
.active-col{background:rgba(29,158,117,0.04)}
.na{color:var(--text3);font-style:italic;font-size:11px}

.diag-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;transition:border-color 0.15s}
.diag-card:hover{border-color:var(--border2)}
.diag-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.diag-title-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.diag-title-text{font-size:13px;font-weight:500;color:#fff;line-height:1.4}
.diag-body{font-size:12px;color:var(--text2);line-height:1.7;margin-left:40px}

.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-left{display:flex;flex-direction:column;align-items:center;gap:0;padding-top:4px}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl-line{width:1px;flex:1;background:var(--border);margin-top:4px}
.tl-content{flex:1;padding-bottom:4px}
.tl-ver{font-size:13px;font-weight:500;color:#fff}
.tl-dates{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.tl-note{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.6}
.tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tl-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.2s}
.ov-card:hover{border-color:var(--border2);transform:translateY(-1px)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:580px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.modal-title{font-size:16px;font-weight:500;color:#fff;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.form-section{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green)}
.form-row select option{background:var(--bg3)}
.form-row input::placeholder{color:var(--text3)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Fix: date input color in dark mode */
.form-row input[type="date"]{color-scheme:dark}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:12px;color:var(--text);z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(.4,0,.2,1)}
.toast.show{transform:translateY(0);opacity:1}

.notes-area{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.7}
.notes-area strong{color:var(--text);font-weight:500}

.sync-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sync-info{font-size:12px;color:var(--text2)}
.sync-info strong{color:var(--text);font-weight:500}
.sync-actions{display:flex;gap:6px}

.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.4}

/* Adsets & Ads */
.adset-block{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.adset-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.adset-name{font-size:13px;font-weight:500;color:#fff;flex:1}
.adset-audience{font-size:11px;color:var(--text3)}
.ads-list{padding:8px}
.ad-row{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.ad-row:last-child{margin-bottom:0}
.ad-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);cursor:pointer}
.ad-name{font-size:12px;font-weight:500;color:#fff;flex:1}
.ad-metrics-mini{display:flex;gap:10px;font-size:11px;color:var(--text2)}
.ad-metrics-mini span{display:flex;align-items:center;gap:3px}
.ad-body{padding:12px;border-top:1px solid var(--border);background:var(--bg)}
.ad-metrics-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.ad-metric{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.ad-metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.ad-metric-val{font-size:14px;font-weight:500;color:#fff}
.ad-guion{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.6}
.ad-guion strong{color:var(--text);font-weight:500}
.ad-link{font-size:11px;color:var(--green);text-decoration:none}
.ad-link:hover{text-decoration:underline}
</style>
</head>

<script>
const LS_KEY = 'evold-v1';
const COLORS = ['#1D9E75','#378ADD','#D85A30','#D4537E','#BA7517','#7F77DD'];
const BG_COLORS = ['rgba(29,158,117,0.15)','rgba(55,138,221,0.15)','rgba(216,90,48,0.15)','rgba(212,83,126,0.15)','rgba(186,117,23,0.15)','rgba(127,119,221,0.15)'];

const DEFAULT = {clients:[{
  id:1, name:'Suris Code', industry:'Tech / Desarrollo', avatar:'SC', color:0,
  health:{score:61,label:'En desarrollo',color:'amber'},
  monthlyLeads:16, monthlyBudget:370, avgCPL:23.18,
  conversionLines:[
    {id:'l1',version:'Suris 1',dateStart:'2025-01-01',dateEnd:'2025-02-28',
     campaign:'Trafico Frio Evolve',adset:'Clientes potenciales',ad:'AD "2"',
     filtro:'ALTO',destino:'LP A/B',
     metrics:{adSpent:1518,pageViews:13773,cpm:2.47,cpc:0.09,optIn:0.10,cpl:108,registros:14,sql:2},
     status:'historico',notes:'Primera línea. Filtro alto con LP A/B. CPL muy elevado, opt-in muy bajo.'},
    {id:'l2',version:'Suris 1.1',dateStart:'2025-03-01',dateEnd:'2025-04-15',
     campaign:'Trafico Frio Evolve v2',adset:'Clientes potenciales',ad:'AD "2"',
     filtro:'MEDIO',destino:'LP',
     metrics:{adSpent:153.38,pageViews:1200,cpm:10.73,cpc:0.31,optIn:0.33,cpl:38,registros:4,sql:null},
     status:'historico',notes:'Bajó filtro a MEDIO. Mejora en opt-in (0.10→0.33%). CPL baja de $108 a $38.'},
    {id:'l3',version:'Suris 1.2',dateStart:'2025-05-01',dateEnd:null,
     campaign:'Clientes potenciales meta forms',adset:'Meta Forms',ad:'AD "1" / "2"',
     filtro:'MEDIO',destino:'Meta Forms',
     metrics:{adSpent:370,pageViews:null,cpm:15.04,cpc:1.12,optIn:null,cpl:23.18,registros:16,sql:null},
     status:'activa',notes:'Cambio a Meta Forms. Mejor CPL ($23.18). Sin page views ni opt-in.'}
  ],
  diagnosis:[
    {type:'ok',title:'CPL mejorando consistentemente',body:'De $108 → $38 → $23.18 en 3 versiones. Bajar el filtro y cambiar a Meta Forms redujo la fricción y mejoró el CPL un 78%.',icon:'📉',color:'green'},
    {type:'warn',title:'CPM en alza — posible saturación',body:'El CPM subió de $2.47 a $15.04 en cada versión. Con audiencia estable, CPM creciente indica fatiga o mayor competencia.',icon:'📊',color:'amber'},
    {type:'warn',title:'Solo 2 SQL de 14 registros (14%)',body:'Tasa SQL baja. Con Meta Forms activo es clave trackear la calidad de leads de esta línea antes de escalar budget.',icon:'👤',color:'amber'},
    {type:'info',title:'Meta Forms: vigilar calidad del lead',body:'Meta Forms da mayor volumen a menor CPL pero con menor intención. Agregar 1-2 preguntas de calificación al form y medir tasa SQL.',icon:'💡',color:'blue'},
  ]
}]};

let S = {view:'overview', clientId:null, tab:'lineas'};
let DB = {clients:[]};

// Storage
function save(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({...DB,savedAt:new Date().toISOString()}));}
  catch(e){toast('Error al guardar','red');}
}
function load(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){const p=JSON.parse(raw);if(p.clients?.length){DB=p;return;}}
  }catch(e){}
  DB=JSON.parse(JSON.stringify(DEFAULT));
  save();
}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='evold-backup-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  toast('Backup exportado ✓');
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        if(!p.clients) throw new Error();
        DB=p;save();renderSidebar();showOverview();
        toast('Datos importados correctamente ✓');
      }catch{toast('Archivo inválido','red');}
    };r.readAsText(f);
  };input.click();
}


// ── Google Sheets Sync ──────────────────────────────────────────
const SHEET_ID = '1Rq06BLxfsWXbtlLskawouGr65xnxNkW8T5Ve2ijam9g';
const SHEETS_API = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/`;
const API_KEY = ''; // Set via openSyncConfigModal

function parseNum(v){
  if(v===null||v===undefined||v===''||v==='N/A'||v==='-') return null;
  // Remove $, commas, spaces, % sign
  const s = String(v).replace(/[$,%\s]/g,'').replace(',','.');
  const n = parseFloat(s);
  return isNaN(n)?null:n;
}

function getLatestWeek(rows){
  // Find the max week number
  const weeks = rows.map(r=>r.Semana||'').filter(w=>/^W\d+$/i.test(w.trim()));
  if(!weeks.length) return null;
  return weeks.reduce((a,b)=>parseInt(a.slice(1))>parseInt(b.slice(1))?a:b);
}

function aggregateRows(rows){
  // Sum/avg metrics across rows of the same week
  const nums = {adSpent:[], cpm:[], cpc:[], registros:[], optIn:[], cpl:[], sql:[], pageViews:[], ctr:[]};
  const colMap = {
    'Inversión Semanal':'adSpent','Inversión Semanal (ARS)':'adSpent',
    'CPM ':'cpm','CPM':'cpm',
    'CPC':'cpc',
    'Registros':'registros',
    'OPTIN':'optIn',
    'CPL':'cpl',
    'SQL':'sql',
    'Visitas':'pageViews',
    'CTR':'ctr'
  };
  rows.forEach(row=>{
    Object.entries(colMap).forEach(([col,key])=>{
      const v=parseNum(row[col]);
      if(v!==null) nums[key].push(v);
    });
  });
  const sum = k=>nums[k].length?nums[k].reduce((a,b)=>a+b,0):null;
  const avg = k=>nums[k].length?nums[k].reduce((a,b)=>a+b,0)/nums[k].length:null;
  return {
    adSpent: sum('adSpent'),
    cpm: avg('cpm'),
    cpc: avg('cpc'),
    registros: sum('registros'),
    optIn: avg('optIn'),
    cpl: avg('cpl'),
    sql: sum('sql'),
    pageViews: sum('pageViews'),
  };
}


function isHeaderRow(row){
  const vals = row.map(c=>(c||'').trim());
  return vals.includes('Cliente') && (vals.includes('Semana') || vals.includes('Campaña'));
}

async function fetchSheetBlocks(sheetName, apiKey){
  const range = encodeURIComponent(`${sheetName}!A1:AK300`);
  const url = `${SHEETS_API}${range}?key=${apiKey}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} para "${sheetName}"`);
  const data = await res.json();
  const rawRows = data.values || [];
  if(rawRows.length < 2) return [];

  const blocks = [];
  let pendingName = '';
  let i = 0;

  while(i < rawRows.length){
    const row = rawRows[i];
    if(isHeaderRow(row)){
      const headers = row;
      const name = pendingName || `Bloque ${blocks.length+1}`;
      pendingName = '';
      const dataRows = [];
      i++;
      let lastWeek='', lastCampaign='', lastAdset='';

      while(i < rawRows.length && !isHeaderRow(rawRows[i])){
        const r = rawRows[i];
        const nonEmpty = r.filter(c=>(c||'').trim()!=='');
        // Skip block-name rows (few non-empty cells, no $ or digits)
        if(nonEmpty.length <= 2 && nonEmpty.every(c=>!/[$0-9]/.test((c||'').trim()[0]||''))){
          if(nonEmpty.length > 0) pendingName = nonEmpty[0];
          i++; continue;
        }
        const obj={};
        headers.forEach((h,hi)=>obj[h]=(r[hi]||'').trim());
        if(obj.Semana && /^W\d+$/i.test(obj.Semana)) lastWeek=obj.Semana;
        else if(!obj.Semana) obj.Semana=lastWeek;
        if(obj.Campaña) lastCampaign=obj.Campaña;
        else obj.Campaña=lastCampaign;
        if(obj.ADSET) lastAdset=obj.ADSET;
        else obj.ADSET=lastAdset;
        dataRows.push(obj);
        i++;
      }
      if(dataRows.length > 0) blocks.push({name, rows: dataRows});
    } else {
      const nonEmpty = row.filter(c=>(c||'').trim()!=='');
      if(nonEmpty.length > 0 && nonEmpty.length <= 3) pendingName = nonEmpty[0]||'';
      i++;
    }
  }
  return blocks;
}

async function fetchSheetData(sheetName, apiKey){
  const blocks = await fetchSheetBlocks(sheetName, apiKey);
  return blocks.flatMap(b=>b.rows);
}

function sumCol(rows, cols){
  let total=null;
  rows.forEach(row=>{cols.forEach(col=>{const v=parseNum(row[col]);if(v!==null){total=(total||0)+v;}});});
  return total!==null?Math.round(total*100)/100:null;
}
function avgCol(rows, cols){
  const vals=[];
  rows.forEach(row=>{cols.forEach(col=>{const v=parseNum(row[col]);if(v!==null) vals.push(v);});});
  if(!vals.length) return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*100)/100;
}

async function syncClient(client, apiKey){
  const sheetName = client.sheetName || client.name;
  try {
    const blocks = await fetchSheetBlocks(sheetName, apiKey);
    if(!blocks.length) return {ok:false, msg:'Sin datos en el sheet'};

    let created=0, updated=0;

    for(const block of blocks){
      const {name, rows} = block;
      const detailRows = rows.filter(r=>(r.Anuncio||'').trim()!=='');
      const summaryRows = rows.filter(r=>(r.Anuncio||'').trim()==='');
      const metricsSource = summaryRows.length ? summaryRows : detailRows;

      const metrics = {
        adSpent: sumCol(metricsSource, ['Inversión Semanal','Inversión Semanal (ARS)']),
        registros: sumCol(metricsSource, ['Registros']),
        sql: sumCol(metricsSource, ['SQL']),
        pageViews: sumCol(metricsSource, ['Visitas']),
        cpm: avgCol(detailRows.length ? detailRows : metricsSource, ['CPM ','CPM']),
        cpc: avgCol(detailRows.length ? detailRows : metricsSource, ['CPC']),
        optIn: avgCol(metricsSource, ['OPTIN']),
        cpl: avgCol(metricsSource, ['CPL']),
      };

      const adsetMap = {};
      detailRows.forEach(row=>{
        const adsetName = (row.ADSET||row.Adset||'Adset').trim();
        const adName = (row.Anuncio||'').trim();
        if(!adName) return;
        if(!adsetMap[adsetName]) adsetMap[adsetName]={name:adsetName,audience:'',ads:[]};
        adsetMap[adsetName].ads.push({
          name: adName, link:'',
          cpl: parseNum(row.CPL)||null,
          registros: parseNum(row.Registros)||null,
          ctr: parseNum(row.CTR)||null,
          cpc: parseNum(row.CPC)||null,
          impresiones: parseNum(row.Frecuencia)||null,
          guion: ''
        });
      });
      const adsets = Object.values(adsetMap);

      const firstRow = rows[0]||{};
      const campaign = firstRow.Campaña||'';
      const adset = firstRow.ADSET||'';
      const summaryRow = rows.find(r=>r['Fecha de Inicio'])||firstRow;
      const dateStart = toInputDate(summaryRow['Fecha de Inicio']||'', true);
      const dateEnd   = toInputDate(summaryRow['Fecha de Finalización']||summaryRow['Fecha de Finalizaci\u00f3n']||'', true);
      const isLatest = block === blocks[blocks.length-1];
      const blockKey = name.trim();

      const existingIdx = client.conversionLines.findIndex(l=>l.blockKey===blockKey);
      if(existingIdx>=0){
        const existing = client.conversionLines[existingIdx];
        Object.entries(metrics).forEach(([k,v])=>{if(v!==null) existing.metrics[k]=Math.round(v*100)/100;});
        existing.adsets = adsets;
        updated++;
      } else {
        if(isLatest) client.conversionLines.forEach(l=>{if(!l.blockKey) l.status='historico';});
        client.conversionLines.push({
          id: 'l'+Date.now()+Math.random().toString(36).slice(2),
          blockKey, version: blockKey,
          dateStart: dateStart||null, dateEnd: dateEnd||null,
          campaign, adset, ad:'', filtro:'MEDIO', destino:'',
          metrics: {
            adSpent: metrics.adSpent, pageViews: metrics.pageViews,
            cpm: metrics.cpm, cpc: metrics.cpc,
            optIn: metrics.optIn, cpl: metrics.cpl,
            registros: metrics.registros, sql: metrics.sql
          },
          adsets,
          notes: `Importado desde sheet · ${blockKey}`,
          status: isLatest?'activa':'historico'
        });
        created++;
      }
    }

    const latestLine = client.conversionLines[client.conversionLines.length-1];
    if(latestLine?.metrics){
      if(latestLine.metrics.registros) client.monthlyLeads = latestLine.metrics.registros;
      if(latestLine.metrics.cpl) client.avgCPL = latestLine.metrics.cpl;
      if(latestLine.metrics.adSpent) client.monthlyBudget = Math.round(latestLine.metrics.adSpent);
    }

    return {ok:true, msg:`${blocks.length} bloques · ${created} creados · ${updated} actualizados`};
  } catch(e){
    return {ok:false, msg:e.message};
  }
}

async function runSync(){

  if(!apiKey){toast('Ingresá una API Key primero','red');return;}
  localStorage.setItem('evold-api-key', apiKey);
  // Save sheet mappings
  DB.clients.forEach(c=>{
    const sel = document.getElementById(`sheet-${c.id}`);
    if(sel) c.sheetName = sel.value;
  });
  const btn = document.getElementById('sync-btn');
  btn.disabled=true; btn.textContent='Sincronizando...';
  const results = document.getElementById('sync-results');
  results.innerHTML='';
  const toSync = DB.clients.filter(c=>c.sheetName);
  if(!toSync.length){results.innerHTML='<div style="font-size:12px;color:var(--text3)">Ningún cliente mapeado a una hoja.</div>';btn.disabled=false;btn.textContent='🔄 Sincronizar ahora';return;}
  let html='<div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">';
  for(const client of toSync){
    results.innerHTML=html+`<div style="padding:10px 12px;font-size:12px;color:var(--text2)">⏳ Sincronizando ${client.name}...</div></div>`;
    const r = await syncClient(client, apiKey);
    html+=`<div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--text)">${client.name}</span>
      <span style="font-size:11px;color:${r.ok?'#4ecfa0':'#f07050'}">${r.ok?'✓':'✗'} ${r.msg}</span>

  save();
  if(S.view==='client') renderClient();

  btn.disabled=false; btn.textContent='🔄 Sincronizar de nuevo';
}

// Utils
function hc(c){return{green:'#1D9E75',amber:'#BA7517',red:'#D85A30',gray:'#555'}[c]||'#555'}
function pillClass(c){return{green:'pill-green',amber:'pill-amber',red:'pill-red',blue:'pill-blue',gray:'pill-gray'}[c]||'pill-gray'}
function days(s,e){if(!s)return null;const d=Math.floor((new Date(e||Date.now())-new Date(s))/86400000);return d>=0?d:0;}
function fmtDateRange(s,e){
  if(!s)return '—';
  const fmt=d=>{
    // Normalize to YYYY-MM-DD first, then format as DD/MM/YYYY
    const iso=toInputDate(d);
    if(!iso)return d;
    const [y,m,day]=iso.split('-');
    return `${day}/${m}/${y}`;
  };
  return fmt(s)+' → '+(e?fmt(e):'hoy');
}

// FIX: Normalize any date format to YYYY-MM-DD for input[type=date]
function toInputDate(d, fromSheet){
  if(!d) return '';
  d = String(d).trim();
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  // DD/MM/YYYY — siempre día/mes/año
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){
    const [day,month,year]=d.split('/');
    return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  }
  // DD-MM-YYYY
  if(/^\d{2}-\d{2}-\d{4}$/.test(d)){
    const [day,month,year]=d.split('-');
    return `${year}-${month}-${day}`;
  }
  // Try native Date parsing as last resort
  try{
    const dt=new Date(d);
    if(!isNaN(dt)){return dt.toISOString().split('T')[0];}
  }catch(e){}
  return '';
}

function fmtVal(v,t){
  if(v===null||v===undefined||v==='') return '<span class="na">N/A</span>';
  if(t==='$') return '$'+parseFloat(v).toFixed(2);
  if(t==='%') return parseFloat(v).toFixed(2)+'%';
  return String(v);
}

  DB.clients.push({

    avatar:name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(),

}

function gv(id,type){
  const v=document.getElementById(id)?.value;
  if(v===''||v===null||v===undefined)return null;
  if(type==='float')return parseFloat(v)||null;
  if(type==='int')return parseInt(v)||null;
  return v;
}

function saveLine(clientId, lineId){
  const c=DB.clients.find(x=>x.id===clientId);
  const isEdit=!!lineId;
  // FIX: normalize dates to YYYY-MM-DD on save
  const rawStart=gv('nl-start');
  const rawEnd=gv('nl-end');
  const data={
    id:lineId||('l'+Date.now()),
    version:gv('nl-ver')||('v'+(c.conversionLines.length+(isEdit?0:1))),
    dateStart:rawStart?toInputDate(rawStart):null,
    dateEnd:rawEnd?toInputDate(rawEnd):null,
    campaign:gv('nl-campaign')||'',adset:gv('nl-adset')||'',ad:gv('nl-ad')||'',
    filtro:gv('nl-filtro'),destino:gv('nl-dest'),
    metrics:{
      adSpent:gv('nl-spent','float'),pageViews:gv('nl-pv','int'),
      cpm:gv('nl-cpm','float'),cpc:gv('nl-cpc','float'),
      optIn:gv('nl-optin','float'),cpl:gv('nl-cpl','float'),
      registros:gv('nl-reg','int'),sql:gv('nl-sql','int')
    },
    notes:gv('nl-note')||'',
    adsets:getModalAdsets(),
    status:isEdit?(c.conversionLines.find(x=>x.id===lineId)?.status||'historico'):'activa'
  };
  if(!isEdit){
    c.conversionLines.forEach(l=>l.status='historico');
    c.conversionLines.push(data);
    const reg=data.metrics.registros||0,cpl=data.metrics.cpl||0;
    if(reg>0&&cpl>0){c.monthlyLeads=reg;c.avgCPL=cpl;c.monthlyBudget=Math.round(cpl*reg);}
  } else {
    const idx=c.conversionLines.findIndex(x=>x.id===lineId);
    if(idx>=0)c.conversionLines[idx]={...c.conversionLines[idx],...data};
  }
  save();closeModal();renderClient();toast(isEdit?'Línea actualizada ✓':'Línea guardada ✓');
}

function openEditHealthModal(clientId){
  const c=DB.clients.find(x=>x.id===clientId);
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:380px">
        <div class="modal-title">Actualizar salud del embudo</div>
        <div class="modal-sub">${c.name}</div>
        <div class="form-row"><label class="form-label">Score (0–100)</label><input id="hs-score" type="number" min="0" max="100" value="${c.health.score}"></div>
        <div class="form-row"><label class="form-label">Estado</label><input id="hs-label" value="${c.health.label}" placeholder="Ej: Saludable, En desarrollo..."></div>
        <div class="form-row"><label class="form-label">Color</label>
          <select id="hs-color">
            ${['green','amber','red'].map(o=>`<option value="${o}" ${c.health.color===o?'selected':''}>${{green:'Verde — Saludable',amber:'Amarillo — Atención',red:'Rojo — Crítico'}[o]}</option>`).join('')}
          </select></div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveHealth(${clientId})">Guardar</button>
        </div>
      </div>
    </div>`;
}

function saveHealth(clientId){
  const c=DB.clients.find(x=>x.id===clientId);
  c.health.score=parseInt(document.getElementById('hs-score').value)||0;
  c.health.label=document.getElementById('hs-label').value.trim();
  c.health.color=document.getElementById('hs-color').value;
  save();closeModal();renderClient();toast('Salud actualizada ✓');
}

function confirmDeleteClient(clientId){
  const c=DB.clients.find(x=>x.id===clientId);
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:380px">
        <div class="modal-title">¿Eliminar ${c.name}?</div>
        <div class="modal-sub">Esta acción no se puede deshacer. Todos sus datos y líneas de conversión serán eliminados.</div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-danger" onclick="deleteClient(${clientId})">Sí, eliminar</button>
        </div>
      </div>
    </div>`;
}

function deleteClient(clientId){
  DB.clients=DB.clients.filter(x=>x.id!==clientId);
  save();closeModal();S.clientId=null;S.view='overview';renderSidebar();showOverview();toast('Cliente eliminado');
}

// Adsets & Ads
let _adsetCount = 0;

function renderAdsetForm(adset, ai){
  const adsHtml = (adset.ads||[]).map((ad,di)=>renderAdForm(ad,ai,di)).join('');
  return `<div class="adset-block" id="adset-${ai}" style="margin-bottom:10px">
    <div class="adset-header" style="gap:8px">
      <div style="flex:1">
        <input placeholder="Nombre del adset" value="${adset.name||''}" 
          oninput="updateAdsetField(${ai},'name',this.value)"
          style="width:100%;background:transparent;border:none;color:#fff;font-size:13px;font-weight:500;outline:none;font-family:var(--font)">
        <input placeholder="Audiencia / segmentación" value="${adset.audience||''}"
          oninput="updateAdsetField(${ai},'audience',this.value)"
          style="width:100%;background:transparent;border:none;color:var(--text3);font-size:11px;outline:none;font-family:var(--font);margin-top:2px">
      </div>
      <button class="btn btn-sm" onclick="addAd(${ai})">+ Ad</button>
      <button class="btn btn-danger btn-sm btn-icon" onclick="removeAdset(${ai})">✕</button>
    </div>
    <div class="ads-list" id="ads-${ai}">${adsHtml}</div>
  </div>`;
}

function renderAdForm(ad, ai, di){
  return `<div class="ad-row" id="ad-${ai}-${di}" style="margin-bottom:6px">
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center">
      <input placeholder="Nombre del ad (nomenclado)" value="${ad.name||''}"
        oninput="updateAdField(${ai},${di},'name',this.value)"
        style="flex:1;background:transparent;border:1px solid var(--border2);border-radius:6px;padding:5px 8px;color:#fff;font-size:12px;outline:none;font-family:var(--font)">
      <input placeholder="Link Meta Ads" value="${ad.link||''}"
        oninput="updateAdField(${ai},${di},'link',this.value)"
        style="flex:1;background:transparent;border:1px solid var(--border2);border-radius:6px;padding:5px 8px;color:#fff;font-size:12px;outline:none;font-family:var(--font)">
      <button class="btn btn-danger btn-sm btn-icon" onclick="removeAd(${ai},${di})">✕</button>
    </div>
    <div style="padding:10px 12px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;border-bottom:1px solid var(--border)">
      ${['cpl','registros','ctr','cpc','impresiones'].map(f=>`
        <div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:3px">${f}</div>
          <input type="number" step="0.01" placeholder="—" value="${ad[f]||''}"
            oninput="updateAdField(${ai},${di},'${f}',this.value)"
            style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;color:#fff;font-size:12px;outline:none;font-family:var(--font)">
        </div>`).join('')}
    </div>
    <div style="padding:10px 12px">
      <textarea placeholder="Guión: Hook / Problema / Solución / CTA..." rows="2"
        oninput="updateAdField(${ai},${di},'guion',this.value)"
        style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;color:#fff;font-size:12px;outline:none;font-family:var(--font);resize:vertical">${ad.guion||''}</textarea>
    </div>
  </div>`;
}

// In-memory adsets state during modal edit
let _modalAdsets = [];

function initModalAdsets(adsets){
  _modalAdsets = JSON.parse(JSON.stringify(adsets||[]));
}

function updateAdsetField(ai, field, val){
  if(!_modalAdsets[ai]) return;
  _modalAdsets[ai][field] = val;
}

function updateAdField(ai, di, field, val){
  if(!_modalAdsets[ai]?.ads?.[di]) return;
  _modalAdsets[ai].ads[di][field] = val;
}

function addAdset(){
  _modalAdsets.push({name:'',audience:'',ads:[]});
  const ai = _modalAdsets.length-1;
  const container = document.getElementById('adsets-container');
  const div = document.createElement('div');
  div.innerHTML = renderAdsetForm({name:'',audience:'',ads:[]}, ai);
  container.appendChild(div.firstChild);
}

function addAd(ai){
  if(!_modalAdsets[ai]) return;
  _modalAdsets[ai].ads = _modalAdsets[ai].ads||[];
  const di = _modalAdsets[ai].ads.length;
  _modalAdsets[ai].ads.push({name:'',link:'',cpl:'',registros:'',ctr:'',cpc:'',impresiones:'',guion:''});
  const container = document.getElementById(`ads-${ai}`);
  if(container){
    const div = document.createElement('div');
    div.innerHTML = renderAdForm(_modalAdsets[ai].ads[di], ai, di);
    container.appendChild(div.firstChild);
  }
}

function removeAdset(ai){
  _modalAdsets.splice(ai,1);
  refreshAdsetsContainer();
}

function removeAd(ai, di){
  _modalAdsets[ai].ads.splice(di,1);
  refreshAdsetsContainer();
}

function refreshAdsetsContainer(){
  const container = document.getElementById('adsets-container');
  if(container) container.innerHTML = _modalAdsets.map((adset,ai)=>renderAdsetForm(adset,ai)).join('');
}

function getModalAdsets(){
  return _modalAdsets.map(adset=>({
    ...adset,
    ads:(adset.ads||[]).map(ad=>({
      ...ad,
      cpl: ad.cpl?parseFloat(ad.cpl):null,
      registros: ad.registros?parseInt(ad.registros):null,
      ctr: ad.ctr?parseFloat(ad.ctr):null,
      cpc: ad.cpc?parseFloat(ad.cpc):null,
      impresiones: ad.impresiones?parseInt(ad.impresiones):null,
    }))
  }));
}
// End Adsets & Ads

// Init
load();renderSidebar();showOverview();
</script>
