          const explicit=(S.collapsedCols||{})[key];
          const collapsed=explicit!==undefined?explicit:!isCurrentWeek;
          return `<div class="cl-acc-item" style="border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;${isCurrentWeek?'border-color:rgba(29,158,117,0.4)':''}">
            <div onclick="setColCollapse('${key}',${collapsed?0:1})" style="display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;background:var(--bg2)">
              <span style="font-size:11px;color:var(--text3);transition:transform .15s;transform:rotate(${collapsed?'-90':'0'}deg);display:inline-block">&#9662;</span>
              <span style="font-size:13px;font-weight:500;color:${isCurrentWeek?'var(--accent)':'var(--text)'}">${esc(l.version)}</span>
              ${isCurrentWeek?'<span class="pill pill-green" style="font-size:9px;padding:1px 6px">en vivo &middot; 7 dias</span>':'<span class="pill" style="font-size:9px;padding:1px 6px;background:var(--bg3);color:var(--text3)">historico</span>'}
              <span style="font-size:11px;color:var(--text3)">${fmtDateRange(l.dateStart,l.dateEnd)}</span>
              ${l._metaOk===false?'<span style="font-size:10px;color:var(--redx);margin-left:auto">Meta: '+esc(l._metaError||'error')+'</span>':''}
            </div>
            ${collapsed?'':'<div>'+LIVE_ROWS.map(r=>`<div style="display:flex;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border)"><span style="font-size:13px;color:var(--text2)">${r.label}</span><span style="font-size:13px;font-weight:500;color:var(--text)">${r.get(l)}</span></div>`).join('')+'</div>'}
          </div>`;
        }).join(''):'<div style="font-size:13px;color:var(--text3)">Cargando la primera semana en vivo...</div>')
      +'</div>';
  return '<div style="margin-top:30px">'
    +'<div style="font-size:15px;font-weight:600;color:var(--strong)">Tiempo real (beta)</div>'
    +'<div style="height:1px;background:var(--border);margin:10px 0 16px"></div>'
    +liveHtml
    +'</div>';
}

// ================= TICKETS: tablero global de tareas delegadas + rendimiento =================
function _ticketRows(){
  const rows=[];
  DB.clients.forEach(function(c){
    (c.tasks||[]).forEach(function(t){ rows.push({t:t,c:c}); });
  });
  return rows;
}
function _tkOrigen(t){
  return (!t.source||t.source==='Manual')?'Manual':'Llamada';
}
function _tkDias(a,b){ return Math.max(0,Math.round((b-a)/86400000)); }
function ticketDragStart(i){ window._tkDrag=i; }
function ticketDragOver(ev){ ev.preventDefault(); }
function ticketDrop(ev,i){
  ev.preventDefault();
  const from=window._tkDrag;
  window._tkDrag=null;
  const arr=window._tkList||[];
  if(from==null||from===i||!arr[from]||!arr[i]) return;
  if(arr[from].done||arr[i].done) return; // las hechas no se reordenan
  const moved=arr.splice(from,1)[0];
  arr.splice(i,0,moved);
  // persistir: prio = posicion nueva entre las no-hechas visibles
  let p=1;
  arr.forEach(function(k){
    if(k.done) return;
    const c=DB.clients.find(function(x){return x.id===k.cid;});
    const t=c&&(c.tasks||[]).find(function(x){return x.id===k.tid;});
    if(t){ t.prio=p; p++; }
  });
  save();
  showTickets();
}

function resetTicketsHistory(){
  if(!confirm('Reiniciar el historial de tickets?\n\nEl tablero va a contar solo los tickets delegados desde hoy en adelante. Las tareas viejas siguen en la pestana Tareas de cada cliente, pero dejan de aparecer aca y de contar en las metricas.')) return;
  localStorage.setItem('evold-tickets-since',String(Date.now()));
  if(typeof toast==='function') toast('Historial reiniciado - contando desde hoy');
  showTickets();
}
function showFullTicketsHistory(){
  localStorage.removeItem('evold-tickets-since');
  showTickets();
}
function showTickets(){
  S.view='tickets'; S.clientId=null; renderSidebar();
  const _since=+(localStorage.getItem('evold-tickets-since')||0);
  const all=_ticketRows();
  const tickets=all.filter(function(r){
    if(!r.t.delegated) return false;
    if(!_since) return true;
    return r.t.delegatedAt && new Date(r.t.delegatedAt).getTime()>=_since;
  });
  const sinDelegar=all.filter(function(r){return !r.t.delegated&&!r.t.done;}).length;
  const now=new Date();
  const endOfDue=function(t){ if(!t.due) return null; const d=new Date(t.due); d.setHours(23,59,59,999); return d; };

  const abiertos=tickets.filter(function(r){return !r.t.done;});
  const vencidos=abiertos.filter(function(r){const d=endOfDue(r.t);return d&&d<now;});
  const hechos=tickets.filter(function(r){return r.t.done;});
  const hechos30=hechos.filter(function(r){return r.t.doneAt&&(now-new Date(r.t.doneAt))<30*86400000;});
  const conTiempos=hechos.filter(function(r){return r.t.doneAt&&r.t.delegatedAt;});
  const avgDias=conTiempos.length?(conTiempos.reduce(function(s,r){return s+_tkDias(new Date(r.t.delegatedAt),new Date(r.t.doneAt));},0)/conTiempos.length):null;
  const conDue=hechos.filter(function(r){return r.t.doneAt&&r.t.due;});
  const aTiempo=conDue.length?Math.round(conDue.filter(function(r){return new Date(r.t.doneAt)<=endOfDue(r.t);}).length/conDue.length*100):null;

  // Rendimiento por responsable
  const porResp={};
  tickets.forEach(function(r){
    const k=(r.t.responsible||'Ashy').trim()||'Ashy';
    porResp[k]=porResp[k]||{abiertos:0,vencidos:0,hechos:0,dias:[],due:0,onTime:0};
    const p=porResp[k];
    if(!r.t.done){ p.abiertos++; const d=endOfDue(r.t); if(d&&d<now) p.vencidos++; }
    else {
      p.hechos++;
      if(r.t.doneAt&&r.t.delegatedAt) p.dias.push(_tkDias(new Date(r.t.delegatedAt),new Date(r.t.doneAt)));
      if(r.t.doneAt&&r.t.due){ p.due++; if(new Date(r.t.doneAt)<=endOfDue(r.t)) p.onTime++; }
    }
  });

  // Filtro
  const filter=S.ticketsFilter||'abiertos';
  let list=tickets;
  if(filter==='abiertos') list=abiertos;
  else if(filter==='vencidos') list=vencidos;
  else if(filter==='hechos') list=hechos;
  // orden: vencidos primero, luego abiertos mas viejos, luego hechos recientes
  list=[...list].sort(function(a,b){
    const doneA=a.t.done?1:0, doneB=b.t.done?1:0;
    if(doneA!==doneB) return doneA-doneB; // hechas al final
    if(!doneA){
      // prioridad manual (drag & drop) manda; sin prio va despues
      const pa=(a.t.prio!=null)?a.t.prio:1e9;
      const pb=(b.t.prio!=null)?b.t.prio:1e9;
      if(pa!==pb) return pa-pb;
      // fallback: vencidas primero, despues las mas viejas
      const av=endOfDue(a.t)&&endOfDue(a.t)<now?0:1;
      const bv=endOfDue(b.t)&&endOfDue(b.t)<now?0:1;
      if(av!==bv) return av-bv;
      return String(a.t.delegatedAt||'').localeCompare(String(b.t.delegatedAt||''));
    }
    return String(b.t.doneAt||'').localeCompare(String(a.t.doneAt||''));
  });
  // lista visible para el drag & drop de prioridades
  window._tkList=list.map(function(r){return {cid:r.c.id,tid:r.t.id,done:!!r.t.done};});

  const kpi=function(label,val,red){
    return '<div class="metric-card"'+(red?' style="background:rgba(216,90,48,0.08);border:0.5px solid rgba(216,90,48,0.25)"':'')+'>'
      +'<div class="metric-label"'+(red?' style="color:var(--redx)"':'')+'>'+label+'</div>'
      +'<div class="metric-value"'+(red?' style="color:var(--redx)"':'')+'>'+val+'</div></div>';
  };
  const fbtn=function(key,label,n){
    const act=filter===key;
    return '<button class="btn btn-sm" onclick="S.ticketsFilter=\''+key+'\';showTickets()" style="'+(act?'border-color:var(--accent);color:var(--accent)':'color:var(--text3)')+'">'+label+' <span style="opacity:0.6">'+n+'</span></button>';
  };
  const fmtF=function(iso){ if(!iso) return '-'; const d=new Date(iso); return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'}); };

  const rowsHtml=list.map(function(r,_i){
    const t=r.t, c=r.c;
    const d=endOfDue(t);
    const venc=!t.done&&d&&d<now;
    let estado, extra='';
    if(t.done){
      estado='<span class="pill pill-green" style="font-size:10px">Hecha</span>';
      if(t.doneAt&&t.delegatedAt) extra='resuelta en '+_tkDias(new Date(t.delegatedAt),new Date(t.doneAt))+' d';
    } else if(venc){
      estado='<span class="pill pill-red" style="font-size:10px">Vencida</span>';
      extra=_tkDias(d,now)+' d de atraso';
    } else {
      estado='<span class="pill pill-amber" style="font-size:10px">Abierta</span>';
      if(t.delegatedAt) extra=_tkDias(new Date(t.delegatedAt),now)+' d abierta';
    }
    return '<tr '+(t.done?'':'draggable="true" ondragstart="ticketDragStart('+_i+')" ondragover="ticketDragOver(event)" ondrop="ticketDrop(event,'+_i+')" ')+'style="border-bottom:1px solid var(--border)">'
      +'<td style="padding:10px 12px;white-space:nowrap">'
      +(t.done?'<span style="display:inline-block;width:14px"></span>':'<span title="Arrastra para priorizar" style="cursor:grab;color:var(--text3);margin-right:6px;font-size:12px;user-select:none">&#8801;</span>')
      +'<input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTask('+c.id+','+t.id+',this.checked)" style="margin-right:8px;vertical-align:middle">'
      +'<span class="mono" style="font-size:11.5px;color:var(--accent)">'+esc(t.ticket||'-')+'</span></td>'
      +'<td style="padding:10px 12px;white-space:nowrap;cursor:pointer;color:var(--strong)" onclick="selectClient('+c.id+');S.tab=\'tareas\';renderClient()">'+esc(c.name)+'</td>'
      +'<td style="padding:10px 12px;max-width:340px">'+esc(t.text||'')+'</td>'
      +'<td style="padding:10px 12px;white-space:nowrap;color:var(--text3);font-size:11.5px" title="'+esc(t.source||'')+'">'+_tkOrigen(t)+'</td>'
      +'<td style="padding:10px 12px;white-space:nowrap">'+esc(t.responsible||'Ashy')+'</td>'
      +'<td style="padding:10px 12px;white-space:nowrap" class="mono" style="font-size:11.5px">'+fmtF(t.delegatedAt)+'</td>'
      +'<td style="padding:10px 12px;white-space:nowrap" class="mono">'+(t.due?fmtF(t.due):'-')+'</td>'
      +'<td style="padding:10px 12px;white-space:nowrap">'+estado+(extra?' <span style="font-size:10.5px;color:var(--text3)">'+extra+'</span>':'')+'</td>'
      +'</tr>';
  }).join('');

  const respHtml=Object.keys(porResp).map(function(k){
    const p=porResp[k];
    const avg=p.dias.length?(p.dias.reduce(function(a,b){return a+b;},0)/p.dias.length).toFixed(1):'-';
    const ot=p.due?Math.round(p.onTime/p.due*100)+'%':'-';
    return '<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 16px;border-bottom:1px solid var(--border)">'
      +'<span style="font-size:12.5px;color:var(--strong);font-weight:500">'+esc(k)+'</span>'
      +'<div style="display:flex;gap:18px;font-size:11.5px;color:var(--text2)" class="mono">'
      +'<span>'+p.abiertos+' abiertas'+(p.vencidos?' <span style="color:var(--redx)">('+p.vencidos+' venc.)</span>':'')+'</span>'
      +'<span>'+p.hechos+' hechas</span>'
      +'<span title="Tiempo promedio de resolucion">'+avg+' d prom.</span>'
      +'<span title="Entregadas antes del vencimiento">'+ot+' a tiempo</span>'
      +'</div></div>';
  }).join('');

  document.getElementById('main-content').innerHTML=''
    +'<div style="padding:32px 36px;max-width:1200px">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:3px">'
    +'<div style="font-size:17px;font-weight:600;color:var(--strong)">Tickets</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-sm btn-primary" onclick="openNewTicketModal()">+ Delegar tarea</button>'
    +'<button class="btn btn-sm" onclick="resetTicketsHistory()" style="color:var(--text3)">Reiniciar historial</button>'
    +'</div>'
    +'</div>'
    +'<div style="font-size:12px;color:var(--text3);margin-bottom:22px">Tareas delegadas por mail (con numero de ticket) o extraidas de llamadas. '
    +(sinDelegar?sinDelegar+' tareas pendientes sin delegar en los clientes. ':'')
    +(_since?'<span style="color:var(--text2)">Contando desde el '+new Date(_since).toLocaleDateString('es-AR')+'</span> &middot; <a href="javascript:void(0)" onclick="showFullTicketsHistory()" style="color:var(--accent);text-decoration:none">ver historial completo</a>':'')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px">'
    +kpi('Abiertos',abiertos.length)
    +kpi('Vencidos',vencidos.length,vencidos.length>0)
    +kpi('Completados (30 d)',hechos30.length)
    +kpi('Resolucion promedio',avgDias!=null?avgDias.toFixed(1)+' d':'-')
    +kpi('Entregas a tiempo',aTiempo!=null?aTiempo+'%':'-')
    +'</div>'
    +(respHtml?'<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px">Rendimiento por responsable</div>'
      +'<div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px">'+respHtml+'</div>':'')
    +'<div style="display:flex;gap:8px;margin-bottom:14px">'
    +fbtn('abiertos','Abiertos',abiertos.length)
    +fbtn('vencidos','Vencidos',vencidos.length)
    +fbtn('hechos','Hechos',hechos.length)
    +fbtn('todos','Todos',tickets.length)
    +'</div>'
    +(list.length
      ?'<div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">'
        +'<thead><tr style="background:var(--bg2);text-align:left;font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em">'
        +'<th style="padding:9px 12px">Ticket</th><th style="padding:9px 12px">Cliente</th><th style="padding:9px 12px">Tarea</th><th style="padding:9px 12px">Origen</th><th style="padding:9px 12px">Responsable</th><th style="padding:9px 12px">Delegada</th><th style="padding:9px 12px">Vence</th><th style="padding:9px 12px">Estado</th>'
        +'</tr></thead><tbody>'+rowsHtml+'</tbody></table></div>'
      :'<div style="padding:44px 20px;text-align:center;border:1px dashed var(--border2);border-radius:var(--radius-lg)">'
        +'<div style="font-size:13px;color:var(--text2);margin-bottom:4px">Sin tickets '+(filter!=='todos'?'en este filtro':'todavia')+'</div>'
        +'<div style="font-size:11.5px;color:var(--text3);max-width:460px;margin:0 auto">Los tickets se crean al delegar una tarea desde la pestana Tareas de un cliente (boton Delegar): se numeran, se mandan por mail a tu colaboradora y quedan aca para el seguimiento.</div>'
        +'</div>')
    +'</div>';
}

// Consulta al Apps Script que le falta para que el informe salga solo
function weeklyReportDiag(){
  const el=document.getElementById('wr-diag');
  if(!el) return;
  const proxy=getGhlProxy();
  if(!proxy.url){ el.innerHTML='<span style="color:var(--redx)">Falta la conexion (proxy) - configurala en Integraciones &rarr; GoHighLevel.</span>'; return; }
  Promise.race([
    fetch(proxy.url+'?secret='+encodeURIComponent(proxy.secret)+'&action=report_status').then(function(r){return r.json();}),
    new Promise(function(res){setTimeout(function(){res(null);},8000);})
  ]).then(function(d){
    if(!d){ el.innerHTML='<span style="color:var(--amberx)">El Apps Script no responde - revisa la URL del proxy.</span>'; return; }
    if(!d.ok){
      const err=String(d.error||'');
      if(err.indexOf('Accion desconocida')>=0||err.indexOf('Faltan token o location')>=0){
        el.innerHTML='<span style="color:var(--redx)">La URL /exec sigue sirviendo la version VIEJA del script</span> (respondio: "'+esc(err)+'").<br>'

// ================= NOVEDADES DE CONVERSION DE VENTAS (diff entre syncs) =================
// Compara las oportunidades frescas contra la foto del sync anterior y registra:
// nuevos registros, cambios de stage, ganados y perdidos.
function computeGhlChanges(c, freshOps){
  c.ghl=c.ghl||{};
  const snap=c.ghl._snapshot;
  const now=new Date().toISOString();
  const changes=[];
  if(snap&&snap.length){
    const prev={};
    snap.forEach(function(s){ prev[s.id]=s; });
    freshOps.forEach(function(o){
      const p=prev[String(o.id)];
      const name=o.contactName||o.name||'Lead';
      if(!p){
        changes.push({ts:now,icon:'+',kind:'nuevo',text:'Nuevo registro: '+name+(o.pipelineStage?' — entro en "'+o.pipelineStage+'"':'')});
        return;
      }
      const st=(o.pipelineStage||'');
      if(p.stage!==st&&(p.stage||st)){
        changes.push({ts:now,icon:'\u2192',kind:'stage',text:name+': "'+(p.stage||'sin stage')+'" \u2192 "'+(st||'sin stage')+'"'});
      }
      const status=(o.status||'');
      if(p.status!==status){
        if(status==='won') changes.push({ts:now,icon:'$',kind:'ganado',text:name+' \u2014 GANADO'+(Number(o.monetaryValue)?' \u00b7 $'+Number(o.monetaryValue).toLocaleString('en-US'):'')});
        else if(status==='lost') changes.push({ts:now,icon:'x',kind:'perdido',text:name+' \u2014 perdido'});
        else if(status==='abandoned') changes.push({ts:now,icon:'x',kind:'perdido',text:name+' \u2014 abandonado'});
      }
    });
  }
  c.ghl._snapshot=freshOps.map(function(o){return {id:String(o.id),stage:o.pipelineStage||'',status:o.status||''};});
  if(changes.length) c.ghl._changes=changes.concat(c.ghl._changes||[]).slice(0,150);
  return changes.length;
}

  return ((c.ghl&&c.ghl._changes)||[]).filter(function(ch){return new Date(ch.ts).getTime()>seen;}).length;
}

function fmtAlarmVal(fmt,v){
  if(v==null||!isFinite(v)) return '-';
  if(fmt==='money') return '$'+(Math.round(v*100)/100).toLocaleString('en-US');
  if(fmt==='pct') return (Math.round(v*10)/10)+'%';
  return String(Math.round(v*10)/10);
}
// Valores actuales de TODAS las areas: tiempo real, funnel de ventas, lineas y contrato
function computeAlarmMetrics(c){
  const out={};
  // --- Tiempo real (rolling 7 dias) ---
  const l=(c.liveLines||[]).find(function(x){return x.rolling;});
  if(l){
    const m=l.metrics||{};
    const f=ghlFunnelForRange(c,l.dateStart,l.dateEnd)||{};
    const spent=Number(m.adSpent)||0;
    const div=function(n,d){return (d&&spent)?n/d:null;};
    const reg=(f.registros!=null)?f.registros:(m.registros!=null?Number(m.registros):null);
    const sq=(f.sql!=null)?f.sql:(m.sql!=null?Number(m.sql):null);
    out.adSpent=spent||null;
    out.cpm=(m.cpm!=null)?Number(m.cpm):null;
    out.cpc=(m.cpc!=null)?Number(m.cpc):null;
    out.cpl=(m.cpl!=null)?Number(m.cpl):null;
    out.costoRegistro=div(spent,reg);
    out.costoAgenda=(f.agendas!=null)?div(spent,f.agendas):null;
    out.costoSql=div(spent,sq);
    out.registros=reg;
    out.sqls=sq;
  }
  // --- Conversion de ventas (todo el historico de GHL, reglas de stages) ---
  const ops=(c.ghl&&c.ghl.opportunities)||[];
  if(ops.length){
    const rules=getGhlRules(c);
    const SQLS=(rules.sql&&rules.sql.length)?rules.sql:['tomando decision','nda','segunda llamada'];
    const isSql=function(o){return o._sql||SQLS.indexOf(_n(o.pipelineStage))>=0;};
    const cnt=function(arr){return (arr&&arr.length)?ops.filter(function(o){return arr.indexOf(_n(o.pipelineStage))>=0;}).length:null;};
    const agendas=cnt(rules.agendas), asis=cnt(rules.asistencias), noSh=cnt(rules.noShows), vivo=cnt(rules.llamadaEnVivo);
    const sqlN=ops.filter(isSql).length;
    const ganadosArr=ops.filter(function(o){return deriveEstado(o).label==='Ganado';});
    out.vtaAgendas=agendas;
    out.vtaShowsPct=(agendas&&asis!=null)?asis/agendas*100:null;
    out.vtaNoShowsPct=(agendas&&noSh!=null)?noSh/agendas*100:null;
    out.vtaLlamadasVivo=vivo;
    out.vtaCalificadoPct=(vivo)?sqlN/vivo*100:null;
    out.vtaCloseCalifPct=(sqlN)?ganadosArr.length/sqlN*100:null;
    out.vtaCerrados=ganadosArr.length;
    out.vtaRevenue=ganadosArr.reduce(function(s,o){return s+(Number(o.monetaryValue)||0);},0);
    out.vtaPipeline=ops.reduce(function(s,o){return s+(Number(o.monetaryValue)||0);},0);
    const accSpentL=(c.conversionLines||[]).reduce(function(s,li){return s+(Number(li.metrics&&li.metrics.adSpent)||0);},0);
    out.vtaCAC=(ganadosArr.length&&accSpentL)?accSpentL/ganadosArr.length:null;
  }
  // --- Lineas (acumulado del sheet) ---
  const lines=c.conversionLines||[];
  if(lines.length){
    const num=function(v){var n=Number(v);return isNaN(n)?0:n;};
    const accS=lines.reduce(function(s,li){return s+num(li.metrics&&li.metrics.adSpent);},0);
    const accR=lines.reduce(function(s,li){return s+num(li.metrics&&li.metrics.registros);},0);
    const accQ=lines.reduce(function(s,li){return s+num(li.metrics&&li.metrics.sql);},0);
    out.histSpent=accS||null;
    out.histCostoReg=(accR&&accS)?accS/accR:null;
    out.histCostoSql=(accQ&&accS)?accS/accQ:null;
    const al=getActiveLine(lines);
    out.diasBloque=al&&al.dateStart?days(al.dateStart,null):null;
  }
  // --- Contrato ---
  if(c.contract&&c.contract.endDate){
    out.contratoDias=Math.ceil((new Date(c.contract.endDate)-Date.now())/86400000);
  }
  return Object.keys(out).length?out:null;
}
function alarmStatus(c){
  const a=c.alarms||{};
  const rules=(a.rules||[]).filter(function(r){return r.enabled;});
  if(!rules.length) return {active:0,breached:0};
  const M=computeAlarmMetrics(c);
  let breached=0;
  if(M) rules.forEach(function(r){
    const v=M[r.metric];
    if(v==null) return;
    if(r.op==='gt'? v>Number(r.value) : v<Number(r.value)) breached++;
  });
  return {active:rules.length,breached:breached};
}
// Evalua y manda UN mail por cliente con todas las reglas disparadas (cooldown 24h por regla)
function checkAlarms(c){
  const a=c.alarms;
  if(!a||!a.email||!(a.rules||[]).length) return;
  const M=computeAlarmMetrics(c);
  if(!M) return;
  const proxy=getGhlProxy();
  if(!proxy.url) return;
  a.lastSent=a.lastSent||{};
  const triggered=[];
  (a.rules||[]).forEach(function(r){
    if(!r.enabled) return;
    const v=M[r.metric];
    if(v==null) return;
    const hit=r.op==='gt'? v>Number(r.value) : v<Number(r.value);
    if(hit && (Date.now()-(a.lastSent[r.id]||0))>24*3600000) triggered.push({r:r,v:v});
  });
  if(!triggered.length) return;
  const lines=triggered.map(function(t){
    const met=ALARM_METRICS.find(function(x){return x.id===t.r.metric;})||{label:t.r.metric,fmt:'num'};
    return '- '+met.label+': '+fmtAlarmVal(met.fmt,t.v)+' ('+(t.r.op==='gt'?'supera el maximo de ':'debajo del minimo de ')+fmtAlarmVal(met.fmt,Number(t.r.value))+')';
  });
  const subject='[EVOLVE] '+c.name+': '+triggered.length+' metrica'+(triggered.length>1?'s':'')+' fuera de benchmark';
  const body='Cliente: '+c.name+'\nVentana: ultimos 7 dias\nGenerado: '+new Date().toLocaleString('es-AR')+'\n\n'+lines.join('\n')+'\n\nAbri el tracker (Ads & Guiones / Conversion de ventas) para el detalle.';
  const url=proxy.url+'?action=alert&secret='+encodeURIComponent(proxy.secret)
    +'&to='+encodeURIComponent(a.email)
    +'&subject='+encodeURIComponent(subject)
    +'&body='+encodeURIComponent(body);
  fetch(url).then(function(r){return r.json();}).then(function(res){
    if(res&&res.ok){
      triggered.forEach(function(t){ a.lastSent[t.r.id]=Date.now(); });
      save();
      if(typeof toast==='function') toast('Alarma enviada a '+a.email);
    }
  }).catch(function(){});
}

    +'<div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="closeModal()">Cancelar</button>'

function saveAlarms(){
  const d=window._alarmDraft;
  const c=DB.clients.find(function(x){return x.id===d.clientId;});
  if(!c) return;
  const emailEl=document.getElementById('alarm-email');
  d.email=emailEl?emailEl.value.trim():d.email;
  c.alarms=c.alarms||{};
  c.alarms.email=d.email;
  c.alarms.rules=d.rules.filter(function(r){return r.metric&&r.value!==''&&r.value!=null;});
  c.alarms.lastSent=c.alarms.lastSent||{};
  save();
  closeModal();
  if(typeof toast==='function') toast('Alarmas guardadas');
  renderTab();
}
function testAlarmEmail(){
  const d=window._alarmDraft;
  const emailEl=document.getElementById('alarm-email');
  const to=(emailEl?emailEl.value.trim():'')||d.email;
  if(!to){ if(typeof toast==='function') toast('Ingresa un email primero'); return; }
  const proxy=getGhlProxy();
  if(!proxy.url){ if(typeof toast==='function') toast('Configura la conexion (proxy) primero'); return; }
  const c=DB.clients.find(function(x){return x.id===d.clientId;});
  const url=proxy.url+'?action=alert&secret='+encodeURIComponent(proxy.secret)
    +'&to='+encodeURIComponent(to)
    +'&subject='+encodeURIComponent('[EVOLVE] Prueba de alarmas - '+(c?c.name:''))
    +'&body='+encodeURIComponent('Este es un envio de prueba del sistema de alarmas de EVOLVE. Si lo recibiste, el Apps Script quedo bien configurado.');
  fetch(url).then(function(r){return r.json();}).then(function(res){
    if(typeof toast==='function') toast(res&&res.ok?'Mail de prueba enviado a '+to:('Error: '+((res&&res.error)||'desconocido')));
  }).catch(function(e){ if(typeof toast==='function') toast('Error de red: '+e.message); });
}

function kickLiveRefresh(c){
  window._liveLastKick=window._liveLastKick||{};
  const last=window._liveLastKick[c.id]||0;
  if(Date.now()-last<60000) return; // maximo 1 refresh por minuto por cliente
  window._liveLastKick[c.id]=Date.now();
  refreshLiveLine(c.id).then(function(line){
    if(!line) return; // null = ya habia un refresh en curso (evita loop)
    const cc=DB.clients.find(function(x){return x.id===c.id;});
    if(cc) checkAlarms(cc);
    if(S.tab==='ads' && S.clientId===c.id) renderTab();
  });
}

            +'<div style="overflow-x:auto;flex:1"><div style="display:flex;flex-direction:column;min-width:max-content">'
            +metricRows.map(function(r){return '<div style="display:flex">'+r+'</div>';}).join('')
            +'</div></div>';
        })()}
      </div>
    </div>`:''}`;

  }

  else if(S.tab==='integraciones'){
    const proxy=getGhlProxy();
    const ghlOk=!!(proxy.url && c.ghl && c.ghl.token && c.ghl.locationId);

    const sheetsOk=!!localStorage.getItem('evold-api-key');

    const iaOk=!!localStorage.getItem('evold-anthropic-key');
    const alarmOk=!!(c.alarms&&c.alarms.email&&(c.alarms.rules||[]).some(function(r){return r.enabled;}));

    const card=function(o){
      return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;display:flex;flex-direction:column;gap:8px'+(o.st==='sug'?';opacity:0.65':'')+'">'

        +'<div style="font-size:11.5px;color:var(--text3);line-height:1.5;flex:1">'+o.desc+'</div>'
        +(o.detail?'<div class="mono" style="font-size:11px;color:var(--text2)">'+o.detail+'</div>':'')
        +((o.action||o.action2)?'<div style="display:flex;gap:6px;margin-top:2px">'

    const _fmtAgo=function(iso){ if(!iso) return ''; try{ return new Date(iso).toLocaleDateString('es-AR')+' '+new Date(iso).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } };

    const conectadas=[
      card({name:'GoHighLevel (CRM)',st:ghlOk?'ok':(ghlPartial?'partial':'no'),
        desc:'Oportunidades, stages, contactos y UTMs via el proxy de Apps Script. Alimenta Conversion de ventas, el funnel semanal y las metricas por linea.',
        detail:ghlOk?(opsN+' oportunidades &middot; ultimo sync '+_fmtAgo(c.ghl.lastSync)):(ghlPartial?'Falta '+(proxy.url?'token/location del cliente':'la URL del proxy'):''),
        action:'openGhlProxyModal()',actionLabel:ghlOk?'Conexion (proxy)':'Conectar',
        action2:ghlOk?"(function(){var x=DB.clients.find(function(z){return z.id==="+c.id+";});x.ghl.token='';save();switchTab('ventas');})()":null,
        action2Label:'Cambiar token'}),
      card({name:'Meta Ads',st:metaOk?'ok':'no',
        desc:'Campanas, adsets, anuncios e inversion en tiempo real (por periodo, campana y pais). Requiere token de sistema y Account ID.',
        detail:metaOk?('act_'+esc(c.metaAccountId)+(campN?' &middot; '+campN+' campanas sincronizadas':'')):'',
        action:'openMetaConfig('+c.id+')',actionLabel:metaOk?'Editar token':'Conectar'}),
      card({name:'Google Sheets (tracker semanal)',st:sheetsOk?'ok':'no',
        desc:'Importa las metricas semanales del sheet del equipo a la linea activa de cada cliente (bloques, adsets y guiones).',
        detail:sheetsOk?'API key cargada &middot; sheet del equipo':'',
        action:'openSyncModal()',actionLabel:sheetsOk?'Sincronizar':'Conectar'}),
      card({name:'Fathom (llamadas)',st:fathomN?'ok':'no',
        desc:'Llamadas grabadas del cliente para el Success tracker, las metricas de llamadas y el contexto de los reportes con IA. Importacion por JSON.',
        detail:fathomN?(fathomN+' llamadas importadas'):'',
        action:"switchTab('success')",actionLabel:fathomN?'Ver llamadas':'Importar'}),
      card({name:'Claude (reportes IA)',st:iaOk?'ok':'no',
        desc:'Genera reportes de estado del cliente y emails de delegacion de tareas con IA.',
        detail:iaOk?'API key cargada':'',
        action:'openAnthropicKeyModal()',actionLabel:iaOk?'Cambiar key':'Conectar'}),
      card({name:'Informe semanal automatico',st:(localStorage.getItem('evold-report-pushed')&&localStorage.getItem('evold-report-email'))?'ok':'no',
        desc:'Cada lunes ~10hs el Apps Script manda por mail el informe de la semana pasada de cada cliente (inversion Meta + funnel GHL), sin abrir el tracker.',
        detail:localStorage.getItem('evold-report-email')?('&rarr; '+esc(localStorage.getItem('evold-report-email'))+' &middot; sync '+new Date(+localStorage.getItem('evold-report-pushed')||Date.now()).toLocaleDateString('es-AR')):'',
        action:'openWeeklyReportModal()',actionLabel:localStorage.getItem('evold-report-pushed')?'Configurar':'Activar'}),
      card({name:'Alarmas por email',st:alarmOk?'ok':'no',
        desc:'Benchmarks sobre los ultimos 7 dias (CPL, costo por agenda, registros...). Si algo se sale, manda un mail via el Apps Script.',
        detail:alarmOk?(alarmN+' regla'+(alarmN>1?'s':'')+' activa'+(alarmN>1?'s':'')+' &rarr; '+esc(c.alarms.email)):'',
        action:'openAlarmsModal('+c.id+')',actionLabel:alarmOk?'Editar reglas':'Configurar'})
    ].join('');

    const sugeridas=[
      card({name:'Slack',st:'sug',desc:'Mandar las alarmas de benchmark y los archivos semanales a un canal del equipo en vez de (o ademas de) email.'}),
      card({name:'WhatsApp',st:'sug',desc:'Notificaciones de leads calificados o alarmas criticas directo al telefono via WhatsApp Business API.'}),
      card({name:'Stripe / pagos',st:'sug',desc:'Traer el Collected real de cada cliente para cerrar el circulo revenue facturado vs revenue del pipeline.'}),
      card({name:'Google Calendar',st:'sug',desc:'Leer las agendas reales de los closers para shows/no-shows exactos en vez de derivarlos por stage.'}),
      card({name:'TikTok Ads',st:'sug',desc:'Mismo tratamiento que Meta (inversion, campanas, tiempo real) para clientes que pauten en TikTok.'}),

    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">'+sugeridas+'</div>';

  else if(S.tab==='alarmas'){
    const a=c.alarms||{email:'',rules:[],lastSent:{}};

    const rules=a.rules||[];
    const activas=rules.filter(function(r){return r.enabled;});
    let breached=0;
    activas.forEach(function(r){
      const v=M[r.metric];
      if(v==null) return;
      if(r.op==='gt'? v>Number(r.value) : v<Number(r.value)) breached++;
    });
    const lastSentTs=Object.keys(a.lastSent||{}).map(function(k){return a.lastSent[k];}).sort().pop();

    let html='';
    // resumen
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px">'
      +'<div class="metric-card"><div class="metric-label">Reglas activas</div><div class="metric-value">'+activas.length+'</div></div>'
      +'<div class="metric-card"'+(breached?' style="background:rgba(216,90,48,0.08);border:0.5px solid rgba(216,90,48,0.25)"':'')+'><div class="metric-label"'+(breached?' style="color:var(--redx)"':'')+'>Fuera de benchmark ahora</div><div class="metric-value"'+(breached?' style="color:var(--redx)"':'')+'>'+breached+'</div></div>'
      +'<div class="metric-card"><div class="metric-label">Enviar a</div><div class="metric-value" style="font-size:14px;word-break:break-all">'+(a.email?esc(a.email):'<span style="color:var(--text3)">sin configurar</span>')+'</div></div>'
      +'<div class="metric-card"><div class="metric-label">Ultimo aviso</div><div class="metric-value" style="font-size:14px">'+(lastSentTs?new Date(lastSentTs).toLocaleDateString('es-AR')+' '+new Date(lastSentTs).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'<span style="color:var(--text3)">nunca</span>')+'</div></div>'
      +'</div>';
    // acciones
    html+='<div style="display:flex;gap:8px;margin-bottom:22px">'
      +'<button class="btn btn-sm btn-primary" onclick="openAlarmsModal('+c.id+')">'+(rules.length?'Editar reglas':'Crear reglas')+'</button>'

      +'</div>';
    // tabla de reglas agrupadas con estado en vivo
    if(rules.length){
      const groups=[];
      ALARM_METRICS.forEach(function(m){ if(groups.indexOf(m.group)<0) groups.push(m.group); });
      html+='<div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">';
      groups.forEach(function(g){
        const gr=rules.filter(function(r){var m=ALARM_METRICS.find(function(x){return x.id===r.metric;});return m&&m.group===g;});
        if(!gr.length) return;
        html+='<div style="padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em">'+g+'</div>';
        gr.forEach(function(r){
          const met=ALARM_METRICS.find(function(x){return x.id===r.metric;});
          const cur=M[r.metric];
          const hit=r.enabled&&cur!=null&&(r.op==='gt'?cur>Number(r.value):cur<Number(r.value));
          const estado=!r.enabled?'<span class="pill pill-gray" style="font-size:10px">Pausada</span>'
            :cur==null?'<span class="pill pill-gray" style="font-size:10px">Sin dato</span>'
            :hit?'<span class="pill pill-red" style="font-size:10px">Fuera</span>'
            :'<span class="pill pill-green" style="font-size:10px">OK</span>';
          const cooldown=(a.lastSent&&a.lastSent[r.id]&&(Date.now()-a.lastSent[r.id])<24*3600000)?' &middot; avisado hoy':'';
          html+='<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border)">'
            +'<div><div style="font-size:12.5px;color:var(--text)">'+met.label+'</div>'
            +'<div class="mono" style="font-size:10.5px;color:var(--text3)">'+(r.op==='gt'?'avisar si supera ':'avisar si baja de ')+fmtAlarmVal(met.fmt,Number(r.value))+cooldown+'</div></div>'
            +'<div style="display:flex;align-items:center;gap:12px"><span class="mono" style="font-size:12.5px;color:'+(cur==null?'var(--text3)':hit?'var(--redx)':'var(--strong)')+'">'+fmtAlarmVal(met.fmt,cur)+'</span>'+estado+'</div>'
            +'</div>';
        });
      });
      html+='</div>';
      html+='<div style="font-size:11px;color:var(--text3);margin-top:12px">Las reglas se evaluan al refrescar los datos en vivo (al abrir Ads & Guiones). Cada regla avisa por mail como maximo una vez cada 24 h.</div>';
    } else {
      html+='<div style="padding:40px 20px;text-align:center;border:1px dashed var(--border2);border-radius:var(--radius-lg)">'
        +'<div style="font-size:13px;color:var(--text2);margin-bottom:4px">Sin reglas configuradas</div>'
        +'<div style="font-size:11.5px;color:var(--text3);max-width:420px;margin:0 auto">Crea benchmarks sobre cualquier metrica de la app - tiempo real, funnel de ventas, lineas historicas o contrato - y recibi un mail cuando algo se salga.</div>'
        +'</div>';
    }
    el.innerHTML=html;
  }

  else if(S.tab==='tareas'){
    var tasks=c.tasks||[];
    var overdue=tasks.filter(function(t){return !t.done&&t.due&&new Date(t.due)<new Date();});
    var pending=tasks.filter(function(t){return !t.done&&!(t.due&&new Date(t.due)<new Date());});

    el.innerHTML=
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'

      +'<div style="font-size:14px;font-weight:500;color:var(--text)">Tareas'
      +(overdue.length?' <span style="background:rgba(216,90,48,0.12);color:var(--redx);padding:2px 8px;border-radius:20px;font-size:11px;margin-left:6px">'+overdue.length+' vencidas</span>':'')
      +'</div>'
      +'<div style="font-size:12px;color:var(--text3);margin-top:3px">'+esc(c.name)+(lastCall?' &middot; ultima llamada: '+esc(lastCall.date):'')+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="btn btn-sm" onclick="addTaskManual('+c.id+')">+ Nueva</button>'
      +'<button class="btn btn-sm btn-primary" id="extract-tasks-btn" onclick="extractTasksFromCalls('+c.id+')">'
      +(lastCall?'Extraer de: '+esc(lastCall.date):'Sin llamadas')+'</button>'
      +'</div></div>'
      +(overdue.length
        ?'<div style="font-size:11px;font-weight:500;color:var(--redx);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Vencidas</div>'
          +overdue.map(function(t){return renderTaskRow(t,c.id);}).join('')
        :'')
      +(pending.length
        ?'<div style="font-size:11px;font-weight:500;color:var(--text3);margin:'+(overdue.length?'16':'0')+'px 0 6px;text-transform:uppercase;letter-spacing:.5px">Pendientes</div>'
          +pending.map(function(t){return renderTaskRow(t,c.id);}).join('')
        :'<div style="padding:40px;text-align:center;color:var(--text3);font-size:12px">Sin tareas pendientes. Hace clic en Extraer para leer la ultima llamada.</div>')
      +(done.length
        ?'<div style="font-size:11px;font-weight:500;color:var(--text3);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.5px">Completadas</div>'
          +done.slice(0,5).map(function(t){return renderTaskRow(t,c.id);}).join('')
        :'');
  }

  else if(S.tab==='ventas'){
    renderVentasTab(c, el);
  }
}

  const ci=DB.clients.length%COLORS.length;
  DB.clients.push({
    id:Date.now(),name,industry,
    avatar:name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(),
    color:ci,health:{score:null,label:'Sin datos',color:'gray'},
    monthlyLeads:0,monthlyBudget:0,avgCPL:0,conversionLines:[],

  save();closeModal();renderSidebar();showOverview();toast('Cliente creado OK');
}

function deleteConversionLine(clientId, lineId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  const line=(c.conversionLines||[]).find(function(l){return l.id===lineId;});
  if(!line) return;
  if(!confirm('Eliminar la linea "'+(line.version||'')+'"? Esta accion no se puede deshacer.')) return;
  c.conversionLines=c.conversionLines.filter(function(l){return l.id!==lineId;});
  // No hace falta reasignar "activa": se calcula sola en base a las fechas de las lineas que queden
  save();
  toast('Linea eliminada');
  renderTab();
}

function gv(id,type){
  const v=document.getElementById(id)?.value;
  if(v===''||v===null||v===undefined)return null;
  if(type==='float')return parseFloat(v)||null;
  if(type==='int')return parseInt(v)||null;
  return v;
}

function saveLine(clientId, lineId){
  const c=DB.clients.find(x=>x.id===clientId);
  const isEdit=!!lineId;
  // FIX: normalize dates to YYYY-MM-DD on save
  const rawStart=gv('nl-start');
  const rawEnd=gv('nl-end');
  const data={
    id:lineId||('l'+Date.now()),
    version:gv('nl-ver')||('v'+(c.conversionLines.length+(isEdit?0:1))),
    dateStart:rawStart?toInputDate(rawStart):null,
    dateEnd:rawEnd?toInputDate(rawEnd):null,
    campaign:gv('nl-campaign')||'',adset:gv('nl-adset')||'',ad:gv('nl-ad')||'',
    filtro:gv('nl-filtro'),destino:gv('nl-dest'),
    metrics:{
      adSpent:gv('nl-spent','float'),pageViews:gv('nl-pv','int'),
      cpm:gv('nl-cpm','float'),cpc:gv('nl-cpc','float'),
      optIn:gv('nl-optin','float'),cpl:gv('nl-cpl','float'),
      registros:gv('nl-reg','int'),sql:gv('nl-sql','int')
    },
    notes:gv('nl-note')||'',
    adsets:getModalAdsets(),
    status:isEdit?(c.conversionLines.find(x=>x.id===lineId)?.status||'historico'):'activa'
  };
  if(!isEdit){
    c.conversionLines.forEach(l=>l.status='historico');
    c.conversionLines.push(data);
    const reg=data.metrics.registros||0,cpl=data.metrics.cpl||0;
    if(reg>0&&cpl>0){c.monthlyLeads=reg;c.avgCPL=cpl;c.monthlyBudget=Math.round(cpl*reg);}
  } else {
    const idx=c.conversionLines.findIndex(x=>x.id===lineId);
    if(idx>=0)c.conversionLines[idx]={...c.conversionLines[idx],...data};
  }
  save();closeModal();renderClient();toast(isEdit?'Linea actualizada OK':'Linea guardada OK');
}

function uploadContract(clientId, inputEl){
  const c=DB.clients.find(x=>x.id===clientId);
  if(!c||!inputEl.files[0]) return;
  const f=inputEl.files[0];
  if(!c.contract) c.contract={};
  c.contract.fileName=f.name;
  c.contract.fileSize=Math.round(f.size/1024)+'KB';
  c.contract.driveUrl=null;
  save();renderTab();
  // Read file as base64 for PDF or text
  const reader=new FileReader();
  reader.onload=ev=>{
    const base64=ev.target.result.split(',')[1];
    const key=localStorage.getItem('evold-anthropic-key')||'';
    if(!key){
      openAnthropicKeyModal();
      // Store file data temporarily so user can retry after entering key
      if(c.contract) c.contract._pendingFile={base64,name:f.name,type:f.type};
      save();renderTab();
      return;
    }
    extractContractWithAI(clientId, {base64, name:f.name, type:f.type}, null);
  };
  reader.readAsDataURL(f);
}

async function extractContractWithAI(clientId, file, driveUrl){
  const c=DB.clients.find(x=>x.id===clientId);
  if(!c) return;
  // Check API key FIRST before anything
  const anthropicKey = localStorage.getItem('evold-anthropic-key')||'';
  if(!anthropicKey){
    openAnthropicKeyModal();
    // After modal closes, user must re-upload - clear the analyzing state
    if(c.contract) { c.contract._analyzing=false; }
    save(); renderTab();
    return;
  }
  // Mark as analyzing in UI
  if(c.contract) c.contract._analyzing=true;
  save(); renderTab();
  toast('Analizando contrato con IA...');
  try {
    let messages;
    if(file){
      messages=[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:file.type||'application/pdf',data:file.base64}},
        {type:'text',text:'Extrae del contrato los siguientes campos y responde SOLO con un JSON valido sin markdown ni texto extra: { "minDailyBudget": numero en USD por dia de inversion minima en pauta, "minOCsMonth": numero de OCs/registros calificados garantizados por mes, "totalOCs": numero total de OCs garantizadas en el contrato, "durationDays": duracion del contrato en dias, "startDate": fecha de inicio en formato YYYY-MM-DD o null, "endDate": fecha de vencimiento en formato YYYY-MM-DD o null, "signDate": fecha de firma en formato DD/MM/YYYY o null, "contractValue": monto total que paga el cliente por el servicio principal en USD como numero (sin simbolo), "monthlyFee": monto del fee mensual opcional o de renovacion en USD como numero o null si no existe, "serviceType": "garantia" si es un contrato de servicios con garantia de resultados, "recurrente" si paga mensualmente sin contrato de garantia, o "one-time" si es un pago unico sin renovacion }'}
      ]}];
    } else {
      // Drive URL - can't access directly, skip AI and let user fill manually
      const c2=DB.clients.find(x=>x.id===clientId);
      if(c2){const el=document.getElementById('st-analyzing-'+clientId);if(el)el.closest('div').remove();}
      toast('Contrato vinculado. Completa las condiciones manualmente.');
      return;
    }
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:600,messages})
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(`API ${res.status}: ${err?.error?.message||res.statusText}`);
    }
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    let extracted;
    try{ extracted=JSON.parse(clean); }
    catch(pe){ throw new Error('Respuesta invalida del modelo: '+text.slice(0,100)); }
    var clientFields=['contractValue','monthlyFee','serviceType'];
    Object.entries(extracted).forEach(([k,v])=>{
      if(v!==null&&v!==undefined){
        if(clientFields.indexOf(k)>=0) c[k]=v;
        else c.contract[k]=v;
      }
    });
    if(extracted.serviceType==='recurrente') c.recurrente=true;
    c.contract._analyzing=false;
    save();renderTab();
    toast('Contrato analizado - campos completados automaticamente');
  } catch(e){
    if(c.contract) c.contract._analyzing=false;
    save();renderTab();
    toast('Error: '+e.message,'red');
    console.error('Contract AI error:',e);
  }
}

function importFathomJSON(clientId){
  const c=DB.clients.find(x=>x.id===clientId);
  if(!c) return;
  const raw=document.getElementById('fathom-json-input').value.trim();
  let calls=[];
  try{
    const clean=raw.replace(/` + '```' + `json|` + '```' + `/g,'').trim();
    calls=JSON.parse(clean);
    if(!Array.isArray(calls)) throw new Error();
  }catch(e){
    toast('JSON invalido, revisa el formato','red');
    return;
  }
  if(!calls.length){toast('No hay llamadas en el JSON','red');return;}
  c.fathomCalls=calls;
  const existingIds=new Set((c.milestones||[]).map(m=>m.fathomId).filter(Boolean));
  const newMilestones=calls
    .filter(cl=>!existingIds.has(cl.id))
    .map(cl=>({
      type:cl.sentiment==='satisfecho'?'hito':'alerta',
      title:cl.title,
      date:cl.date,
      body:cl.summary+(cl.actionItems&&cl.actionItems.length?'\n\nAction items: '+cl.actionItems.join(', '):'')+(cl.riskFlags&&cl.riskFlags.length?'\n\nRiesgos: '+cl.riskFlags.join(', '):''),
      tags:[cl.sentiment==='satisfecho'?'Llamada':'Llamada - atencion',cl.duration].filter(Boolean),
      fathomId:cl.id
    }));
  if(!c.milestones) c.milestones=[];
  c.milestones=[...c.milestones,...newMilestones];
  c.milestones.sort((a,b)=>b.date.split('/').reverse().join('').localeCompare(a.date.split('/').reverse().join('')));
  save();closeModal();renderTab();
  toast(calls.length+' llamadas importadas');
}

// ---------- Reporte de llamada con IA ----------
function buildReportContext(c){
  const contract = c.contract||{};
  const lines = (c.conversionLines||[]).map(function(l){
    var m = l.metrics||{};
    return {
      bloque: l.version||l.blockKey||'-',
      estado: l.status||'-',
      rango: (l.dateStart||'?')+' a '+(l.dateEnd||'actual'),
      campana: l.campaign||'-',
      filtro: l.filtro||'-',
      destino: l.destino||'-',
      adSpent: m.adSpent, cpl: m.cpl, cpm: m.cpm, cpc: m.cpc,
      optIn: m.optIn, registros: m.registros, sql: m.sql, pageViews: m.pageViews,
      nota: l.notes||''
    };
  });
  const hitos = (c.milestones||[]).map(function(h){
    return { tipo:h.type, titulo:h.title, fecha:h.date, detalle:h.body||'' };
  });
  const llamadas = (c.fathomCalls||[]).map(function(cl){
    return {
      titulo: cl.title, fecha: cl.date, sentiment: cl.sentiment,
      resumen: cl.summary||'',
      actionItems: cl.actionItems||[],
      riesgos: cl.riskFlags||[]
    };
  });
  // ---- Matematica del contrato (pre-calculada para que la IA no haga cuentas) ----
  const r2=function(n){return (n===null||n===undefined||isNaN(n))?null:Math.round(n*100)/100;};
  const minDaily=contract.minDailyBudget||null;
  const durationDays=contract.durationDays||null;
  const totalOCs=contract.totalOCs||null;
  const minOCsMonth=contract.minOCsMonth||null;
  const inversionTotalContrato=(minDaily&&durationDays)?minDaily*durationDays:null;
  const costoSqlIdoneo=(inversionTotalContrato&&totalOCs)?inversionTotalContrato/totalOCs:null;
  const ocsAcumuladas=(c.conversionLines||[]).reduce(function(s,l){var v=l.metrics&&l.metrics.sql;return s+((v!==null&&v!==undefined)?Number(v):0);},0);
  const inversionAcumulada=(c.conversionLines||[]).reduce(function(s,l){return s+((l.metrics&&l.metrics.adSpent)||0);},0);
  const diasTranscurridos=days(contract.startDate, null)|| (c.conversionLines[0]?days(c.conversionLines[0].dateStart,null):null);
  const dailySpendReal=(inversionAcumulada&&diasTranscurridos)?inversionAcumulada/diasTranscurridos:null;
  const costoSqlReal=(inversionAcumulada&&ocsAcumuladas>0)?inversionAcumulada/ocsAcumuladas:null;
  const ocsEsperadasAHoy=(totalOCs&&durationDays&&diasTranscurridos)?Math.round(totalOCs/durationDays*diasTranscurridos):null;
  // Remediacion si el costo real supera el idoneo
  let inversionExtra=null, diasExtension=null;
  if(costoSqlReal!==null&&costoSqlIdoneo!==null&&costoSqlReal>costoSqlIdoneo&&totalOCs&&minDaily){
    inversionExtra=totalOCs*costoSqlReal-inversionTotalContrato;
    diasExtension=Math.round(inversionExtra/minDaily);
  }
  let estadoCosto='sin_datos';
  if(costoSqlReal!==null&&costoSqlIdoneo!==null) estadoCosto=(costoSqlReal<=costoSqlIdoneo)?'en_o_bajo_idoneo':'sobre_idoneo';
  const estadoRitmo=(ocsEsperadasAHoy!==null)?(ocsAcumuladas>=ocsEsperadasAHoy?'en_ritmo':'atrasado'):'sin_datos';
  const presupuestoSubejecutado=(dailySpendReal!==null&&minDaily!==null)?(dailySpendReal < minDaily*0.8):null;

  return {
    cliente: c.name,
    tipo: c.subtitle||'',
    objetivos: {
      inversionDiariaMin: minDaily,
      ocsMensualesGarantizadas: minOCsMonth,
      ocsTotalesGarantizadas: totalOCs,
      duracionDias: durationDays,
      cplObjetivo: c.targetCPL||null,
      fechaFirma: contract.signDate||null,
      vencimiento: contract.endDate||null
    },
    metricasCalculadas: {
      inversionTotalContrato: r2(inversionTotalContrato),
      costoSqlIdoneo: r2(costoSqlIdoneo),
      ocsAcumuladas: ocsAcumuladas,
      inversionAcumulada: r2(inversionAcumulada),
      diasTranscurridos: diasTranscurridos,
      dailySpendReal: r2(dailySpendReal),
      costoSqlReal: r2(costoSqlReal),
      ocsEsperadasAHoy: ocsEsperadasAHoy,
      estadoCosto: estadoCosto,
      estadoRitmo: estadoRitmo,
      presupuestoSubejecutado: presupuestoSubejecutado,
      inversionExtraParaCumplir: r2(inversionExtra),
      diasExtensionParaCumplir: diasExtension
    },
    lineasDeConversion: lines,
    hitosYCambios: hitos,
    llamadas: llamadas
  };
}

function reportToPlainText(r){
  let out = (r.titulo||'Reporte')+'\n';
  if(r.periodo) out += 'Periodo: '+r.periodo+'\n';
  out += '\n';
  (r.secciones||[]).forEach(function(s){
    out += (s.titulo||'').toUpperCase()+'\n';
    (s.items||[]).forEach(function(it){ out += '  - '+it+'\n'; });
    out += '\n';
  });
  return out.trim();
}

function copyCallReport(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.lastReport) return;
  const txt=reportToPlainText(c.lastReport);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('Reporte copiado OK');},function(){toast('No se pudo copiar','red');});
  } else {
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast('Reporte copiado OK');}catch(e){toast('No se pudo copiar','red');}
    document.body.removeChild(ta);
  }
}

function downloadCallReport(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});

function loadScriptOnce(src){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src=src; s.async=true;
    s.onload=function(){resolve();};
    s.onerror=function(){ if(s.parentNode) s.parentNode.removeChild(s); reject(new Error('fail '+src)); };
    document.head.appendChild(s);
  });
}

// ================= Conversion de ventas (GHL) =================
// Cuenta el funnel de GHL para un rango: cada lead cae en el rango segun su fecha de creacion,
// y se clasifica con las reglas de stages de Conversion de ventas (estado actual del lead).
function ghlFunnelForRange(c,dateStart,dateEnd){
  const opps=(c.ghl&&c.ghl.opportunities)||[];
  if(!opps.length||!dateStart) return null;
  const rules=getGhlRules(c);
  const s=new Date(dateStart);
  const e=dateEnd?new Date(dateEnd):new Date();
  e.setHours(23,59,59,999);
  const ops=opps.filter(function(o){
    if(!o.createdAt) return false;
    const d=new Date(o.createdAt);
    return d>=s && d<=e;
  });
  const cnt=function(arr){ return (arr&&arr.length)? ops.filter(function(o){return arr.indexOf(_n(o.pipelineStage))>=0;}).length : null; };
  const SQLS=(rules.sql&&rules.sql.length)?rules.sql:['tomando decision','nda','segunda llamada'];
  const isSql=function(o){ return o._sql || SQLS.indexOf(_n(o.pipelineStage))>=0; };
  return {
    registros: ops.length,
    sql: ops.filter(isSql).length,
    agendas: cnt(rules.agendas),
    enVivo: cnt(rules.llamadaEnVivo),
    calif: (rules.llamadaEnVivo&&rules.llamadaEnVivo.length)? ops.filter(function(o){return rules.llamadaEnVivo.indexOf(_n(o.pipelineStage))>=0 && isSql(o);}).length : null
  };
}

function getGhlRules(c){
  const r=(c&&c.ghlRules)||{};
  return {
    ganado:r.ganado||[],
    abandonado:r.abandonado||[],
    abandonadoDias:r.abandonadoDias!=null?r.abandonadoDias:7,
    sql:r.sql||[],
    llamadaEnVivo:r.llamadaEnVivo||[],
    agendas:r.agendas||[],
    asistencias:r.asistencias||[],
    noShows:r.noShows||[],
    presentaciones:r.presentaciones||[]
  };
}
function deriveEstado(o){
  const c=DB.clients.find(function(x){return x.id===S.clientId;});
  const rules=getGhlRules(c);
  const stageN=_n(o.pipelineStage);
  const hasCustomGanado=rules.ganado.length>0;
  const hasCustomAbandonado=rules.abandonado.length>0;
  if(hasCustomGanado){
    if(rules.ganado.indexOf(stageN)>=0) return {label:'Ganado',color:'var(--accent)',bg:'rgba(29,158,117,0.15)'};
  } else if(stageN.indexOf('compr')>=0 && !/(^|\s)no\s+compr/.test(stageN)){
    return {label:'Ganado',color:'var(--accent)',bg:'rgba(29,158,117,0.15)'};
  }
  if(hasCustomAbandonado){
    if(rules.abandonado.indexOf(stageN)>=0 && o.createdAt){
      var dias1=Math.floor((Date.now()-new Date(o.createdAt).getTime())/86400000);
      if(dias1>=rules.abandonadoDias) return {label:'Abandonado',color:'var(--redx)',bg:'rgba(216,90,48,0.15)'};
    }
  } else if(stageN.indexOf('no respondi')>=0 && o.createdAt){
    var dias2=Math.floor((Date.now()-new Date(o.createdAt).getTime())/86400000);
    if(dias2>=7) return {label:'Abandonado',color:'var(--redx)',bg:'rgba(216,90,48,0.15)'};
  }
  const raw=(o.status||'').toLowerCase();
  if(raw==='won') return {label:'Ganado',color:'var(--accent)',bg:'rgba(29,158,117,0.15)'};
  if(raw==='lost') return {label:'Perdido',color:'var(--redx)',bg:'rgba(216,90,48,0.15)'};
  return {label:o.status||'En proceso',color:'var(--amberx)',bg:'rgba(240,168,48,0.15)'};
}

async function syncGhl(clientId, silent){
  const c=DB.clients.find(function(x){return x.id===clientId;}); if(!c) return;
  const proxy=getGhlProxy();
  c.ghl=c.ghl||{};
  if(!proxy.url||!proxy.secret){ if(!silent) toast('Configura primero la conexion con GHL','red'); return; }
  if(!c.ghl.token||!c.ghl.locationId){ if(!silent) toast('Falta el token o el location del cliente','red'); return; }
  if(c.ghl._syncing) return;
  c.ghl._syncing=true; if(!silent) toast('Sincronizando con GHL...'); renderTab();
  const pageLimit=100; // fetch 100 per page
  const controller=new AbortController();
  const timer=setTimeout(function(){ controller.abort(); }, 180000);
  try{
    // Paginate through all opportunities
    var allOpps=[];
    var startAfter=null;
    var page=1;
    while(true){
      var u=proxy.url+(proxy.url.indexOf('?')>=0?'&':'?')
        +'secret='+encodeURIComponent(proxy.secret)
        +'&token='+encodeURIComponent(c.ghl.token)
        +'&location='+encodeURIComponent(c.ghl.locationId)
        +'&action=opportunities&limit='+pageLimit;
      if(startAfter) u+='&startAfter='+encodeURIComponent(startAfter);
      toast('Sincronizando pagina '+page+'... ('+allOpps.length+' hasta ahora)');
      const res=await fetch(u, {method:'GET', signal:controller.signal});
      const text=await res.text();
      let data;
      try{ data=JSON.parse(text); }
      catch(pe){ throw new Error('El proxy no devolvio JSON. Empieza con: '+text.slice(0,80)); }
      if(!data || data.ok===false) throw new Error((data&&data.error)||'Respuesta invalida del proxy');
      const batch=data.opportunities||[];
      allOpps=allOpps.concat(batch);
      // Stop conditions
      const metaTotal=data.meta&&data.meta.total ? parseInt(data.meta.total) : null;
      if(metaTotal && allOpps.length >= metaTotal){ break; } // got all
      if(batch.length < pageLimit){ break; } // last page - got fewer than requested
      // Only paginate if startAfter is a NEW value we haven't used
      const nextSA=data.meta&&data.meta.startAfter;
      if(!nextSA || nextSA===startAfter){ break; } // no new cursor
      startAfter=nextSA;
      page++;
      if(page>5) break; // safety: max 500
    }
    clearTimeout(timer);
    const nChanges=computeGhlChanges(c, allOpps);
    c.ghl.opportunities=allOpps;
    c.ghl.lastSync=new Date().toISOString();
    c.ghl._syncing=false; save();
    toast(allOpps.length+' oportunidades sincronizadas'+(nChanges?' \u00b7 '+nChanges+' novedades':''));
    renderTab();
    enrichContactsBackground(c, proxy);
  }catch(e){
    clearTimeout(timer);
    c.ghl._syncing=false;
    c.ghl._syncError=e.name==='AbortError'?'Tardo demasiado. Reintenta.':(e.message||'fallo la sincronizacion');
    save();
    const msg='Error GHL: '+c.ghl._syncError;
    toast(msg,'red');
    console.error('GHL sync error',e);
    // Don't call renderTab here to avoid infinite loop
    const el=document.getElementById('tab-content');
    if(el) el.innerHTML='<div style="padding:20px;color:var(--redx);font-size:13px">Error: '+c.ghl._syncError+'<br><button class="btn btn-sm" style="margin-top:10px" onclick="syncGhl('+clientId+',false)">Reintentar</button></div>';
  }
}

async function enrichContactsBackground(c, proxy){
  // Opps a las que les falta utmAd, utmCampaign, ubicacion o tags (y no se intentaron en las ultimas 24h)
  const _now=Date.now();
  const toEnrich=(c.ghl.opportunities||[]).filter(function(o){
    if(!o.contactId) return false;
    if(o._enrichTry && (_now-o._enrichTry)<24*3600000) return false;
    return (!o.source.utmAd || !o.source.utmCampaign || !o.geo.location || !o.tags);
  });
  if(!toEnrich.length) return;
  const base=proxy.url+(proxy.url.indexOf('?')>=0?'&':'?')
    +'secret='+encodeURIComponent(proxy.secret)
    +'&token='+encodeURIComponent(c.ghl.token)
    +'&location='+encodeURIComponent(c.ghl.locationId);
  var enriched=0;
  for(var i=0;i<toEnrich.length;i++){
    var opp=toEnrich[i];
    try{
      var url=base+'&action=contact&contactId='+encodeURIComponent(opp.contactId);
      var res=await fetch(url);
      var data=await res.json();
      if(data.ok){
        if(data.utmAd) opp.source.utmAd=data.utmAd;
        if(data.location) opp.geo.location=data.location;
        if(data.utmCampaign && !opp.source.utmCampaign) opp.source.utmCampaign=data.utmCampaign;
        if(data.utmSource && !opp.source.utmSource) opp.source.utmSource=data.utmSource;
        var dTags=data.tags||data.contactTags||null;
        if(dTags && Array.isArray(dTags) && dTags.length) opp.tags=dTags;
        enriched++;
        if(enriched%10===0){ save(); }
      }
    }catch(e){}
    opp._enrichTry=Date.now();
    await new Promise(function(r){setTimeout(r,100);}); // 100ms between requests
  }
  if(enriched>0){ save(); renderTab(); toast(enriched+' contactos enriquecidos'); }
}

function _ghlAgo(iso){
  if(!iso) return 'nunca';
  const mins=Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if(mins<1) return 'recien'; if(mins<60) return 'hace '+mins+' min';
  const h=Math.floor(mins/60); if(h<24) return 'hace '+h+' h'; return 'hace '+Math.floor(h/24)+' d';
}

function renderVentasTab(c, el){
  const esc=function(s){return String(s===null||s===undefined?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
  const proxy=getGhlProxy();
  c.ghl=c.ghl||{};
  const header=function(right){
    return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px">'
      +'<div><div style="font-size:14px;font-weight:500;color:var(--strong)">Conversion de ventas</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:2px">Oportunidades sincronizadas desde GHL</div></div>'
      +'<div style="display:flex;gap:8px;align-items:center">'+(right||'')+'</div></div>';
  };

  // 1) Falta proxy
  if(!proxy.url||!proxy.secret){
    el.innerHTML=header('<button class="btn btn-primary" onclick="openGhlProxyModal()">Configurar conexion GHL</button>')
      +'<div class="empty"><div class="empty-icon"></div><div>Primero conecta GHL.</div>'
      +'<div style="margin-top:6px;font-size:12px;max-width:560px;margin-left:auto;margin-right:auto;color:var(--text3)">El dashboard no puede hablar con GHL directo. Desplega el Apps Script lector (te paso el codigo), copia su URL y el secreto, y pegalos en "Configurar conexion GHL".</div></div>';
    return;
  }
  // 2) Falta config del cliente
  if(!c.ghl.token||!c.ghl.locationId){
    el.innerHTML=header('<button class="btn btn-sm" onclick="openGhlProxyModal()">Conexion</button>')
      +'<div style="max-width:560px">'
      +'<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Carga el token (pit-) y el Location ID de la subcuenta de <b style="color:var(--strong)">'+esc(c.name)+'</b> en GHL.</div>'
      +'<label style="font-size:11px;color:var(--text3)">API token de la subcuenta (pit-...)</label>'
      +'<input id="cli-ghl-token" type="text" value="'+esc(c.ghl.token||'')+'" placeholder="pit-xxxxxxxx" style="width:100%;margin:4px 0 12px;padding:9px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--strong);font-family:var(--font);outline:none">'
      +'<label style="font-size:11px;color:var(--text3)">Location ID</label>'
      +'<input id="cli-ghl-location" type="text" value="'+esc(c.ghl.locationId||'')+'" placeholder="Settings - Business Info - Location ID" style="width:100%;margin:4px 0 14px;padding:9px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--strong);font-family:var(--font);outline:none">'
      +'<button class="btn btn-primary" onclick="saveClientGhl('+c.id+')">Guardar y sincronizar</button>'
      +'</div>';
    return;
  }

  // 3) Configurado: auto-sync una vez por sesion (con seguro anti-loop, igual que Meta)
  window._ghlAutoSynced=window._ghlAutoSynced||{};
  const _staleMs=30*60*1000; // 30 min
  const _lastSyncMs=c.ghl.lastSync?new Date(c.ghl.lastSync).getTime():0;
  const _isStale=(Date.now()-_lastSyncMs)>_staleMs;
  if(!c.ghl._syncing && !window._ghlAutoSynced[c.id] && _isStale){
    window._ghlAutoSynced[c.id]=true;
    syncGhl(c.id, true);
  }

  const ops=c.ghl.opportunities||[];

  // --- Reglas de negocio derivadas del Stage (configurables desde "Reglas") ---
  const _rules=getGhlRules(c);
  const SQL_STAGES=_rules.sql.length?_rules.sql:['tomando decision','nda','segunda llamada'];
  let _autoSqlChanged=false;
  ops.forEach(function(o){
    const stageN=_n(o.pipelineStage);
    if(SQL_STAGES.indexOf(stageN)>=0 && !o._sql){ o._sql=true; _autoSqlChanged=true; }
  });
  if(_autoSqlChanged) save();

  const _unseen=vtaUnseenCount(c);
  const right=(c.ghl._syncing?'<span style="font-size:11px;color:var(--text3)">sincronizando...</span>':'<span style="font-size:11px;color:var(--text3)">'+_ghlAgo(c.ghl.lastSync)+'</span>')
    +'<button class="btn btn-sm" onclick="openVtaChangesModal('+c.id+')" title="Novedades desde tu ultima visita" style="position:relative'+(_unseen?';border-color:rgba(29,158,117,0.5)':'')+'">\u{1F514}'
    +(_unseen?'<span style="position:absolute;top:-6px;right:-6px;background:var(--accent);color:var(--on-accent);font-size:9.5px;font-weight:600;border-radius:9px;padding:1px 5px;line-height:1.3">'+(_unseen>99?'99+':_unseen)+'</span>':'')
    +'</button>'
    +'<button class="btn btn-sm" onclick="syncGhl('+c.id+',false)">Sincronizar</button>'
    +'<button class="btn btn-sm" onclick="saveClientGhl('+c.id+')" style="display:none"></button>'
    +'<button class="btn btn-sm" onclick="openColSelector()">Columnas</button>'
    +'<button class="btn btn-sm" onclick="openGhlRulesModal()">Reglas</button>';

  if(!ops.length){
    el.innerHTML=header(right)+'<div class="empty"><div class="empty-icon"></div><div>'+(c.ghl._syncing?'Sincronizando...':'Sin oportunidades sincronizadas todavia.')+'</div></div>';
    return;
  }

  // ================= Metricas (hairline · TOF/MOF/BOF) =================
  const money=function(n){return '$'+(Math.round((n||0)*100)/100).toLocaleString('en-US',{maximumFractionDigits:2});};

  // --- Helpers de atribucion (anuncio / embudo / pais) ---
  const faGet=function(fa,names){
    if(!fa) return ''; var keys=Object.keys(fa); var i,j;
    for(i=0;i<names.length;i++){ for(j=0;j<keys.length;j++){ if(keys[j].toLowerCase().trim()===names[i]) return fa[keys[j]]; } }
    for(j=0;j<keys.length;j++){ var kl=keys[j].toLowerCase(); for(i=0;i<names.length;i++){ if(kl.indexOf(names[i])>=0) return fa[keys[j]]; } }
    return '';
  };
  const _tzCountry=function(tz){
    tz=String(tz||'');
    if(/Argentina/i.test(tz)) return 'Argentina';
    if(/Mexico|Hermosillo|Monterrey|Cancun|Tijuana|Merida|Chihuahua|Mazatlan|Matamoros|Ojinaga|Bahia_Banderas/i.test(tz)) return 'Mexico';
    if(/Bogota/i.test(tz)) return 'Colombia';
    if(/Lima/i.test(tz)) return 'Peru';
    if(/Santiago/i.test(tz)) return 'Chile';
    if(/Montevideo/i.test(tz)) return 'Uruguay';
    if(/Sao_Paulo|Bahia|Fortaleza|Recife|Manaus/i.test(tz)) return 'Brasil';
    if(/Guayaquil/i.test(tz)) return 'Ecuador';
    if(/Caracas/i.test(tz)) return 'Venezuela';
    if(/La_Paz/i.test(tz)) return 'Bolivia';
    if(/Asuncion/i.test(tz)) return 'Paraguay';
    if(/Madrid/i.test(tz)) return 'Espana';
    if(/Guatemala/i.test(tz)) return 'Guatemala';
    if(/Costa_Rica/i.test(tz)) return 'Costa Rica';
    return '';
  };
  const adOf=function(o){
    var s=o.source||{};
    return faGet(o.formAnswers,['utm_ad','utm ad']) || s.utmAd || s.utmContent || s.utmCampaign || s.utmSource || '';
  };
  const geoOf=function(o){
    var tz=faGet(o.formAnswers,['timezone','time zone','zona horaria']);
    if(tz){ var parts=String(tz).split('/'); var city=parts[parts.length-1].replace(/_/g,' '); var loc=[city,_tzCountry(tz)].filter(Boolean).join(', '); if(loc) return loc; }
    var g=o.geo||{};
    if(g.location) return g.location;
    if(g.timezone){ var tzParts=String(g.timezone).split('/'); return tzParts[tzParts.length-1].replace(/_/g,' '); }
    return [g.city,g.state,g.country].filter(function(x){return x && x!=='US';}).join(', ') || g.country || '';
  };
  const paisOf=function(o){
    var tz=faGet(o.formAnswers,['timezone','time zone','zona horaria']) || (o.geo&&o.geo.timezone) || '';
    var ctry=_tzCountry(tz);
    if(ctry) return ctry;
    var g=o.geo||{};
    if(g.country && g.country!=='US') return g.country;
    if(g.location){ var parts=String(g.location).split(','); var last=parts[parts.length-1].trim(); if(last) return last; }
    return '';
  };
  const fuenteOf=function(o){
    if(!o.source) return '';
    var ref=(o.source.referrer||'').toLowerCase();
    var src=(o.source.utmSource||'').toLowerCase();
    var isMeta=src==='meta'||src==='facebook'||src==='instagram';
    var isFbRef=ref.indexOf('facebook.com')>=0||ref.indexOf('instagram.com')>=0||ref.indexOf('l.facebook')>=0;
    var isLanding=ref.length>0&&!isFbRef&&(ref.indexOf('http')===0);
    if(isLanding&&isMeta) return 'Landing (Meta)';
    if(isLanding) return 'Landing';
    if(isMeta||isFbRef) return 'Meta';
    if(src) return o.source.utmSource;
    if(o.formAnswers&&(o.formAnswers['Lead Source']||o.formAnswers['source'])) return o.formAnswers['Lead Source']||o.formAnswers['source'];
    return '';
  };

  // Campana de Meta del lead: utm_campaign directo, o deducida matcheando el anuncio del lead
  // (adId / utm_ad / utm_adset) contra el arbol campanas->adsets->ads sincronizado en Ads & Guiones.
  const _campNames={};     // campaignId -> nombre
  const _adToCamp={};      // adId / adsetId / nombre normalizado -> nombre de campana
  const _adNamePairs=[];   // para match aproximado por nombre
  (function(){
    var al=getActiveLine(c.conversionLines||[]);
    ((al&&al.metaCampaigns)||[]).forEach(function(cp){
      var cname=cp.name||String(cp.id);
      _campNames[String(cp.id)]=cname;
      _adToCamp['n:'+_n(cname)]=cname;
      ((cp.adsets)||[]).forEach(function(as){
        if(as.id) _adToCamp[String(as.id)]=cname;
        if(as.name){ _adToCamp['n:'+_n(as.name)]=cname; _adNamePairs.push({n:_n(as.name),camp:cname}); }
        ((as.ads)||[]).forEach(function(ad){
          if(ad.id) _adToCamp[String(ad.id)]=cname;
          if(ad.name){ _adToCamp['n:'+_n(ad.name)]=cname; _adNamePairs.push({n:_n(ad.name),camp:cname}); }
        });
      });
    });
  })();
  const campaignOf=function(o){
    var s=o.source||{};
    var raw=String(faGet(o.formAnswers,['utm_campaign','campaign'])||s.utmCampaign||'').trim();
    if(raw) return _campNames[raw]||raw;
    var cands=[s.adId, s.utmAd, s.utmContent, s.utmAdset,
      faGet(o.formAnswers,['utm_ad','utm ad']), faGet(o.formAnswers,['utm_adset'])];
    for(var i=0;i<cands.length;i++){
      var v=String(cands[i]||'').trim();
      if(!v) continue;
      if(_adToCamp[v]) return _adToCamp[v];               // match por ID exacto
      var vn=_n(v);
      if(_adToCamp['n:'+vn]) return _adToCamp['n:'+vn];   // match por nombre exacto
      if(vn.length>=4){                                    // match aproximado (contiene)
        for(var j=0;j<_adNamePairs.length;j++){
          var p=_adNamePairs[j];
          if(p.n.indexOf(vn)>=0||vn.indexOf(p.n)>=0) return p.camp;
        }
      }
    }
    return '';
  };

  // --- Periodo ---
  const period=S.ventasPeriod||'todo';
  const _now=new Date();
  const inPeriod=function(o){
    if(period==='todo') return true;
    if(!o.createdAt) return false;
    var d=new Date(o.createdAt);
    if(period==='mes') return d.getFullYear()===_now.getFullYear()&&d.getMonth()===_now.getMonth();
    if(period==='30d') return (_now-d)<=30*86400000;
    return true;
  };
  const opsP=ops.filter(inPeriod);

  // --- Vista (anuncio / embudo / pais) y segmento activo ---
  const view=S.ventasView||'anuncios';
  const keyOf=view==='embudo'?campaignOf:(view==='pais'?paisOf:adOf);
  const segMap={};
  opsP.forEach(function(o){var k=keyOf(o)||'(sin dato)';segMap[k]=(segMap[k]||0)+1;});
  const segKeys=Object.keys(segMap).sort(function(a,b){return segMap[b]-segMap[a];}).slice(0,10);
  let seg=S.ventasSeg;
  if(seg && segKeys.indexOf(seg)<0){ seg=null; S.ventasSeg=null; }
  const opsSeg=seg? opsP.filter(function(o){return (keyOf(o)||'(sin dato)')===seg;}) : opsP;

  // --- Metricas del subset segun reglas de stages ---
  const cntStages=function(sub,arr){ if(!arr.length) return null; return sub.filter(function(o){return arr.indexOf(_n(o.pipelineStage))>=0;}).length; };
  const m_agendas=cntStages(opsSeg,_rules.agendas);
  const m_asis=cntStages(opsSeg,_rules.asistencias);
  const m_noshow=cntStages(opsSeg,_rules.noShows);
  const m_pres=cntStages(opsSeg,_rules.presentaciones);
  const m_viva=cntStages(opsSeg,_rules.llamadaEnVivo);
  const m_sql=opsSeg.filter(function(o){return o._sql;}).length;
  const m_ganadosArr=opsSeg.filter(function(o){return deriveEstado(o).label==='Ganado';});
  const m_ganados=m_ganadosArr.length;
  const m_perdidos=opsSeg.filter(function(o){return deriveEstado(o).label==='Perdido';}).length;
  const m_revenue=m_ganadosArr.reduce(function(s,o){return s+(Number(o.monetaryValue)||0);},0);
  const m_pipeline=opsSeg.reduce(function(s,o){return s+(Number(o.monetaryValue)||0);},0);
  const m_pend=(m_agendas!=null&&m_asis!=null)?Math.max(0,m_agendas-m_asis-(m_noshow||0)):null;
  const pctS=function(a,b){return (a==null||!b)?null:(Math.round(a/b*1000)/10)+'%';};

  // Time to cierre (requiere updatedAt del Apps Script)
  const wonWithDates=m_ganadosArr.filter(function(o){return o.createdAt&&o.updatedAt;});
  const avgTimeToClose=wonWithDates.length?Math.round(wonWithDates.reduce(function(s,o){return s+((new Date(o.updatedAt)-new Date(o.createdAt))/86400000);},0)/wonWithDates.length*10)/10:null;
  const timeToCierreNeedsSetup=m_ganados>0&&wonWithDates.length===0;

  // --- Costos: la inversion no es segmentable, se calcula sobre todo el periodo ---
  const spendSource=S.ventasSpendSource||'lineas';
  // Ventana del periodo seleccionado (null = sin limite)
  let _pFrom=null;
  if(period==='mes') _pFrom=new Date(_now.getFullYear(),_now.getMonth(),1);
  else if(period==='30d') _pFrom=new Date(_now-30*86400000);
  const _lineOverlaps=function(l){
    if(!_pFrom) return true;
    var e=l.dateEnd?new Date(l.dateEnd):null;
    return !(e&&e<_pFrom);
  };
  // Fuente Lineas: suma de lineas que tocan el periodo
  const accSpentLineas=(c.conversionLines||[]).filter(_lineOverlaps).reduce(function(s,l){return s+(Number(l.metrics&&l.metrics.adSpent)||0);},0);
  // Fuente Tiempo real: inversion pedida a Meta para el MISMO rango del periodo,
  // sumando SOLO las campanas incluidas (checkboxes de Ads & Guiones)
  const metaConfigured=!!(c.metaToken&&c.metaAccountId);
  const _msk=_metaSpendKey(c,period);
  const _msCache=(c._metaSpend||{})[_msk.key];
  // Si la vista es Por campana o Por pais y hay un chip seleccionado que Meta puede desglosar,
  // la inversion se filtra a ESE segmento (y los contactos tambien).
  let segCampId=null, segPais=null;
  if(view==='embudo'&&seg){
    for(var _cid in _campNames){ if(_campNames[_cid]===seg){ segCampId=_cid; break; } }
  }
  if(view==='pais'&&seg&&seg!=='(sin dato)'){
    for(var _iso in _ISO_PAIS){ if(_n(_ISO_PAIS[_iso])===_n(seg)){ segPais=_ISO_PAIS[_iso]; break; } }
  }
  const _needByCamp=!!(spendSource==='live'&&segCampId);
  const _needByPais=!!(spendSource==='live'&&segPais);
  const accSpentLive=_needByCamp
    ? ((_msCache&&_msCache.byCampaign&&_msCache.byCampaign[segCampId]!=null)?_msCache.byCampaign[segCampId]:null)
    : (_needByPais
      ? ((_msCache&&_msCache.byCountry&&_msCache.byCountry[segPais]!=null)?_msCache.byCountry[segPais]:null)
      : ((_msCache&&_msCache.spend!=null)?_msCache.spend:null));
  const accSpentAll=spendSource==='live'?accSpentLive:accSpentLineas;
  if(spendSource==='live'&&metaConfigured&&(!_msCache||(Date.now()-_msCache.at)>=10*60*1000||(_needByCamp&&!_msCache.byCampaign)||(_needByPais&&!_msCache.byCountry))){
    fetchMetaSpendPeriod(c.id,period).then(function(){
      if(S.tab==='ventas'&&S.clientId===c.id) renderTab();
    });
  }
  // Denominadores: si la inversion esta segmentada por campana, contactos del segmento;
  // si no, contactos del periodo completo (coherente con la inversion total).
  const _segSpendOk=((_needByCamp||_needByPais)&&accSpentLive!=null);
  const opsCost=_segSpendOk?opsSeg:opsP;
  const cAg=cntStages(opsCost,_rules.agendas);
  const cViva=cntStages(opsCost,_rules.llamadaEnVivo);
  const cPres=cntStages(opsCost,_rules.presentaciones);
  const cCalif=_rules.llamadaEnVivo.length?opsCost.filter(function(o){return _rules.llamadaEnVivo.indexOf(_n(o.pipelineStage))>=0&&o._sql;}).length:null;
  const cWon=opsCost.filter(function(o){return deriveEstado(o).label==='Ganado';}).length;
  const costo=function(n){return (n&&accSpentAll!=null)?money(accSpentAll/n):null;};

  // --- HTML ---
  const vhRow=function(l,v){
    var zero=(v===0||v==='$0'||v==='0%');
    var val=(v===null||v===undefined)?'<span class="vh-val zero">&mdash;</span>':'<span class="vh-val'+(zero?' zero':'')+'">'+v+'</span>';
    return '<div class="vh-row"><span>'+l+'</span>'+val+'</div>';
  };
  const vhCol=function(title,rows){return '<div><div class="vh-label">'+title+'</div>'+rows.join('')+'</div>';};

  let html=header(right);
  const vbtn=function(v,l){return '<button class="'+(view===v?'on':'')+'" onclick="setVentasView(\''+v+'\')">'+l+'</button>';};
  const pbtn=function(p,l){return '<button class="'+(period===p?'on':'')+'" onclick="setVentasPeriod(\''+p+'\')">'+l+'</button>';};
  html+='<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px">'
    +'<div class="vh-seg">'+vbtn('anuncios','Por anuncio')+vbtn('embudo','Por campaña')+vbtn('pais','Por pais')+'</div>'
    +'<div class="vh-seg">'+pbtn('todo','Todo')+pbtn('mes','Este mes')+pbtn('30d','Ultimos 30 dias')+'</div>'
    +'</div>';
  html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px">'
    +'<button class="vh-chip '+(seg==null?'on':'')+'" onclick="setVentasSeg(null)">Todos <span style="opacity:0.55;font-family:var(--mono);font-size:10px">'+opsP.length+'</span></button>'
    +segKeys.map(function(k){
      var enc=encodeURIComponent(k).replace(/'/g,'%27');
      return '<button class="vh-chip '+(seg===k?'on':'')+'" onclick="setVentasSeg(\''+enc+'\')">'+esc(k)+' <span style="opacity:0.55;font-family:var(--mono);font-size:10px">'+segMap[k]+'</span></button>';
    }).join('')
    +'</div>';
  // Si en Por campana domina (sin dato), disparar enriquecimiento y avisar
  if(view==='embudo'){
    const _sinDato=segMap['(sin dato)']||0;
    if(opsP.length && _sinDato/opsP.length>0.5){
      const _proxyE=getGhlProxy();
      if(_proxyE.url && c.ghl && c.ghl.token){
        window._enrichKickAt=window._enrichKickAt||{};
        if(Date.now()-(window._enrichKickAt[c.id]||0)>5*60000){
          window._enrichKickAt[c.id]=Date.now();
          enrichContactsBackground(c,_proxyE);
        }
      }
      html+='<div style="font-size:11px;color:var(--text3);margin:-14px 0 20px">La mayoria de los contactos no tiene utm_campaign guardado. Lo estoy trayendo de GHL en segundo plano (~100ms por contacto) - se actualiza solo al terminar. Si despues de un par de minutos sigue todo en (sin dato), el embudo no esta enviando utm_campaign en las URLs, o el Apps Script no devuelve ese campo.</div>';
    }
  }
  html+='<div class="vh-cols">'
    +vhCol('Top of funnel',[
      vhRow('Registros',String(opsSeg.length)),
      vhRow('Opt-in landing',(function(){
        if(spendSource!=='live'||!metaConfigured) return '<span class="zero" title="Activa la fuente Tiempo real para calcular el opt-in con vistas de Meta">-</span>';
        let vv=null;
        if(segCampId&&_msCache&&_msCache.viewsByCampaign&&_msCache.viewsByCampaign[segCampId]!=null) vv=_msCache.viewsByCampaign[segCampId];
