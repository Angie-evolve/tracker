<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLVE - Agency Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-bg: #E1F5EE;
  --green-text: #0F6E56;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --amber-text: #854F0B;
  --red: #D85A30;
  --red-bg: #FCEBEB;
  --red-text: #A32D2D;
  --blue: #378ADD;
  --blue-bg: #E6F1FB;
  --blue-text: #185FA5;
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --strong: #fff;
  --accent: #4ecfa0;
  --amberx: #f0a830;
  --redx: #f07050;
  --on-accent: #0d0d0d;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.app{display:flex;height:100vh;overflow:hidden}
:root {
  --sb-bg: #1E1D1B;
  --sb-border: rgba(255,255,255,0.055);
  --sb-hover: rgba(255,255,255,0.055);
  --sb-active: rgba(255,255,255,0.09);
  --sb-text: #ECE9E4;
  --sb-text-muted: #9C9691;
  --sb-text-faint: #716C67;
}
.sidebar{width:228px;flex-shrink:0;border-right:1px solid var(--sb-border);display:flex;flex-direction:column;background:var(--sb-bg);transition:width .15s}
.sidebar.collapsed{width:60px}
.sidebar.collapsed .logo-sub,.sidebar.collapsed .nav-label,.sidebar.collapsed .nav-item-info,.sidebar.collapsed .btn-new-client-text{display:none}
.sidebar.collapsed .logo-text{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:9px 4px}
.sidebar.collapsed .health-dot{display:none}
.sidebar.collapsed .sidebar-top-toggle{justify-content:center}
.sidebar.collapsed .sidebar-logo{align-items:center}
.sidebar.collapsed .btn-new-client-plus{display:inline !important}
.sidebar-top-toggle{padding:14px 14px 4px;display:flex;justify-content:flex-end}
.sidebar-toggle{width:26px;height:26px;border-radius:50%;border:none;background:transparent;color:var(--sb-text-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-toggle:hover{background:var(--sb-hover);color:var(--sb-text)}
.sidebar-toggle .chevron{width:7px;height:7px;border-left:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(45deg);margin-left:2px}
.sidebar.collapsed .sidebar-toggle .chevron{transform:rotate(-135deg);margin-left:-2px}
.nav-item[draggable="true"]{cursor:grab}
.nav-item.drag-over{background:rgba(29,158,117,0.10);box-shadow:inset 0 0 0 1px rgba(29,158,117,0.35)}
.main{flex:1;overflow-y:auto;background:var(--bg)}

.sidebar-logo{padding:14px 6px 4px;display:flex;flex-direction:column}
.logo-text{font-size:14px;font-weight:500;letter-spacing:-0.1px;color:var(--sb-text-muted)}
.logo-text span{color:var(--green)}
.logo-sub{font-size:10px;color:var(--sb-text-faint);margin-top:2px;letter-spacing:0.02em}
.sidebar-nav{flex:1;padding:6px 10px;overflow-y:auto}
.nav-label{font-size:11px;font-weight:500;color:var(--sb-text-faint);padding:14px 10px 6px;letter-spacing:0.01em}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:10px;cursor:pointer;transition:background .12s;color:var(--sb-text-muted);font-size:13.5px;font-weight:400}
.nav-item:hover{background:var(--sb-hover);color:var(--sb-text)}
.nav-item.active{background:var(--sb-active);color:var(--sb-text)}
.nav-item-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.nav-item-info{flex:1;min-width:0}
.nav-item-name{font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item-sub{font-size:10.5px;color:var(--sb-text-faint);margin-top:1px}
.health-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-bottom{padding:12px;display:flex;flex-direction:column;gap:6px}
.sidebar-bottom .btn-primary{background:transparent;border:1px solid var(--sb-border);color:var(--sb-text);border-radius:10px;font-weight:400}
.sidebar-bottom .btn-primary:hover{background:var(--sb-hover);border-color:rgba(255,255,255,0.1)}

.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)}
.page-title{font-size:16px;font-weight:500;color:var(--strong)}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px}
.topbar-actions{display:flex;gap:8px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font)}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark);border-color:var(--green-dark)}
.btn-ghost{border-color:transparent}
.btn-ghost:hover{background:var(--bg3);border-color:var(--border)}
.btn-danger{border-color:rgba(216,90,48,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(216,90,48,0.08)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}

.content{padding:20px 24px}

.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.zoom-in{animation:zoomIn .22s ease}
@keyframes zoomIn{from{transform:scale(0.94);opacity:0}to{transform:scale(1);opacity:1}}
.back-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:7px 14px;border-radius:99px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;background:transparent;margin-bottom:16px;font-family:var(--font)}
.back-pill:hover{background:var(--bg2);color:var(--text)}
.ficha-wrap{transition:opacity .18s}
.ficha-hide{opacity:0;pointer-events:none;position:absolute;inset:0}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.metric-value{font-size:22px;font-weight:500;color:var(--strong);line-height:1}
.metric-delta{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}
.delta-neutral{color:var(--text3)}

.health-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.health-score-big{font-size:42px;font-weight:600;line-height:1;color:var(--strong);min-width:70px}
.health-score-big span{font-size:18px;font-weight:400;color:var(--text2)}
.health-right{flex:1}
.health-label-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.health-label-text{font-size:12px;color:var(--text2)}
.health-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.health-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(.4,0,.2,1)}
.health-ticks{display:flex;justify-content:space-between;margin-top:5px}
.health-tick{font-size:10px;color:var(--text3)}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.pill-green{background:rgba(29,158,117,0.15);color:var(--accent)}
.pill-amber{background:rgba(186,117,23,0.15);color:var(--amberx)}
.pill-red{background:rgba(216,90,48,0.15);color:var(--redx)}
.pill-blue{background:rgba(55,138,221,0.15);color:#6aabf0}
.pill-gray{background:var(--bg4);color:var(--text2)}

.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text2);transition:all 0.15s;white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--text)}
.tab.active{color:var(--strong);border-bottom-color:var(--green);font-weight:500}

.cl-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)}
.cl-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.cl-table th{font-size:10px;font-weight:500;color:var(--text3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;background:var(--bg2)}
.cl-table .row-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;background:var(--bg2);padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap;border-right:1px solid var(--border)}
.cl-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.cl-table tr:last-child td,.cl-table tr:last-child .row-label{border-bottom:none}
.cl-table tr:hover td,.cl-table tr:hover .row-label{background:rgba(255,255,255,0.02)}
.active-col{background:rgba(29,158,117,0.04)}
.na{color:var(--text3);font-style:italic;font-size:11px}

.diag-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;transition:border-color 0.15s}
.diag-card:hover{border-color:var(--border2)}
.diag-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.diag-title-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.diag-title-text{font-size:13px;font-weight:500;color:var(--strong);line-height:1.4}
.diag-body{font-size:12px;color:var(--text2);line-height:1.7;margin-left:40px}

.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-left{display:flex;flex-direction:column;align-items:center;gap:0;padding-top:4px}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl-line{width:1px;flex:1;background:var(--border);margin-top:4px}
.tl-content{flex:1;padding-bottom:4px}
.tl-ver{font-size:13px;font-weight:500;color:var(--strong)}
.tl-dates{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.tl-note{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.6}
.tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tl-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.2s}
.ov-card:hover{border-color:var(--border2);transform:translateY(-1px)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:580px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.modal-title{font-size:16px;font-weight:500;color:var(--strong);margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.form-section{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green)}
.form-row select option{background:var(--bg3)}
.form-row input::placeholder{color:var(--text3)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Fix: date input color in dark mode */
.form-row input[type="date"]{color-scheme:dark}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:12px;color:var(--text);z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(.4,0,.2,1)}
.toast.show{transform:translateY(0);opacity:1}

.notes-area{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.7}
.notes-area strong{color:var(--text);font-weight:500}

.sync-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sync-info{font-size:12px;color:var(--text2)}
.sync-info strong{color:var(--text);font-weight:500}
.sync-actions{display:flex;gap:6px}

.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.4}

/* Success Tracker */
.st-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.st-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;position:relative;overflow:hidden}
.st-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.st-card.ok::before{background:#1D9E75}
.st-card.warn::before{background:#BA7517}
.st-card.danger::before{background:#D85A30}
.st-card.na::before{background:#555}
.st-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.st-name{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;line-height:1.4}
.st-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.st-badge.ok{background:rgba(29,158,117,0.15);color:var(--accent)}
.st-badge.warn{background:rgba(186,117,23,0.15);color:var(--amberx)}
.st-badge.danger{background:rgba(216,90,48,0.15);color:var(--redx)}
.st-badge.na{background:var(--bg4);color:var(--text3)}
.st-val{font-size:24px;font-weight:500;color:var(--strong);line-height:1;margin-bottom:3px}
.st-val span{font-size:13px;font-weight:400;color:var(--text2)}
.st-target{font-size:11px;color:var(--text3)}
.st-target strong{color:var(--text2);font-weight:500}
.st-bar{margin-top:10px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.st-fill{height:100%;border-radius:2px}
.st-fill.ok{background:#1D9E75}
.st-fill.warn{background:#BA7517}
.st-fill.danger{background:#D85A30}
.st-guarantee{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:20px}
.st-g-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st-g-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:6px}
.st-g-fill{height:100%;border-radius:4px;background:#1D9E75;transition:width 0.6s}
.st-g-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.st-contract{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.st-upload{border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:20px;text-align:center;cursor:pointer;transition:background 0.15s;margin-bottom:16px}
.st-upload:hover{background:var(--bg3)}
.st-tl{position:relative;padding-left:26px}
.st-tl-line{position:absolute;left:7px;top:6px;bottom:0;width:1px;background:var(--border)}
.st-tl-dot{position:absolute;left:-22px;top:5px;width:9px;height:9px;border-radius:50%}
.st-tl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 13px;margin-bottom:16px}
.st-tl-card:hover{border-color:var(--border2)}
.st-tl-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.st-tl-title{font-size:13px;font-weight:500;color:var(--strong)}
.st-tl-date{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.st-tl-body{font-size:12px;color:var(--text2);line-height:1.6}
.st-tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
/* Adsets & Ads */
.adset-block{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.adset-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.adset-name{font-size:13px;font-weight:500;color:var(--strong);flex:1}
.adset-audience{font-size:11px;color:var(--text3)}
.ads-list{padding:8px}
.ad-row{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.ad-row:last-child{margin-bottom:0}
.ad-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);cursor:pointer}
.ad-name{font-size:12px;font-weight:500;color:var(--strong);flex:1}
.ad-metrics-mini{display:flex;gap:10px;font-size:11px;color:var(--text2)}
.ad-metrics-mini span{display:flex;align-items:center;gap:3px}
.ad-body{padding:12px;border-top:1px solid var(--border);background:var(--bg)}
.ad-metrics-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.ad-metric{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.ad-metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.ad-metric-val{font-size:14px;font-weight:500;color:var(--strong)}
.ad-guion{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.6}
.ad-guion strong{color:var(--text);font-weight:500}
.ad-link{font-size:11px;color:var(--green);text-decoration:none}
.ad-link:hover{text-decoration:underline}

/* ===== Conversion de ventas: dashboard hairline ===== */
.vh-seg{display:inline-flex;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:3px;gap:2px}
.vh-seg button{border:0;background:transparent;color:var(--text2);font-family:var(--font);font-size:11.5px;font-weight:500;padding:6px 14px;border-radius:99px;cursor:pointer;transition:color 150ms cubic-bezier(0.23,1,0.32,1),background 150ms cubic-bezier(0.23,1,0.32,1)}
.vh-seg button:hover{color:var(--text)}
.vh-seg button.on{background:var(--accent);color:var(--on-accent)}
.vh-seg button.on:hover{color:var(--on-accent)}

// -- Google Sheets Sync ------------------------------------------
const SHEET_ID = '1Rq06BLxfsWXbtlLskawouGr65xnxNkW8T5Ve2ijam9g';
const SHEETS_API = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/`;
const API_KEY = ''; // Set via openSyncConfigModal

// -- Fuzzy column resolver ----------------------------------------
// Normaliza a minusculas sin tildes para comparar
function _n(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

// Dado un objeto fila y una lista de terminos, devuelve el valor de la primera
// columna cuyo nombre (normalizado) contiene TODOS los terminos.
// Ejemplo: col(row, 'inversion','semanal') matchea "Inversion Semanal", "INVERSION SEMANAL", etc.
function hasCurrentlyActiveLine(lines){
  if(!lines || !lines.length) return false;
  const today=new Date(); today.setHours(0,0,0,0);
  return lines.some(function(l){
    if(!l.dateStart) return false;
    var start=new Date(l.dateStart); start.setHours(0,0,0,0);
    if(start>today) return false;
    if(l.dateEnd){ var end=new Date(l.dateEnd); end.setHours(0,0,0,0); if(end<today) return false; }
    return true;
  });
}
function getWeekRange(d){
  d = d? new Date(d) : new Date();
  const day = d.getDay();
  const diffToMonday = day===0?-6:1-day;
  const monday = new Date(d); monday.setDate(d.getDate()+diffToMonday); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6); sunday.setHours(23,59,59,999);
  return {start:monday, end:sunday};
}
function isoDate(d){ return d.toISOString().slice(0,10); }

var _liveRefreshInFlight={};
// Mapa ISO2 de Meta -> nombre de pais como lo agrupa la vista Por pais
const _ISO_PAIS={AR:'Argentina',BO:'Bolivia',CL:'Chile',CO:'Colombia',EC:'Ecuador',PY:'Paraguay',PE:'Peru',UY:'Uruguay',VE:'Venezuela',BR:'Brasil',MX:'Mexico',ES:'Espana',GT:'Guatemala',CR:'Costa Rica',US:'US',GB:'UK',CA:'Canada',PA:'Panama',DO:'Republica Dominicana',HN:'Honduras',SV:'El Salvador',NI:'Nicaragua'};

// ---- Inversion de Meta por periodo (para Conversion de ventas / fuente Tiempo real) ----
// Suma SOLO las campanas incluidas (checkboxes de Ads & Guiones de la linea activa).
const _metaSpendInFlight={};
function _metaSpendKey(c,period){
  const al=getActiveLine(c.conversionLines||[]);
  const excluded=((al&&al.excludedCampaigns)||[]).slice().sort();
  return {key:'v2|'+period+'|'+excluded.join(','), excluded:excluded};
}
async function fetchMetaSpendPeriod(clientId,period){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.metaToken||!c.metaAccountId) return null;
  c._metaSpend=c._metaSpend||{};
  const sk=_metaSpendKey(c,period);
  const cached=c._metaSpend[sk.key];
  if(cached && (Date.now()-cached.at)<10*60*1000) return cached;
  const fk=clientId+':'+sk.key;
  if(_metaSpendInFlight[fk]) return cached||null;
  _metaSpendInFlight[fk]=true;
  try{
    const actId='act_'+c.metaAccountId;
    let insSpec;
    if(period==='mes'){
      const first=new Date(); first.setDate(1);
      insSpec='insights.time_range({"since":"'+isoDate(first)+'","until":"'+isoDate(new Date())+'"})';
    }else if(period==='30d'){
      insSpec='insights.date_preset(last_30d)';
    }else{
      insSpec='insights.date_preset(maximum)';
    }
    insSpec+='.breakdowns(country).limit(500)';
    const fields='id,'+insSpec+'{spend,actions}';
    let url='https://graph.facebook.com/v19.0/'+actId+'/campaigns?fields='+encodeURIComponent(fields)+'&limit=200&access_token='+c.metaToken;
    let spend=0, views=0, pages=0;
    const byCamp={};
    const vByCamp={};
    const byCountry={}; // solo campanas incluidas, clave = nombre de pais
    const vByCountry={};
    while(url && pages<5){
      const res=await fetch(url);
      const data=await res.json();
      if(data.error) throw new Error(data.error.message||'Meta error');
      (data.data||[]).forEach(function(camp){
        const included=sk.excluded.indexOf(camp.id)===-1;
        const rows=(camp.insights&&camp.insights.data)||[];
        rows.forEach(function(row){
          const v=parseFloat(row.spend||0);
          let lv=0;
          (row.actions||[]).forEach(function(a){ if(a.action_type==='landing_page_view') lv+=parseInt(a.value||0); });
          byCamp[String(camp.id)]=(byCamp[String(camp.id)]||0)+v;
          vByCamp[String(camp.id)]=(vByCamp[String(camp.id)]||0)+lv;
          if(included){
            spend+=v; views+=lv;
            const pais=_ISO_PAIS[String(row.country||'').toUpperCase()]||String(row.country||'');
            if(pais){ byCountry[pais]=(byCountry[pais]||0)+v; vByCountry[pais]=(vByCountry[pais]||0)+lv; }
          }
        });
      });
      url=data.paging&&data.paging.next;
      pages++;
    }
    c._metaSpend[sk.key]={spend:spend,views:views,byCampaign:byCamp,viewsByCampaign:vByCamp,byCountry:byCountry,viewsByCountry:vByCountry,at:Date.now()};
    save();
    return c._metaSpend[sk.key];
  }catch(e){
    c._metaSpend[sk.key]={spend:null,at:Date.now(),error:e.message};
    return c._metaSpend[sk.key];
  }finally{
    _metaSpendInFlight[fk]=false;
  }
}

// Calcula las metricas (Meta + GHL) de una linea live para un rango dado
async function _computeLiveMetrics(c,line,startDate,endDate){
  const now=new Date();
  const untilDate=now<endDate?now:endDate;
  if(c.metaToken && c.metaAccountId){
    try{
      const actId='act_'+c.metaAccountId;
      const timeRange='{"since":"'+isoDate(startDate)+'","until":"'+isoDate(untilDate)+'"}';
      const fields='insights.time_range('+timeRange+'){spend,impressions,clicks,actions}';
      const url='https://graph.facebook.com/v19.0/'+actId+'/campaigns?fields='+encodeURIComponent(fields)+'&access_token='+c.metaToken+'&limit=50';
      const res=await fetch(url);
      const data=await res.json();
      if(!data.error){
        const camps=data.data||[];
        let spend=0, impressions=0, clicks=0, landingViews=0, leads=0;
        camps.forEach(function(camp){
          const ins=camp.insights&&camp.insights.data&&camp.insights.data[0];
          if(!ins) return;
          spend+=parseFloat(ins.spend||0);
          impressions+=parseInt(ins.impressions||0);
          clicks+=parseInt(ins.clicks||0);
          const actions=ins.actions||[];
          const getA=function(t){const a=actions.find(function(x){return x.action_type===t;});return a?parseInt(a.value||0):0;};
          landingViews+=getA('landing_page_view');
          leads+=getA('lead')+getA('onsite_conversion.lead_grouped')+getA('onsite_web_lead');
        });
        line.metrics.adSpent=Math.round(spend*100)/100;
        line.metrics.pageViews=landingViews||null;
        line.metrics.cpm=impressions>0?Math.round(spend/impressions*1000*100)/100:null;
        line.metrics.cpc=clicks>0?Math.round(spend/clicks*100)/100:null;
        line.metrics.cpl=leads>0?Math.round(spend/leads*100)/100:null;
        line._metaOk=true;
      } else { line._metaOk=false; line._metaError=data.error.message; }
    }catch(e){ line._metaOk=false; line._metaError=String(e); }
  } else { line._metaOk=false; line._metaError='Meta no conectado para este cliente.'; }

  const opps=(c.ghl&&c.ghl.opportunities)||[];
  const endIncl=new Date(endDate); endIncl.setHours(23,59,59,999);
  const inRange=opps.filter(function(o){
    if(!o.createdAt) return false;
    const d=new Date(o.createdAt);
    return d>=startDate && d<=endIncl;
  });
  line.metrics.registros=inRange.length;
  line.metrics.sql=inRange.filter(function(o){return o._sql;}).length;
  line._lastRefresh=new Date().toISOString();
}

async function refreshLiveLine(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return null;
  if(_liveRefreshInFlight[clientId]) return null;
  _liveRefreshInFlight[clientId]=true;
  try{
    c.liveLines = c.liveLines || [];
    const today=new Date();
    const {start:curMonday} = getWeekRange();
    const curWeekKey=isoDate(curMonday);

    // --- Linea EN VIVO: ventana movil de hoy a 7 dias atras ---
    let line=c.liveLines.find(function(l){return l.rolling;});
    if(!line){
      // migracion: la linea de la semana en curso (logica vieja) pasa a ser la rolling
      line=c.liveLines.find(function(l){return l.weekKey===curWeekKey && !l.archived;});
      if(line){ line.rolling=true; delete line.weekKey; }
    }
    if(!line){
      line={id:'live-'+Date.now(), rolling:true, version:'Ultimos 7 dias', metrics:{adSpent:null,pageViews:null,cpm:null,cpc:null,cpl:null,registros:null,sql:null}, live:true};
      c.liveLines.push(line);
    }
    const start7=new Date(today); start7.setHours(0,0,0,0); start7.setDate(start7.getDate()-6);
    line.version='Ultimos 7 dias';
    line.dateStart=isoDate(start7);
    line.dateEnd=isoDate(today);
    await _computeLiveMetrics(c,line,start7,today);

    // --- Archivo semanal: cada lunes queda congelado el informe de la semana que termino ---
    // Backfill dinamico: hasta la primera linea de conversion o el primer lead del cliente (max 26 semanas)
    c._liveEmptyWeeks=c._liveEmptyWeeks||{};
    let _horizon=4;
    const _firstDates=[];
    (c.conversionLines||[]).forEach(function(l){ if(l.dateStart) _firstDates.push(new Date(l.dateStart).getTime()); });
    ((c.ghl&&c.ghl.opportunities)||[]).forEach(function(o){ if(o.createdAt) _firstDates.push(new Date(o.createdAt).getTime()); });
    if(_firstDates.length){
      const _earliest=Math.min.apply(null,_firstDates);
      _horizon=Math.ceil((curMonday.getTime()-_earliest)/(7*86400000))+1;
    }
    _horizon=Math.max(4,Math.min(_horizon,26));
    for(let k=1;k<=_horizon;k++){
      const monday=new Date(curMonday); monday.setDate(monday.getDate()-7*k);
      const wk=isoDate(monday);
      if(c._liveEmptyWeeks[wk]) continue;
      let arch=c.liveLines.find(function(l){return l.weekKey===wk;});
      if(arch&&arch.archived) continue;
      const sunday=new Date(monday); sunday.setDate(sunday.getDate()+6);
      const isNew=!arch;
      if(!arch){
        arch={id:'live-'+wk, weekKey:wk, version:'Semana del '+fmtDateOnly(wk), dateStart:wk, dateEnd:isoDate(sunday), metrics:{adSpent:null,pageViews:null,cpm:null,cpc:null,cpl:null,registros:null,sql:null}, live:true};
        c.liveLines.push(arch);
      }
      await _computeLiveMetrics(c,arch,monday,sunday);
      const m=arch.metrics;
      const empty=(!m.adSpent)&&(!m.pageViews)&&(!m.registros)&&(!m.sql);
      if(empty&&isNew){
        // semana sin ningun dato: no ensuciamos el historial ni la volvemos a consultar
        c.liveLines=c.liveLines.filter(function(l){return l!==arch;});
        c._liveEmptyWeeks[wk]=true;
      }else{
        arch.archived=true;
      }
    }

    save();
    return line;
  } finally {
    _liveRefreshInFlight[clientId]=false;
  }
}

function getActiveLine(lines){
  if(!lines || !lines.length) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const withStart=lines.filter(function(l){return !!l.dateStart;});
  const current=withStart.filter(function(l){
    var start=new Date(l.dateStart); start.setHours(0,0,0,0);
    if(start>today) return false;
    if(l.dateEnd){ var end=new Date(l.dateEnd); end.setHours(0,0,0,0); if(end<today) return false; }
    return true;
  });
  if(current.length){
    current.sort(function(a,b){return new Date(b.dateStart)-new Date(a.dateStart);});
    return current[0];
  }
  if(withStart.length){
    withStart.sort(function(a,b){return new Date(b.dateStart)-new Date(a.dateStart);});
    return withStart[0];
  }
  return lines[lines.length-1];
}
function isLineActive(line, lines){
  if(!line) return false;
  return getActiveLine(lines)===line;
}

function parseDDMMYYYY(s){
  if(!s) return null;
  const m=String(s).match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m) return new Date(+m[3], +m[2]-1, +m[1]);
  const d=new Date(s);
  return isNaN(d.getTime())?null:d;
}
function computeLineStats(c, line){
  const lines=c.conversionLines||[];
  const idx=lines.findIndex(function(x){return x.id===line.id;});
  const prevLine=idx>0?lines[idx-1]:null;
  const m=line.metrics||{};
  const spent=Number(m.adSpent)||0;
  const sql=Number(m.sql)||0;
  const costoCalificado=sql>0?spent/sql:null;
  const diasPausadaAntes=(prevLine&&prevLine.dateEnd&&line.dateStart)?days(prevLine.dateEnd,line.dateStart):null;
  const start=line.dateStart?new Date(line.dateStart):null;
  const end=line.dateEnd?new Date(line.dateEnd):null;
  const calls=c.fathomCalls||[];
  const oppsAll=(c.ghl&&c.ghl.opportunities)||[];
  const callsInBlock=calls.filter(function(cl){
    const d=parseDDMMYYYY(cl.date);
    if(!d) return false;
    if(start && d<start) return false;
    if(end && d>end) return false;
    if(!end && d>new Date()) return false;
    return true;
  });
  const llamadasEnVivo=callsInBlock.length;
  const llamadasCalificadas=callsInBlock.filter(function(cl){
    const opp=oppsAll.find(function(o){return o.id===cl.linkedOppId;});
    return opp&&opp._sql;
  }).length;
  const costoPorLlamada=llamadasEnVivo>0?spent/llamadasEnVivo:null;
  const costoPorLlamadaCalificada=llamadasCalificadas>0?spent/llamadasCalificadas:null;
  return {prevLine, costoCalificado, diasPausadaAntes, llamadasEnVivo, llamadasCalificadas, costoPorLlamada, costoPorLlamadaCalificada};
}

function lastToken(s){ const w=_n(s).split(/[^a-z0-9]+/).filter(Boolean); return w.length?w[w.length-1]:''; }
function col(row, ...terms){
  const nt = terms.map(_n);
  const key = Object.keys(row).find(k => nt.every(t => _n(k).includes(t)));
  return key != null ? row[key] : '';
}

function parseNum(v){
  if(v===null||v===undefined||v===''||v==='N/A'||v==='-') return null;
  const s = String(v).replace(/[$,%\s]/g,'').replace(',','.');
  const n = parseFloat(s);
  return isNaN(n)?null:n;
}

function colNum(row, ...terms){ return parseNum(col(row, ...terms)); }

function sumCol(rows, ...terms){ 
  let t=null; 
  rows.forEach(r=>{ const v=colNum(r,...terms); if(v!==null) t=(t||0)+v; }); 
  return t!==null?Math.round(t*100)/100:null; 
}
function avgCol(rows, ...terms){ 
  const vals=[]; 
  rows.forEach(r=>{ const v=colNum(r,...terms); if(v!==null) vals.push(v); }); 
  return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*100)/100:null; 
}

function isHeaderRow(row){
  const vals = row.map(c=>_n(c||''));
  return vals.some(v=>v==='cliente') && vals.some(v=>v==='semana'||v.includes('campa'));
}

async function fetchSheetBlocks(sheetName, apiKey){
  const range = encodeURIComponent(`${sheetName}!A1:AK300`);
  const url = `${SHEETS_API}${range}?key=${apiKey}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} para "${sheetName}"`);
  const data = await res.json();
  const rawRows = data.values || [];
  if(rawRows.length < 2) return [];

  // Filas tipo "Token / ID" (credenciales de Meta pegadas arriba del sheet) no son nombres de bloque
  const looksLikeToken=s=>{s=(s||'').trim();return s.length>40 && /^EAA[A-Za-z0-9]+$/.test(s);};
  const isCredentialRow=row=>row.some(c=>looksLikeToken(c)) || row.some(c=>/^token$/i.test((c||'').trim())) || row.some(c=>/^id$/i.test((c||'').trim()));

  const blocks = [];
  let pendingName = '';
  let i = 0;

  while(i < rawRows.length){
    const row = rawRows[i];
    if(isHeaderRow(row)){
      const headers = row;
      const name = pendingName || `Bloque ${blocks.length+1}`;
      pendingName = '';
      const dataRows = [];
      i++;
      let lastWeek='', lastCampaign='', lastAdset='';

      while(i < rawRows.length && !isHeaderRow(rawRows[i])){
        const r = rawRows[i];
        const nonEmpty = r.filter(c=>(c||'').trim()!=='');
        // Skip block-name rows (few non-empty cells, no $ or digits)
        if(nonEmpty.length <= 2 && nonEmpty.every(c=>!/[$0-9]/.test((c||'').trim()[0]||''))){
          if(nonEmpty.length > 0 && !isCredentialRow(r)) pendingName = nonEmpty[0];
          i++; continue;
        }
        const obj={};
        headers.forEach((h,hi)=>obj[h]=(r[hi]||'').trim());
        // Propagar Semana, Campana, Adset, Anuncio usando col() fuzzy
        const semanaVal=col(obj,'semana');
        const campanaVal=col(obj,'campa');
        const adsetVal=col(obj,'adset');
        const anuncioVal=col(obj,'anuncio');
        if(semanaVal && /^W\d+$/i.test(semanaVal)) lastWeek=semanaVal;
        obj['_semana']=lastWeek;
        if(campanaVal) lastCampaign=campanaVal; obj['_campaign']=lastCampaign;
        if(adsetVal) lastAdset=adsetVal; obj['_adset']=lastAdset;
        obj['_anuncio']=anuncioVal;
        dataRows.push(obj);
        i++;
      }
      if(dataRows.length > 0) blocks.push({name, rows: dataRows});
    } else {
      const nonEmpty = row.filter(c=>(c||'').trim()!=='');
      if(nonEmpty.length > 0 && nonEmpty.length <= 3 && !isCredentialRow(row)) pendingName = nonEmpty[0]||'';
      i++;
    }
  }
  return blocks;
}

async function fetchSheetData(sheetName, apiKey){
  const blocks = await fetchSheetBlocks(sheetName, apiKey);
  return blocks.flatMap(b=>b.rows);
}

// normKey/fuzzyGet/sumCol/avgCol replaced by col()/sumCol()/avgCol() above

async function syncClient(client, apiKey){
  const sheetName = client.sheetName || client.name;
  try {
    const blocks = await fetchSheetBlocks(sheetName, apiKey);
    if(!blocks.length) return {ok:false, msg:'Sin datos en el sheet'};

    let created=0, updated=0;

    for(const block of blocks){
      const {name, rows} = block;
      // Filas con anuncio especifico vs filas resumen (sin anuncio)
      const detailRows = rows.filter(r=>r._anuncio!=='');
      const summaryRows = rows.filter(r=>r._anuncio==='');
      const metricsSource = summaryRows.length ? summaryRows : detailRows;
      const cpmSource = detailRows.length ? detailRows : metricsSource;

      // adSpent: intenta fila resumen, si no suma filas de detalle
      const adSpentSummary = sumCol(metricsSource, 'inversion','semanal');
      const adSpentDetail  = sumCol(detailRows.length ? detailRows : rows, 'inversion','semanal');
      const metrics = {
        adSpent:   adSpentSummary || adSpentDetail,
        // Registros: usa 'registros' si existe, sino 'resultados' (Meta Forms)
        registros: sumCol(metricsSource, 'registros') || sumCol(metricsSource, 'resultados'),
        sql:       sumCol(metricsSource, 'sql'),
        pageViews: sumCol(metricsSource, 'visitas'),
        cpm:       avgCol(cpmSource,     'cpm'),
        cpc:       avgCol(cpmSource,     'cpc'),
        optIn:     avgCol(metricsSource, 'optin'),
        cpl:       avgCol(metricsSource, 'cpl'),
      };

      // Adsets & ads usando col() fuzzy
      const adsetMap = {};
      detailRows.forEach(row=>{
        const adsetName = (row._adset||'Adset').trim();
        const adName    = (row._anuncio||'').trim();
        if(!adName) return;
        const linkVal = col(row,'link');
        if(!adsetMap[adsetName]) adsetMap[adsetName]={name:adsetName,audience:'',ads:[]};
        adsetMap[adsetName].ads.push({
          name: adName, link: linkVal||'',
          cpl:         colNum(row,'cpl')||null,
          registros:   colNum(row,'registros')||null,
          ctr:         colNum(row,'ctr')||null,
          cpc:         colNum(row,'cpc')||null,
          impresiones: colNum(row,'frecuencia')||null,
          guion: ''
        });
      });
      const adsets = Object.values(adsetMap);

      // Landings A/B: busca columnas "OPTIN Landing A/B" y "Link Landing A/B" (o similares) y arma el desglose
      const landingVariants = {};
      rows.forEach(function(row){
        Object.keys(row).forEach(function(k){
          if(k.charAt(0)==='_') return;
          const nk=_n(k);
          const val=(row[k]||'').toString().trim();
          if(!val) return;
          if(nk.indexOf('optin')>=0 && nk.indexOf('landing')>=0){
            const letter=lastToken(k);
            if(letter){
              landingVariants[letter]=landingVariants[letter]||{};
              if(landingVariants[letter].optIn===undefined) landingVariants[letter].optIn=parseNum(val);
            }
          }
          if(nk.indexOf('link')>=0 && nk.indexOf('landing')>=0){
            const letter2=lastToken(k);
            if(letter2){
              landingVariants[letter2]=landingVariants[letter2]||{};
              if(!landingVariants[letter2].link) landingVariants[letter2].link=val;
            }
          }
        });
      });

      const firstRow = rows[0]||{};
      const campaign = firstRow._campaign||'';
      const adset    = firstRow._adset||'';

      // Fechas: buscar la primera fila que tenga fecha de inicio
      const summaryRow = rows.find(r=>col(r,'fecha','inicio'))||firstRow;
      const dateStart = toInputDate(col(summaryRow,'fecha','inicio'), true);
      const dateEnd   = toInputDate(col(summaryRow,'fecha','fin'),    true);
      const accionPropuesta = col(summaryRow,'accion','propuesta') || rows.map(r=>col(r,'accion','propuesta')).find(v=>v);
      const isLatest = block === blocks[blocks.length-1];
      const blockKey = name.trim();

      const existingIdx = client.conversionLines.findIndex(l=>l.blockKey===blockKey);
      if(isLatest){
        // Apaga cualquier otra linea (del sheet o manual) para que solo quede una activa
        client.conversionLines.forEach(function(l){ if(l.blockKey!==blockKey) l.status='historico'; });
      }
      if(existingIdx>=0){
        const existing = client.conversionLines[existingIdx];
        Object.entries(metrics).forEach(([k,v])=>{if(v!==null) existing.metrics[k]=Math.round(v*100)/100;});
        const destVal = col(summaryRow,'destino'); if(destVal) existing.destino = destVal;
        if(accionPropuesta) existing.notes = accionPropuesta;
        existing.adsets = adsets;
        if(Object.keys(landingVariants).length) existing.landings = landingVariants;
        if(isLatest) existing.status='activa';
        updated++;
      } else {
        client.conversionLines.push({
          id: 'l'+Date.now()+Math.random().toString(36).slice(2),
          blockKey, version: blockKey,
          dateStart: dateStart||null, dateEnd: dateEnd||null,
          campaign, adset, ad:'', filtro:'MEDIO', destino: col(summaryRow,'destino')||'',
          metrics: {
            adSpent: metrics.adSpent, pageViews: metrics.pageViews,
            cpm: metrics.cpm, cpc: metrics.cpc,
            optIn: metrics.optIn, cpl: metrics.cpl,
            registros: metrics.registros, sql: metrics.sql
          },
          adsets,
          landings: Object.keys(landingVariants).length?landingVariants:undefined,
          notes: accionPropuesta || `Importado desde sheet - ${blockKey}`,
          status: isLatest?'activa':'historico'
        });
        created++;
      }
    }

    // Para bloques historicos sin dateEnd, usar el dateStart del siguiente bloque
    const syncedLines = client.conversionLines.filter(l=>l.blockKey);
    syncedLines.forEach((l,i)=>{
      if(!l.dateEnd && i < syncedLines.length-1){
        const nextStart = syncedLines[i+1].dateStart;
        if(nextStart) l.dateEnd = nextStart;
      }
    });

    const latestLine = client.conversionLines[client.conversionLines.length-1];
    if(latestLine?.metrics){
      if(latestLine.metrics.registros) client.monthlyLeads = latestLine.metrics.registros;
      if(latestLine.metrics.cpl) client.avgCPL = latestLine.metrics.cpl;
      if(latestLine.metrics.adSpent) client.monthlyBudget = Math.round(latestLine.metrics.adSpent);
    }

    return {ok:true, msg:`${blocks.length} bloques - ${created} creados - ${updated} actualizados`};
  } catch(e){
    return {ok:false, msg:e.message};
  }
}


var _sheetTabsCache = null;
async function fetchSheetTabNames(apiKey){
  if(!apiKey) return null;
  try{
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?key=${encodeURIComponent(apiKey)}&fields=sheets.properties.title`;
    const res = await fetch(url);
    if(!res.ok) return null;
    const data = await res.json();
    const titles = (data.sheets||[]).map(function(s){return s.properties.title;});
    if(titles.length){ _sheetTabsCache = titles; }
    return titles.length?titles:null;
  }catch(e){ return null; }
}

// Utils
function hc(c){return{green:'#1D9E75',amber:'#BA7517',red:'#D85A30',gray:'#555'}[c]||'#555'}
function pillClass(c){return{green:'pill-green',amber:'pill-amber',red:'pill-red',blue:'pill-blue',gray:'pill-gray'}[c]||'pill-gray'}
function days(s,e){if(!s)return null;const d=Math.floor((new Date(e||Date.now())-new Date(s))/86400000);return d>=0?d:0;}
function fmtDateRange(s,e){
  if(!s)return '-';
  const fmt=d=>{
    // Normalize to YYYY-MM-DD first, then format as DD/MM/YYYY
    const iso=toInputDate(d);
    if(!iso)return d;
    const [y,m,day]=iso.split('-');
    return `${day}/${m}/${y}`;
  };
  return fmt(s)+' -> '+(e?fmt(e):'hoy');
}
function fmtDateOnly(d){
  if(!d)return '-';
  const iso=toInputDate(d);
  if(!iso)return d;
  const [y,m,day]=iso.split('-');
  return `${day}/${m}/${y}`;
}

// FIX: Normalize any date format to YYYY-MM-DD for input[type=date]
function toInputDate(d, fromSheet){
  if(!d) return '';
  d = String(d).trim();
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  // MM/DD/YYYY - Google Sheets format (fromSheet=true)
  if(fromSheet && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){
    const [month,day,year]=d.split('/');
    return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  }
  // DD/MM/YYYY - manual input format
  if(!fromSheet && /^\d{2}\/\d{2}\/\d{4}$/.test(d)){
    const [day,month,year]=d.split('/');
    return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  }
  // DD-MM-YYYY
  if(/^\d{2}-\d{2}-\d{4}$/.test(d)){
    const [day,month,year]=d.split('-');
    return `${year}-${month}-${day}`;
  }
  // Try native Date parsing as last resort
  try{
    const dt=new Date(d);
    if(!isNaN(dt)){return dt.toISOString().split('T')[0];}
  }catch(e){}
  return '';
}

function fmtVal(v,t){
  if(v===null||v===undefined||v==='') return '<span class="na">N/A</span>';
  if(t==='$') return '$'+parseFloat(v).toFixed(2);
  if(t==='%') return parseFloat(v).toFixed(2)+'%';
  return String(v);
}

  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function toggleAd(header){

  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  header.querySelector('span:last-child').textContent=isOpen?'?':'?';
}

// Sidebar
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const collapsed=sb.classList.toggle('collapsed');
  localStorage.setItem('evold-sidebar-collapsed', collapsed?'1':'0');
}

var _dragClientIdx=null;
function clientDragStart(idx){ _dragClientIdx=idx; }
function clientDragOver(ev, idx){
  ev.preventDefault();
  document.querySelectorAll('.nav-item.drag-over').forEach(function(el){el.classList.remove('drag-over');});
  var el=document.getElementById('client-item-'+idx);
  if(el) el.classList.add('drag-over');
}
function clientDrop(ev, idx){
  ev.preventDefault();
  document.querySelectorAll('.nav-item.drag-over').forEach(function(el){el.classList.remove('drag-over');});
  if(_dragClientIdx===null || _dragClientIdx===idx) return;
  var moved=DB.clients.splice(_dragClientIdx,1)[0];
  DB.clients.splice(idx,0,moved);
  _dragClientIdx=null;
  save(); renderSidebar();
}

// Punto del sidebar: verde = campanas activas gastando; amarillo = pausadas / sin gasto; gris = sin Meta
function adsDot(c){
  const al=getActiveLine(c.conversionLines||[]);
  const camps=(al&&al.metaCampaigns)||[];
  const roll=(c.liveLines||[]).find(function(l){return l.rolling;});
  const spending=!!(roll&&roll.metrics&&Number(roll.metrics.adSpent)>0);
  const anyActive=camps.some(function(cp){return String(cp.status||'').toUpperCase()==='ACTIVE';});
  if(anyActive||spending) return {color:hc('green'),title:'Campanas activas gastando presupuesto'};
  if(camps.length||c.metaToken) return {color:hc('amber'),title:'Campanas pausadas / sin gasto'};
  return {color:hc('gray'),title:'Sin datos de Meta'};
}

// Client view
function setClientServiceType(clientId, type){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  c.serviceType=type;
  c.recurrente=(type==='recurrente');
  save();
  renderTab();
}

function setClientFee(clientId, field, value){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  c[field]=value;
  save();
}

function toggleRecurrente(clientId){
  var c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  c.recurrente=!c.recurrente;
  save();
  renderSidebar();
}

function renderClient(){
  const c=DB.clients.find(x=>x.id===S.clientId);if(!c)return;
  if(S.clientView!=='full'){ renderClientFicha(c); return; }
  const al=getActiveLine(c.conversionLines);
  const m=al?.metrics||{};
  const daysActive=days(al?.dateStart,al?.dateEnd);

  // ---- Acumulados historicos (toda la cuenta, todas las lineas) ----
  const _allLines=c.conversionLines||[];
  const _num=function(v){const n=Number(v);return isNaN(n)?0:n;};
  const accSpent=_allLines.reduce(function(s,l){return s+_num(l.metrics&&l.metrics.adSpent);},0);
  const accReg=_allLines.reduce(function(s,l){return s+_num(l.metrics&&l.metrics.registros);},0);
  const accSql=_allLines.reduce(function(s,l){return s+_num(l.metrics&&l.metrics.sql);},0);
  const costPorReg=accReg>0?accSpent/accReg:null;
  const costPorSql=accSql>0?accSpent/accSql:null;
  let _wCpm=0,_wCpc=0,_wDen=0;
  _allLines.forEach(function(l){var sp=_num(l.metrics&&l.metrics.adSpent),cpm=Number(l.metrics&&l.metrics.cpm),cpc=Number(l.metrics&&l.metrics.cpc);if(sp>0){if(!isNaN(cpm))_wCpm+=cpm*sp;if(!isNaN(cpc))_wCpc+=cpc*sp;_wDen+=sp;}});
  const accCpm=_wDen>0?_wCpm/_wDen:null;
  const accCpc=_wDen>0?_wCpc/_wDen:null;
  let _earliest=null;_allLines.forEach(function(l){if(l.dateStart){var d=new Date(l.dateStart);if(!_earliest||d<_earliest)_earliest=d;}});
  const diasHist=_earliest?days(_earliest.toISOString().slice(0,10),null):null;
  // ---- Fecha de lanzamiento, dias activa/pausada (linea de tiempo completa) ----
  const _firstLineAll=_allLines[0];
  const diasActivaAll=_allLines.reduce(function(s,l){return s+(l.dateStart?(days(l.dateStart,l.dateEnd)||0):0);},0);
  const totalSpanAll=_firstLineAll&&_firstLineAll.dateStart?days(_firstLineAll.dateStart,null):null;
  const diasPausadaAll=totalSpanAll!==null?Math.max(totalSpanAll-diasActivaAll,0):null;
  const fechaLanzamiento=_firstLineAll&&_firstLineAll.dateStart?fmtDateOnly(_firstLineAll.dateStart):'-';
  // ---- Llamadas / agendas ----
  const _fathomCallsAll=c.fathomCalls||[];
  const _oppsAll=(c.ghl&&c.ghl.opportunities)||[];
  const llamadasEnVivoAll=_fathomCallsAll.length;
  const llamadasCalificadasAll=_fathomCallsAll.filter(function(cl){const opp=_oppsAll.find(function(o){return o.id===cl.linkedOppId;});return opp&&opp._sql;}).length;
  const costoPorLlamadaAll=llamadasEnVivoAll>0?accSpent/llamadasEnVivoAll:null;
  const costoPorLlamadaCalificadaAll=llamadasCalificadasAll>0?accSpent/llamadasCalificadasAll:null;
  // Costo por SQL idoneo (del contrato) para colorear
  const _ct=c.contract||{};
  const costoSqlIdoneo=(_ct.minDailyBudget&&_ct.durationDays&&_ct.totalOCs)?(_ct.minDailyBudget*_ct.durationDays)/_ct.totalOCs:null;
  const _money=function(n){return n===null||n===undefined?'-':'$'+(Math.round(n*100)/100).toLocaleString('en-US',{maximumFractionDigits:2});};
  let _sqlColor='#fff';
  if(costPorSql!==null&&costoSqlIdoneo!==null) _sqlColor=(costPorSql<=costoSqlIdoneo?'var(--accent)':costPorSql<=costoSqlIdoneo*1.3?'var(--amberx)':'var(--redx)');

  // ---- Valores del bloque activo ----
  const blkSpent=_num(m.adSpent), blkReg=_num(m.registros), blkSql=_num(m.sql);
  const blkCostReg=blkReg>0?blkSpent/blkReg:null;
  const blkCostSql=blkSql>0?blkSpent/blkSql:null;
  const blkCpm=(m.cpm===undefined||m.cpm===null||m.cpm==='')?null:Number(m.cpm);
  const blkCpc=(m.cpc===undefined||m.cpc===null||m.cpc==='')?null:Number(m.cpc);
  let _blkSqlColor='#fff';
  if(blkCostSql!==null&&costoSqlIdoneo!==null) _blkSqlColor=(blkCostSql<=costoSqlIdoneo?'var(--accent)':blkCostSql<=costoSqlIdoneo*1.3?'var(--amberx)':'var(--redx)');

  // ---- Eleccion segun el toggle ----
  const _isHist=(S.metricsView!=='bloque');
  const disp={
    costReg:_isHist?costPorReg:blkCostReg,
    costSql:_isHist?costPorSql:blkCostSql,
    sqlColor:_isHist?_sqlColor:_blkSqlColor,
    reg:_isHist?accReg:blkReg,
    sql:_isHist?accSql:blkSql,
    spent:_isHist?accSpent:blkSpent,
    cpm:_isHist?accCpm:blkCpm,
    cpc:_isHist?accCpc:blkCpc,
    dias:_isHist?diasHist:daysActive,
    tag:_isHist?'historico':('bloque '+(al?.version||'activo'))
  };

  document.getElementById('main-content').innerHTML=`
    <div class="zoom-in">
    <div class="topbar">
      <div></div>
      <div class="topbar-actions">
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteClient(${c.id})"></button>
      </div>
    </div>
    <div class="content">
      <button class="back-pill" onclick="backToFicha()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>volver a ${esc(c.name)}</button>
      ${(S.tab==='ventas'||S.tab==='ads'||S.tab==='integraciones'||S.tab==='alarmas') ? '' : `
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-bottom:10px">
        <span style="font-size:11px;color:var(--text3);margin-right:4px;text-transform:uppercase;letter-spacing:0.05em">Metricas:</span>
        <button class="btn btn-sm" onclick="setMetricsView('historico')" style="${_isHist?'border-color:rgba(29,158,117,0.5);color:var(--accent)':'color:var(--text3)'}">Historico</button>
        <button class="btn btn-sm" onclick="setMetricsView('bloque')" style="${!_isHist?'border-color:rgba(29,158,117,0.5);color:var(--accent)':'color:var(--text3)'}">Bloque activo</button>
      </div>
      <div class="metrics-row">
        <div class="metric-card"><div class="metric-label">Ad Spent</div><div class="metric-value">${_money(disp.spent)}</div></div>
        <div class="metric-card"><div class="metric-label">Registros</div><div class="metric-value">${disp.reg||0}</div></div>
        <div class="metric-card"><div class="metric-label">Costo / registro</div><div class="metric-value" style="color:${disp.costReg!==null?'var(--accent)':'#fff'}">${_money(disp.costReg)}</div><div class="metric-delta" style="color:var(--text3)">${disp.tag}</div></div>

function pickJourneyLead(c){
  const ops=(c.ghl&&c.ghl.opportunities)||[];
  if(!ops.length) return null;
  const won=ops.filter(function(o){return deriveEstado(o).label==='Ganado';});
  const sqls=ops.filter(function(o){return o._sql;});
  const pool=won.length?won:(sqls.length?sqls:ops);
  return pool.slice().sort(function(a,b){return new Date(b.createdAt||0)-new Date(a.createdAt||0);})[0];
}

function buildLeadJourneyStages(c, opp){
  const stages=[];
  const s0=opp.source||{};
  const created=opp.createdAt?new Date(opp.createdAt):new Date();
  const rules=getGhlRules(c);
  const stageN=_n(opp.pipelineStage);
  const inR=function(arr){return arr&&arr.length&&arr.indexOf(stageN)>=0;};
  const est=deriveEstado(opp);
  const won=est.label==='Ganado';

  // 1) Origen publicitario (si hay rastro del anuncio)
  const hasAdTrace=!!(s0.utmAd||s0.adId||s0.utmCampaign||s0.utmContent);
  const _landing=(s0.referrer&&/^https?:/.test(String(s0.referrer)))?String(s0.referrer):'';
  if(hasAdTrace){
    var campName=s0.utmCampaign||'';
    var al=getActiveLine(c.conversionLines||[]);
    ((al&&al.metaCampaigns)||[]).forEach(function(cp){ if(String(cp.id)===String(campName)) campName=cp.name||campName; });
    // buscar el preview del anuncio en el arbol sincronizado (por id o nombre)
    var adUrl='';
    ((al&&al.metaCampaigns)||[]).forEach(function(cp){
      ((cp.adsets)||[]).forEach(function(as){
        ((as.ads)||[]).forEach(function(ad){
          if(adUrl||!ad.previewUrl) return;
          var byId=s0.adId&&String(ad.id)===String(s0.adId);
          var un=_n(s0.utmAd||s0.utmContent||'');
          var an=_n(ad.name||'');
          var byName=un.length>=4&&an&&(an===un||an.indexOf(un)>=0||un.indexOf(an)>=0);
          if(byId||byName) adUrl=ad.previewUrl;
        });
      });
    });
    const f1=[];
    if(s0.utmAd||s0.utmContent) f1.push(['Anuncio', s0.utmAd||s0.utmContent]);
    if(campName) f1.push(['Campana', campName]);
    if(s0.utmSource) f1.push(['Fuente', s0.utmSource]);
    if(adUrl) f1.push(['Ver anuncio', adUrl]);
    else if(s0.adId&&c.metaAccountId) f1.push(['Ver anuncio', 'https://adsmanager.facebook.com/adsmanager/manage/ads?act='+c.metaAccountId+'&selected_ad_ids='+s0.adId]);
    else if(s0.adId) f1.push(['Ad ID', s0.adId]);
    if(_landing) f1.push(['Landing que vio', _landing]);
    stages.push({t:'Vio el anuncio', src:'Meta', date:created, approx:true, fields:f1});
  }

  // 2) Contacto creado (registro)
  const f2=[];
  const _fuente=(function(){
    var ref=String(s0.referrer||'').toLowerCase();
    var srcU=String(s0.utmSource||'').toLowerCase();
    var isMeta=srcU==='meta'||srcU==='facebook'||srcU==='instagram';
    var isFbRef=ref.indexOf('facebook.com')>=0||ref.indexOf('instagram.com')>=0;
    if(ref.indexOf('http')===0&&!isFbRef) return isMeta?'Landing (Meta)':'Landing';
    if(isMeta||isFbRef) return 'Meta';
    return s0.utmSource||'';
  })();
  if(_fuente) f2.push(['Fuente', _fuente]);
  const _geo=(opp.geo&&(opp.geo.location||opp.geo.timezone))||'';
  if(_geo) f2.push(['Ubicacion', _geo]);
  if(opp.contactEmail) f2.push(['Email', opp.contactEmail]);
  if(opp.contactPhone) f2.push(['Telefono', opp.contactPhone]);
  if(!hasAdTrace&&_landing) f2.push(['Landing que vio', _landing]);
  if(opp.tags&&opp.tags.length) f2.push(['Tags', opp.tags.join(', ')]);
  if(!f2.length) f2.push(['Contacto', opp.contactName||'-']);
  stages.push({t:'Contacto creado', src:'GHL', date:created, fields:f2});

  // 3) Etapas del funnel inferidas desde el stage actual + reglas
  const isSql=opp._sql||inR(rules.sql);
  const pastAgenda=inR(rules.agendas)||inR(rules.asistencias)||inR(rules.noShows)||inR(rules.llamadaEnVivo)||inR(rules.presentaciones)||won;
  const linkedCall=(c.fathomCalls||[]).find(function(cl){return cl.linkedOppId===opp.id;});
  const pastAsistencia=inR(rules.asistencias)||inR(rules.llamadaEnVivo)||inR(rules.presentaciones)||!!linkedCall||(won&&(rules.asistencias.length||rules.llamadaEnVivo.length));
  if(rules.agendas.length&&pastAgenda){
    stages.push({t:'Agendo llamada', src:'GHL', date:created, approx:true, fields:[['Como se infiere','El stage actual esta despues de la agenda en el pipeline']]});
  }
  if(pastAsistencia){
    stages.push({t:'Asistio (llamada en vivo)', src:'GHL', date:created, approx:true, fields:[['Como se infiere',linkedCall?'Hay una llamada de Fathom vinculada':'El stage actual implica que asistio']]});
  }
  if(isSql){
    stages.push({t:'Califico como SQL', src:'GHL', date:created, approx:true, fields:[['Criterio', opp._sql?'Marcado como SQL':'Stage dentro de las reglas de SQL']]});
  }
  if(linkedCall){
    const d=parseDDMMYYYY(linkedCall.date);
    stages.push({t:'Llamada (Fathom)', src:'Fathom', date:d||created,
      fields:[['Titulo',linkedCall.title||'-'],['Duracion',linkedCall.duration||'-'],['Sentiment',linkedCall.sentiment||'-']]});
  }
  if(rules.presentaciones.length&&(inR(rules.presentaciones)||won)){
    stages.push({t:'Presentacion de oferta', src:'GHL', date:created, approx:true, fields:[['Como se infiere', inR(rules.presentaciones)?'Stage actual de presentacion':'Se gano la oportunidad']]});
  }

  // 4) Estado actual
  const diasDesde=Math.floor((Date.now()-created.getTime())/86400000);
  stages.push({t:'Estado actual: '+est.label, src:'Conversion de ventas', date:new Date(),
    fields:[['Stage',opp.pipelineStage||'-'],['SQL',isSql?'Si':'No'],['Valor',opp.monetaryValue?('$'+Number(opp.monetaryValue).toLocaleString('en-US')):'-'],['Dias desde el registro',diasDesde]]});
  return stages;
}

function initLeadJourney3D(c, opp){
  const stages=buildLeadJourneyStages(c, opp);
  const n=stages.length;
  stages.forEach(function(s,i){
    const t=n>1?i/(n-1):0.5;
    s.pos={
      x:Math.round(-190+t*380),
      y:Math.round(Math.sin(i*2.1+0.6)*42),
      z:Math.round(Math.cos(i*1.3)*50)
    };
  });

  const bgStars=Array.from({length:30},function(){
    return {x:(Math.random()-0.5)*500,y:(Math.random()-0.5)*280,z:(Math.random()-0.5)*300-80,r:Math.random()*1.5+0.5};
  });

  let rotY=-14, rotX=-8, current=0;
  const world=document.getElementById('journey3d-world');
  const wrap=document.getElementById('journey3d-wrap');
  if(!world||!wrap) return;

  function fmtD(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }

  function detailHtml(i){
    const s=stages[i];
    const rows=s.fields.map(function(f){
      const v=String(f[1]);
      const isUrl=/^https?:\/\//.test(v);
      const val=isUrl
        ?'<a href="'+esc(v)+'" target="_blank" onclick="event.stopPropagation()" style="color:var(--accent);text-decoration:none;max-width:62%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;text-align:left">'+esc(v.replace(/^https?:\/\/(www\.)?/,''))+'</a>'
        :'<span style="color:var(--text)">'+esc(v)+'</span>';
      return '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:6px 0;border-top:1px solid var(--border);font-size:12px"><span style="color:var(--text3);white-space:nowrap">'+esc(f[0])+'</span>'+val+'</div>';
    }).join('');
    return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px">'
      +'<div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px">'
        +'<div style="font-size:13px;font-weight:500;color:var(--text)">'+esc(s.t)+'</div>'
        +'<div style="font-size:11px;color:var(--text3)">'+(s.approx?'inferido del recorrido':fmtD(s.date))+' &middot; '+esc(s.src)+'</div>'
      +'</div>'
      +rows
    +'</div>';
  }

  function render(){
    let html='';
    bgStars.forEach(function(st){
      html+='<div style="position:absolute;width:'+(st.r*2)+'px;height:'+(st.r*2)+'px;border-radius:50%;background:var(--text3);opacity:0.4;transform:translate3d('+st.x+'px,'+st.y+'px,'+st.z+'px)"></div>';
    });
    for(let i=0;i<stages.length-1;i++){
      const a=stages[i].pos,b=stages[i+1].pos;
      const len=Math.sqrt(Math.pow(b.x-a.x,2)+Math.pow(b.y-a.y,2)+Math.pow(b.z-a.z,2));
      const yaw=Math.atan2(b.z-a.z,b.x-a.x)*180/Math.PI;
      const horiz=Math.sqrt(Math.pow(b.x-a.x,2)+Math.pow(b.z-a.z,2));
      const pitch=Math.atan2(b.y-a.y,horiz)*180/Math.PI;
      html+='<div style="position:absolute;width:'+len+'px;height:1px;background:var(--border2);opacity:0.7;'
        +'transform:translate3d('+((a.x+b.x)/2)+'px,'+((a.y+b.y)/2)+'px,'+((a.z+b.z)/2)+'px) rotateY('+(-yaw)+'deg) rotateZ('+pitch+'deg);margin-left:'+(-len/2)+'px"></div>';
    }
    stages.forEach(function(s,i){
      const sel=i===current;
      const isLast=i===stages.length-1;
      const size=isLast?16:(sel?12:8);
      html+='<div data-idx="'+i+'" onclick="selectJourneyStage('+i+')" style="position:absolute;width:'+size+'px;height:'+size+'px;'
        +'margin-left:'+(-size/2)+'px;margin-top:'+(-size/2)+'px;border-radius:50%;cursor:pointer;'
        +'background:'+(isLast?'#f0c96a':(sel?'#1D9E75':'#888'))+';'
        +'box-shadow:0 0 '+(isLast?'14px 3px rgba(240,201,106,0.6)':(sel?'8px 2px rgba(29,158,117,0.6)':'none'))+';'
        +'transform:translate3d('+s.pos.x+'px,'+s.pos.y+'px,'+s.pos.z+'px)">'
        +'<div style="position:absolute;top:'+(size+4)+'px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:'+(sel?'var(--text)':'var(--text3)')+'">'+(i+1)+'. '+esc(s.t)+'</div>'
      +'</div>';
    });
    world.innerHTML=html;
    world.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';
  }

  window.selectJourneyStage=function(i){
    current=i;
    const detailEl=document.getElementById('journey3d-detail');
    if(detailEl) detailEl.innerHTML=detailHtml(i);
    render();
  };

  let dragging=false,lastX=0,lastY=0;
  wrap.onmousedown=function(e){dragging=true;lastX=e.clientX;lastY=e.clientY;wrap.style.cursor='grabbing';};
  window.addEventListener('mouseup',function(){dragging=false;if(wrap)wrap.style.cursor='grab';});
  window.addEventListener('mousemove',function(e){
    if(!dragging)return;
    rotY+=(e.clientX-lastX)*0.4; rotX-=(e.clientY-lastY)*0.3; rotX=Math.max(-45,Math.min(45,rotX));
    lastX=e.clientX;lastY=e.clientY;
    world.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';
  });
  wrap.ontouchstart=function(e){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;};
  wrap.ontouchmove=function(e){
    if(!dragging)return;
    rotY+=(e.touches[0].clientX-lastX)*0.4; rotX-=(e.touches[0].clientY-lastY)*0.3; rotX=Math.max(-45,Math.min(45,rotX));
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
    world.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';
    e.preventDefault();
  };
  wrap.ontouchend=function(){dragging=false;};

  render();
  selectJourneyStage(0);
}

      {label:'Costo por llamada calificada en vivo',get:l=>{const f=ghlFunnelForRange(c,l.dateStart,l.dateEnd);const spent=Number((l.metrics||{}).adSpent)||0;if(f&&f.calif!=null)return (f.calif>0&&spent)?'USD '+(spent/f.calif).toFixed(2):'<span style="color:var(--text3)">-</span>';const s=computeLineStats(c,l);return s.costoPorLlamadaCalificada!==null?'USD '+s.costoPorLlamadaCalificada.toFixed(2):'<span style="color:var(--text3)">-</span>';}},
      {label:'Ultima actualizacion',get:l=>l._lastRefresh?new Date(l._lastRefresh).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'-'}
    ];
    const sortedLive=[...c.liveLines].sort(function(a,b){
      return ((b.rolling?1:0)-(a.rolling?1:0)) || String(b.dateStart||'').localeCompare(String(a.dateStart||''));
    });

      +'<span id="live-refresh-status">'+(metaConfigured?'Actualizando datos en vivo de Meta y GHL...':'Meta no esta conectado para este cliente - solo se van a ver los datos de GHL. Conectalo con el boton de arriba.')+'</span>'
      +'</div>'
      +'<div class="cl-accordion">'
      +(sortedLive.length?sortedLive.map(function(l){
          const isCurrentWeek=!!l.rolling;
