<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLD — Agency Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-bg: #E1F5EE;
  --green-text: #0F6E56;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --amber-text: #854F0B;
  --red: #D85A30;
  --red-bg: #FCEBEB;
  --red-text: #A32D2D;
  --blue: #378ADD;
  --blue-bg: #E6F1FB;
  --blue-text: #185FA5;
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2)}
.main{flex:1;overflow-y:auto;background:var(--bg)}

.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-text{font-size:20px;font-weight:600;letter-spacing:-0.5px;color:#fff}
.logo-text span{color:var(--green)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.08em}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-label{font-size:10px;font-weight:500;color:var(--text3);padding:10px 8px 4px;text-transform:uppercase;letter-spacing:0.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;color:var(--text2);font-size:13px;font-weight:400;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--text);border-color:var(--border)}
.nav-item-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.nav-item-info{flex:1;min-width:0}
.nav-item-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item-sub{font-size:10px;color:var(--text3);margin-top:1px}
.health-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}

.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)}
.page-title{font-size:16px;font-weight:500;color:#fff}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px}
.topbar-actions{display:flex;gap:8px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font)}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark);border-color:var(--green-dark)}
.btn-ghost{border-color:transparent}
.btn-ghost:hover{background:var(--bg3);border-color:var(--border)}
.btn-danger{border-color:rgba(216,90,48,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(216,90,48,0.08)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}

.content{padding:20px 24px}

.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.metric-value{font-size:22px;font-weight:500;color:#fff;line-height:1}
.metric-delta{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}
.delta-neutral{color:var(--text3)}

.health-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.health-score-big{font-size:42px;font-weight:600;line-height:1;color:#fff;min-width:70px}
.health-score-big span{font-size:18px;font-weight:400;color:var(--text2)}
.health-right{flex:1}
.health-label-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.health-label-text{font-size:12px;color:var(--text2)}
.health-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.health-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(.4,0,.2,1)}
.health-ticks{display:flex;justify-content:space-between;margin-top:5px}
.health-tick{font-size:10px;color:var(--text3)}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.pill-green{background:rgba(29,158,117,0.15);color:#4ecfa0}
.pill-amber{background:rgba(186,117,23,0.15);color:#f0a830}
.pill-red{background:rgba(216,90,48,0.15);color:#f07050}
.pill-blue{background:rgba(55,138,221,0.15);color:#6aabf0}
.pill-gray{background:var(--bg4);color:var(--text2)}

.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text2);transition:all 0.15s;white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--text)}
.tab.active{color:#fff;border-bottom-color:var(--green);font-weight:500}

.cl-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)}
.cl-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.cl-table th{font-size:10px;font-weight:500;color:var(--text3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;background:var(--bg2)}
.cl-table .row-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;background:var(--bg2);padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap;border-right:1px solid var(--border)}
.cl-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.cl-table tr:last-child td,.cl-table tr:last-child .row-label{border-bottom:none}
.cl-table tr:hover td,.cl-table tr:hover .row-label{background:rgba(255,255,255,0.02)}
.active-col{background:rgba(29,158,117,0.04)}
.na{color:var(--text3);font-style:italic;font-size:11px}

.diag-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;transition:border-color 0.15s}
.diag-card:hover{border-color:var(--border2)}
.diag-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.diag-title-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.diag-title-text{font-size:13px;font-weight:500;color:#fff;line-height:1.4}
.diag-body{font-size:12px;color:var(--text2);line-height:1.7;margin-left:40px}

.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-left{display:flex;flex-direction:column;align-items:center;gap:0;padding-top:4px}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl-line{width:1px;flex:1;background:var(--border);margin-top:4px}
.tl-content{flex:1;padding-bottom:4px}
.tl-ver{font-size:13px;font-weight:500;color:#fff}
.tl-dates{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.tl-note{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.6}
.tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tl-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.2s}
.ov-card:hover{border-color:var(--border2);transform:translateY(-1px)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:580px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.modal-title{font-size:16px;font-weight:500;color:#fff;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.form-section{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green)}
.form-row select option{background:var(--bg3)}
.form-row input::placeholder{color:var(--text3)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Fix: date input color in dark mode */
.form-row input[type="date"]{color-scheme:dark}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:12px;color:var(--text);z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(.4,0,.2,1)}
.toast.show{transform:translateY(0);opacity:1}

.notes-area{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.7}
.notes-area strong{color:var(--text);font-weight:500}

.sync-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sync-info{font-size:12px;color:var(--text2)}
.sync-info strong{color:var(--text);font-weight:500}
.sync-actions{display:flex;gap:6px}

.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.4}

/* Success Tracker */
.st-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.st-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;position:relative;overflow:hidden}
.st-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.st-card.ok::before{background:#1D9E75}
.st-card.warn::before{background:#BA7517}
.st-card.danger::before{background:#D85A30}
.st-card.na::before{background:#555}
.st-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.st-name{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;line-height:1.4}
.st-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.st-badge.ok{background:rgba(29,158,117,0.15);color:#4ecfa0}
.st-badge.warn{background:rgba(186,117,23,0.15);color:#f0a830}
.st-badge.danger{background:rgba(216,90,48,0.15);color:#f07050}
.st-badge.na{background:var(--bg4);color:var(--text3)}
.st-val{font-size:24px;font-weight:500;color:#fff;line-height:1;margin-bottom:3px}
.st-val span{font-size:13px;font-weight:400;color:var(--text2)}
.st-target{font-size:11px;color:var(--text3)}
.st-target strong{color:var(--text2);font-weight:500}
.st-bar{margin-top:10px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.st-fill{height:100%;border-radius:2px}
.st-fill.ok{background:#1D9E75}
.st-fill.warn{background:#BA7517}
.st-fill.danger{background:#D85A30}
.st-guarantee{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:20px}
.st-g-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st-g-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:6px}
.st-g-fill{height:100%;border-radius:4px;background:#1D9E75;transition:width 0.6s}
.st-g-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.st-contract{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.st-upload{border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:20px;text-align:center;cursor:pointer;transition:background 0.15s;margin-bottom:16px}
.st-upload:hover{background:var(--bg3)}
.st-tl{position:relative;padding-left:26px}
.st-tl-line{position:absolute;left:7px;top:6px;bottom:0;width:1px;background:var(--border)}
.st-tl-dot{position:absolute;left:-22px;top:5px;width:9px;height:9px;border-radius:50%}
.st-tl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 13px;margin-bottom:16px}
.st-tl-card:hover{border-color:var(--border2)}
.st-tl-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.st-tl-title{font-size:13px;font-weight:500;color:#fff}
.st-tl-date{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.st-tl-body{font-size:12px;color:var(--text2);line-height:1.6}
.st-tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
/* Adsets & Ads */
.adset-block{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.adset-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.adset-name{font-size:13px;font-weight:500;color:#fff;flex:1}
.adset-audience{font-size:11px;color:var(--text3)}
.ads-list{padding:8px}
.ad-row{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.ad-row:last-child{margin-bottom:0}
.ad-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);cursor:pointer}
.ad-name{font-size:12px;font-weight:500;color:#fff;flex:1}
.ad-metrics-mini{display:flex;gap:10px;font-size:11px;color:var(--text2)}
.ad-metrics-mini span{display:flex;align-items:center;gap:3px}
.ad-body{padding:12px;border-top:1px solid var(--border);background:var(--bg)}
.ad-metrics-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.ad-metric{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.ad-metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.ad-metric-val{font-size:14px;font-weight:500;color:#fff}
.ad-guion{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.6}
.ad-guion strong{color:var(--text);font-weight:500}
.ad-link{font-size:11px;color:var(--green);text-decoration:none}
.ad-link:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">EV<span>OLD</span></div>
      <div class="logo-sub">Agency Dashboard</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-label">Vista</div>
      <div class="nav-item" id="nav-overview" onclick="showOverview()">
        <div class="nav-item-icon" style="background:#1a1a1a">⊞</div>
        <div class="nav-item-name">Panel general</div>
      </div>
      <div class="nav-label" style="margin-top:6px">Clientes</div>
      <div id="client-list"></div>
    </div>
    <div class="sidebar-bottom">
      <button class="btn btn-primary" onclick="openNewClientModal()" style="justify-content:center;width:100%">+ Nuevo cliente</button>
    </div>
  </div>

  <div class="main" id="main-content"></div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
const LS_KEY = 'evold-v1';
const COLORS = ['#1D9E75','#378ADD','#D85A30','#D4537E','#BA7517','#7F77DD'];
const BG_COLORS = ['rgba(29,158,117,0.15)','rgba(55,138,221,0.15)','rgba(216,90,48,0.15)','rgba(212,83,126,0.15)','rgba(186,117,23,0.15)','rgba(127,119,221,0.15)'];

const DEFAULT = {clients:[{
  id:1, name:'Suris Code', industry:'Tech / Desarrollo', avatar:'SC', color:0,
  health:{score:61,label:'En desarrollo',color:'amber'},
  monthlyLeads:16, monthlyBudget:370, avgCPL:23.18,
  conversionLines:[

     filtro:'ALTO',destino:'LP A/B',
     metrics:{adSpent:1518,pageViews:13773,cpm:2.47,cpc:0.09,optIn:0.10,cpl:108,registros:14,sql:2},

     filtro:'MEDIO',destino:'LP',
     metrics:{adSpent:153.38,pageViews:1200,cpm:10.73,cpc:0.31,optIn:0.33,cpl:38,registros:4,sql:null},
     status:'historico',notes:'Bajo filtro a MEDIO. Mejora en opt-in (0.10->0.33%). CPL baja de $108 a $38.'},
    {id:'l3',version:'Suris 1.2',dateStart:'2025-05-01',dateEnd:null,
     campaign:'Clientes potenciales meta forms',adset:'Meta Forms',ad:'AD "1" / "2"',
     filtro:'MEDIO',destino:'Meta Forms',
     metrics:{adSpent:370,pageViews:null,cpm:15.04,cpc:1.12,optIn:null,cpl:23.18,registros:16,sql:null},
     status:'activa',notes:'Cambio a Meta Forms. Mejor CPL ($23.18). Sin page views ni opt-in.'}
  ],
  diagnosis:[

const SHEET_ID = '1Rq06BLxfsWXbtlLskawouGr65xnxNkW8T5Ve2ijam9g';
const SHEETS_API = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/`;
const API_KEY = ''; // Set via openSyncConfigModal

// -- Fuzzy column resolver ----------------------------------------
// Normaliza a minusculas sin tildes para comparar
function _n(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

// Dado un objeto fila y una lista de terminos, devuelve el valor de la primera
// columna cuyo nombre (normalizado) contiene TODOS los terminos.
// Ejemplo: col(row, 'inversion','semanal') matchea "Inversion Semanal", "INVERSION SEMANAL", etc.
function col(row, ...terms){
  const nt = terms.map(_n);
  const key = Object.keys(row).find(k => nt.every(t => _n(k).includes(t)));
  return key != null ? row[key] : '';
}

function parseNum(v){
  if(v===null||v===undefined||v===''||v==='N/A'||v==='-') return null;
  const s = String(v).replace(/[$,%\s]/g,'').replace(',','.');
  const n = parseFloat(s);
  return isNaN(n)?null:n;
}

function colNum(row, ...terms){ return parseNum(col(row, ...terms)); }

function sumCol(rows, ...terms){ 
  let t=null; 
  rows.forEach(r=>{ const v=colNum(r,...terms); if(v!==null) t=(t||0)+v; }); 
  return t!==null?Math.round(t*100)/100:null; 
}
function avgCol(rows, ...terms){ 
  const vals=[]; 
  rows.forEach(r=>{ const v=colNum(r,...terms); if(v!==null) vals.push(v); }); 
  return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*100)/100:null; 
}

function isHeaderRow(row){
  const vals = row.map(c=>_n(c||''));
  return vals.some(v=>v==='cliente') && vals.some(v=>v==='semana'||v.includes('campa'));
}

async function fetchSheetBlocks(sheetName, apiKey){
  const range = encodeURIComponent(`${sheetName}!A1:AK300`);
  const url = `${SHEETS_API}${range}?key=${apiKey}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} para "${sheetName}"`);
  const data = await res.json();
  const rawRows = data.values || [];
  if(rawRows.length < 2) return [];

  const blocks = [];
  let pendingName = '';
  let i = 0;

  while(i < rawRows.length){
    const row = rawRows[i];
    if(isHeaderRow(row)){
      const headers = row;
      const name = pendingName || `Bloque ${blocks.length+1}`;
      pendingName = '';
      const dataRows = [];
      i++;
      let lastWeek='', lastCampaign='', lastAdset='';

      while(i < rawRows.length && !isHeaderRow(rawRows[i])){
        const r = rawRows[i];
        const nonEmpty = r.filter(c=>(c||'').trim()!=='');
        // Skip block-name rows (few non-empty cells, no $ or digits)
        if(nonEmpty.length <= 2 && nonEmpty.every(c=>!/[$0-9]/.test((c||'').trim()[0]||''))){
          if(nonEmpty.length > 0) pendingName = nonEmpty[0];
          i++; continue;
        }
        const obj={};
        headers.forEach((h,hi)=>obj[h]=(r[hi]||'').trim());
        // Propagar Semana, Campana, Adset, Anuncio usando col() fuzzy
        const semanaVal=col(obj,'semana');
        const campanaVal=col(obj,'campa');
        const adsetVal=col(obj,'adset');
        const anuncioVal=col(obj,'anuncio');
        if(semanaVal && /^W\d+$/i.test(semanaVal)) lastWeek=semanaVal;
        obj['_semana']=lastWeek;
        if(campanaVal) lastCampaign=campanaVal; obj['_campaign']=lastCampaign;
        if(adsetVal) lastAdset=adsetVal; obj['_adset']=lastAdset;
        obj['_anuncio']=anuncioVal;
        dataRows.push(obj);
        i++;
      }
      if(dataRows.length > 0) blocks.push({name, rows: dataRows});
    } else {
      const nonEmpty = row.filter(c=>(c||'').trim()!=='');
      if(nonEmpty.length > 0 && nonEmpty.length <= 3) pendingName = nonEmpty[0]||'';
      i++;
    }
  }
  return blocks;
}

async function fetchSheetData(sheetName, apiKey){
  const blocks = await fetchSheetBlocks(sheetName, apiKey);
  return blocks.flatMap(b=>b.rows);
}

// normKey/fuzzyGet/sumCol/avgCol replaced by col()/sumCol()/avgCol() above

async function syncClient(client, apiKey){
  const sheetName = client.sheetName || client.name;
  try {
    const blocks = await fetchSheetBlocks(sheetName, apiKey);
    if(!blocks.length) return {ok:false, msg:'Sin datos en el sheet'};

    let created=0, updated=0;

    for(const block of blocks){
      const {name, rows} = block;
      // Filas con anuncio especifico vs filas resumen (sin anuncio)
      const detailRows = rows.filter(r=>r._anuncio!=='');
      const summaryRows = rows.filter(r=>r._anuncio==='');
      const metricsSource = summaryRows.length ? summaryRows : detailRows;
      const cpmSource = detailRows.length ? detailRows : metricsSource;

      // adSpent: intenta fila resumen, si no suma filas de detalle
      const adSpentSummary = sumCol(metricsSource, 'inversion','semanal');
      const adSpentDetail  = sumCol(detailRows.length ? detailRows : rows, 'inversion','semanal');
      const metrics = {
        adSpent:   adSpentSummary || adSpentDetail,
        // Registros: usa 'registros' si existe, sino 'resultados' (Meta Forms)
        registros: sumCol(metricsSource, 'registros') || sumCol(metricsSource, 'resultados'),
        sql:       sumCol(metricsSource, 'sql'),
        pageViews: sumCol(metricsSource, 'visitas'),
        cpm:       avgCol(cpmSource,     'cpm'),
        cpc:       avgCol(cpmSource,     'cpc'),
        optIn:     avgCol(metricsSource, 'optin'),
        cpl:       avgCol(metricsSource, 'cpl'),
      };

      // Adsets & ads usando col() fuzzy
      const adsetMap = {};
      detailRows.forEach(row=>{
        const adsetName = (row._adset||'Adset').trim();
        const adName    = (row._anuncio||'').trim();
        if(!adName) return;
        const linkVal = col(row,'link');
        if(!adsetMap[adsetName]) adsetMap[adsetName]={name:adsetName,audience:'',ads:[]};
        adsetMap[adsetName].ads.push({
          name: adName, link: linkVal||'',
          cpl:         colNum(row,'cpl')||null,
          registros:   colNum(row,'registros')||null,
          ctr:         colNum(row,'ctr')||null,
          cpc:         colNum(row,'cpc')||null,
          impresiones: colNum(row,'frecuencia')||null,
          guion: ''
        });
      });
      const adsets = Object.values(adsetMap);

      const firstRow = rows[0]||{};
      const campaign = firstRow._campaign||'';
      const adset    = firstRow._adset||'';

      // Fechas: buscar la primera fila que tenga fecha de inicio
      const summaryRow = rows.find(r=>col(r,'fecha','inicio'))||firstRow;
      const dateStart = toInputDate(col(summaryRow,'fecha','inicio'), true);
      const dateEnd   = toInputDate(col(summaryRow,'fecha','fin'),    true);
      const isLatest = block === blocks[blocks.length-1];
      const blockKey = name.trim();

      const existingIdx = client.conversionLines.findIndex(l=>l.blockKey===blockKey);
      if(existingIdx>=0){
        const existing = client.conversionLines[existingIdx];
        Object.entries(metrics).forEach(([k,v])=>{if(v!==null) existing.metrics[k]=Math.round(v*100)/100;});
        const destVal = col(summaryRow,'destino'); if(destVal) existing.destino = destVal;
        existing.adsets = adsets;
        updated++;
      } else {
        if(isLatest) client.conversionLines.forEach(l=>{if(!l.blockKey) l.status='historico';});
        client.conversionLines.push({
          id: 'l'+Date.now()+Math.random().toString(36).slice(2),
          blockKey, version: blockKey,
          dateStart: dateStart||null, dateEnd: dateEnd||null,
          campaign, adset, ad:'', filtro:'MEDIO', destino: col(summaryRow,'destino')||'',
          metrics: {
            adSpent: metrics.adSpent, pageViews: metrics.pageViews,
            cpm: metrics.cpm, cpc: metrics.cpc,
            optIn: metrics.optIn, cpl: metrics.cpl,
            registros: metrics.registros, sql: metrics.sql
          },
          adsets,
          notes: `Importado desde sheet - ${blockKey}`,
          status: isLatest?'activa':'historico'
        });
        created++;
      }
    }

    // Para bloques historicos sin dateEnd, usar el dateStart del siguiente bloque
    const syncedLines = client.conversionLines.filter(l=>l.blockKey);
    syncedLines.forEach((l,i)=>{
      if(!l.dateEnd && i < syncedLines.length-1){
        const nextStart = syncedLines[i+1].dateStart;
        if(nextStart) l.dateEnd = nextStart;
      }
    });

    const latestLine = client.conversionLines[client.conversionLines.length-1];
    if(latestLine?.metrics){
      if(latestLine.metrics.registros) client.monthlyLeads = latestLine.metrics.registros;
      if(latestLine.metrics.cpl) client.avgCPL = latestLine.metrics.cpl;
      if(latestLine.metrics.adSpent) client.monthlyBudget = Math.round(latestLine.metrics.adSpent);
    }

    return {ok:true, msg:`${blocks.length} bloques - ${created} creados - ${updated} actualizados`};
  } catch(e){
    return {ok:false, msg:e.message};
  }
}

// Utils
function hc(c){return{green:'#1D9E75',amber:'#BA7517',red:'#D85A30',gray:'#555'}[c]||'#555'}
function pillClass(c){return{green:'pill-green',amber:'pill-amber',red:'pill-red',blue:'pill-blue',gray:'pill-gray'}[c]||'pill-gray'}
function days(s,e){if(!s)return null;const d=Math.floor((new Date(e||Date.now())-new Date(s))/86400000);return d>=0?d:0;}
function fmtDateRange(s,e){
  if(!s)return '-';
  const fmt=d=>{
    // Normalize to YYYY-MM-DD first, then format as DD/MM/YYYY
    const iso=toInputDate(d);
    if(!iso)return d;
    const [y,m,day]=iso.split('-');
    return `${day}/${m}/${y}`;
  };
  return fmt(s)+' -> '+(e?fmt(e):'hoy');
}

// FIX: Normalize any date format to YYYY-MM-DD for input[type=date]
function toInputDate(d, fromSheet){
  if(!d) return '';
  d = String(d).trim();
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  // MM/DD/YYYY - Google Sheets format (fromSheet=true)
  if(fromSheet && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){
    const [month,day,year]=d.split('/');
    return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  }
  // DD/MM/YYYY - manual input format
  if(!fromSheet && /^\d{2}\/\d{2}\/\d{4}$/.test(d)){
    const [day,month,year]=d.split('/');
    return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  }
  // DD-MM-YYYY
  if(/^\d{2}-\d{2}-\d{4}$/.test(d)){
    const [day,month,year]=d.split('-');
    return `${year}-${month}-${day}`;
  }
  // Try native Date parsing as last resort
  try{
    const dt=new Date(d);
    if(!isNaN(dt)){return dt.toISOString().split('T')[0];}
  }catch(e){}
  return '';
}

function fmtVal(v,t){
  if(v===null||v===undefined||v==='') return '<span class="na">N/A</span>';
  if(t==='$') return '$'+parseFloat(v).toFixed(2);
  if(t==='%') return parseFloat(v).toFixed(2)+'%';
  return String(v);
}

          </div>
        </div>`:`

            <button class="btn btn-primary btn-sm" onclick="saveDriveUrl(${c.id})">Guardar</button>

          <div style="font-size:11px;color:var(--text3);margin-top:5px">Tambien podes subir: <span style="color:var(--green);cursor:pointer" onclick="document.getElementById('contract-upload-${c.id}').click()">seleccionar archivo</span>
            <input id="contract-upload-${c.id}" type="file" accept=".pdf,.doc,.docx" style="display:none" onchange="uploadContract(${c.id},this)">
          </div>
        </div>`}

        ${contractLoaded && minDaily!==null ? `

        <div class="st-grid" style="grid-template-columns:repeat(2,1fr)">

            </div>

          </div>
        </div>
        <div class="st-guarantee">
          <div class="st-g-top">
            <div style="font-size:13px;font-weight:500;color:#fff">Progreso hacia garantia de ${contractDays} dias</div>

function gv(id,type){
  const v=document.getElementById(id)?.value;
  if(v===''||v===null||v===undefined)return null;
  if(type==='float')return parseFloat(v)||null;
  if(type==='int')return parseInt(v)||null;
  return v;
}

function saveLine(clientId, lineId){
  const c=DB.clients.find(x=>x.id===clientId);
  const isEdit=!!lineId;
  // FIX: normalize dates to YYYY-MM-DD on save
  const rawStart=gv('nl-start');
  const rawEnd=gv('nl-end');
  const data={
    id:lineId||('l'+Date.now()),
    version:gv('nl-ver')||('v'+(c.conversionLines.length+(isEdit?0:1))),
    dateStart:rawStart?toInputDate(rawStart):null,
    dateEnd:rawEnd?toInputDate(rawEnd):null,
    campaign:gv('nl-campaign')||'',adset:gv('nl-adset')||'',ad:gv('nl-ad')||'',
    filtro:gv('nl-filtro'),destino:gv('nl-dest'),
    metrics:{
      adSpent:gv('nl-spent','float'),pageViews:gv('nl-pv','int'),
      cpm:gv('nl-cpm','float'),cpc:gv('nl-cpc','float'),
      optIn:gv('nl-optin','float'),cpl:gv('nl-cpl','float'),
      registros:gv('nl-reg','int'),sql:gv('nl-sql','int')
    },
    notes:gv('nl-note')||'',
    adsets:getModalAdsets(),
    status:isEdit?(c.conversionLines.find(x=>x.id===lineId)?.status||'historico'):'activa'
  };
  if(!isEdit){
    c.conversionLines.forEach(l=>l.status='historico');
    c.conversionLines.push(data);
    const reg=data.metrics.registros||0,cpl=data.metrics.cpl||0;
    if(reg>0&&cpl>0){c.monthlyLeads=reg;c.avgCPL=cpl;c.monthlyBudget=Math.round(cpl*reg);}
  } else {
    const idx=c.conversionLines.findIndex(x=>x.id===lineId);
    if(idx>=0)c.conversionLines[idx]={...c.conversionLines[idx],...data};
  }
  save();closeModal();renderClient();toast(isEdit?'Linea actualizada OK':'Linea guardada OK');
}

      save();renderTab();
      return;
    }
    extractContractWithAI(clientId, {base64, name:f.name, type:f.type}, null);
  };
  reader.readAsDataURL(f);
}

async function extractContractWithAI(clientId, file, driveUrl){
  const c=DB.clients.find(x=>x.id===clientId);
  if(!c) return;
  // Check API key FIRST before anything
  const anthropicKey = localStorage.getItem('evold-anthropic-key')||'';
  if(!anthropicKey){
    openAnthropicKeyModal();
    // After modal closes, user must re-upload - clear the analyzing state
    if(c.contract) { c.contract._analyzing=false; }
    save(); renderTab();
    return;
  }
  // Mark as analyzing in UI
  if(c.contract) c.contract._analyzing=true;
  save(); renderTab();
  toast('Analizando contrato con IA...');
  try {
    let messages;
    if(file){
      messages=[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:file.type||'application/pdf',data:file.base64}},
        {type:'text',text:'Extrae del contrato los siguientes campos y responde SOLO con un JSON valido sin markdown ni texto extra: { "minDailyBudget": numero en USD por dia, "minOCsMonth": numero de OCs/registros calificados garantizados por mes, "totalOCs": numero total de OCs garantizadas en el contrato, "durationDays": duracion del contrato en dias, "startDate": fecha de firma en formato YYYY-MM-DD o null, "endDate": fecha de vencimiento en formato YYYY-MM-DD o null, "signDate": fecha de firma en formato DD/MM/YYYY o null }'}
      ]}];
    } else {
      // Drive URL - can't access directly, skip AI and let user fill manually
      const c2=DB.clients.find(x=>x.id===clientId);
      if(c2){const el=document.getElementById('st-analyzing-'+clientId);if(el)el.closest('div').remove();}
      toast('Contrato vinculado. Completa las condiciones manualmente.');
      return;
    }
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:600,messages})
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(`API ${res.status}: ${err?.error?.message||res.statusText}`);
    }
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    let extracted;
    try{ extracted=JSON.parse(clean); }
    catch(pe){ throw new Error('Respuesta invalida del modelo: '+text.slice(0,100)); }
    Object.entries(extracted).forEach(([k,v])=>{if(v!==null&&v!==undefined) c.contract[k]=v;});
    c.contract._analyzing=false;
    save();renderTab();
    toast('Contrato analizado OK');
  } catch(e){
    if(c.contract) c.contract._analyzing=false;
    save();renderTab();
    toast('Error: '+e.message,'red');
    console.error('Contract AI error:',e);
  }
}

function fathomCallsHTML(c){
  const calls = c.fathomCalls||[];
  if(!calls.length){
    return '<div style="background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:20px;text-align:center">'

      +'</div>';
  }
  const lastCall = calls[0];
  const pendingItems = calls.reduce(function(s,cl){return s+(cl.actionItems?cl.actionItems.length:0);},0);
  const satisfied = calls.filter(function(cl){return cl.sentiment==='satisfecho';}).length;
  const sentiment = satisfied/calls.length>=0.6?'Activo':'En riesgo';
  const sentColor = sentiment==='Activo'?'#1D9E75':'#BA7517';

    +'<div style="background:var(--bg2);border-radius:var(--radius-md);padding:10px 12px;text-align:center"><div style="font-size:18px;font-weight:500;color:var(--text)">'+pendingItems+'</div><div style="font-size:10px;color:var(--text3)">Action items</div></div>'
    +'<div style="background:var(--bg2);border-radius:var(--radius-md);padding:10px 12px;text-align:center"><div style="font-size:14px;font-weight:500;color:var(--text)">'+(lastCall?lastCall.date:'--')+'</div><div style="font-size:10px;color:var(--text3)">Ultima llamada</div></div>'
    +'</div>';
  calls.slice(0,3).forEach(function(cl){
    var bg = cl.sentiment==='satisfecho'?'rgba(29,158,117,0.15)':'rgba(186,117,23,0.15)';
    var col = cl.sentiment==='satisfecho'?'#4ecfa0':'#f0a830';
    var label = cl.sentiment==='satisfecho'?'Satisfecho':'Atencion';
    html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px">'
      +'<div style="width:30px;height:30px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#0F6E56">'+(cl.initials||'?')+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;color:var(--text)">'+cl.title+'</div>'
      +'<div style="font-size:10px;color:var(--text3)">'+cl.date+' - '+cl.duration+'</div></div>'
      +'<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;background:'+bg+';color:'+col+'">'+label+'</span>'
      +'</div>';
  });
  if(calls.length>3) html += '<div style="font-size:11px;color:var(--text3);margin-top:4px">'+(calls.length-3)+' llamadas mas</div>';
  return html;
}

function importFathomJSON(clientId){
  const c=DB.clients.find(x=>x.id===clientId);
  if(!c) return;
  const raw=document.getElementById('fathom-json-input').value.trim();
  let calls=[];
  try{
    const clean=raw.replace(/` + '```' + `json|` + '```' + `/g,'').trim();
    calls=JSON.parse(clean);
    if(!Array.isArray(calls)) throw new Error();
  }catch(e){
    toast('JSON invalido, revisa el formato','red');
    return;
  }
  if(!calls.length){toast('No hay llamadas en el JSON','red');return;}
  c.fathomCalls=calls;
  const existingIds=new Set((c.milestones||[]).map(m=>m.fathomId).filter(Boolean));
  const newMilestones=calls
    .filter(cl=>!existingIds.has(cl.id))
    .map(cl=>({
      type:cl.sentiment==='satisfecho'?'hito':'alerta',
      title:cl.title,
      date:cl.date,
      body:cl.summary+(cl.actionItems&&cl.actionItems.length?'\n\nAction items: '+cl.actionItems.join(', '):'')+(cl.riskFlags&&cl.riskFlags.length?'\n\nRiesgos: '+cl.riskFlags.join(', '):''),
      tags:[cl.sentiment==='satisfecho'?'Llamada':'Llamada - atencion',cl.duration].filter(Boolean),
      fathomId:cl.id
    }));
  if(!c.milestones) c.milestones=[];
  c.milestones=[...c.milestones,...newMilestones];
  c.milestones.sort((a,b)=>b.date.split('/').reverse().join('').localeCompare(a.date.split('/').reverse().join('')));
  save();closeModal();renderTab();
  toast(calls.length+' llamadas importadas');
}

      rango: (l.dateStart||'?')+' a '+(l.dateEnd||'actual'),
      campana: l.campaign||'-',
      filtro: l.filtro||'-',
      destino: l.destino||'-',
      adSpent: m.adSpent, cpl: m.cpl, cpm: m.cpm, cpc: m.cpc,
      optIn: m.optIn, registros: m.registros, sql: m.sql, pageViews: m.pageViews,
      nota: l.notes||''
    };
  });
  const hitos = (c.milestones||[]).map(function(h){
    return { tipo:h.type, titulo:h.title, fecha:h.date, detalle:h.body||'' };
  });
  const llamadas = (c.fathomCalls||[]).map(function(cl){
    return {
      titulo: cl.title, fecha: cl.date, sentiment: cl.sentiment,
      resumen: cl.summary||'',
      actionItems: cl.actionItems||[],
      riesgos: cl.riskFlags||[]
    };
  });
  return {
    cliente: c.name,
    tipo: c.subtitle||'',
    objetivos: {
      inversionDiariaMin: contract.minDailyBudget||null,
      ocsMensualesGarantizadas: contract.minOCsMonth||null,
      ocsTotalesGarantizadas: contract.totalOCs||null,
      duracionDias: contract.durationDays||null,
      cplObjetivo: c.targetCPL||null,
      fechaFirma: contract.signDate||null,
      vencimiento: contract.endDate||null
    },
    lineasDeConversion: lines,
    hitosYCambios: hitos,
    llamadas: llamadas
  };
}

async function generateCallReport(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c) return;
  const anthropicKey = localStorage.getItem('evold-anthropic-key')||'';
  if(!anthropicKey){ openAnthropicKeyModal(); return; }

  const ctx = buildReportContext(c);
  toast('Generando reporte con IA...');
  const btnLabel = 'Generando...';
  // Lightweight loading modal
  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay"><div class="modal" style="max-width:520px">'
    +'<div class="modal-title">Generando reporte</div>'
    +'<div class="modal-sub">Claude esta analizando objetivos, hitos, cambios y llamadas de '+c.name+'...</div>'
    +'</div></div>';

  const prompt = 'Sos un analista de una agencia de performance marketing. A partir del siguiente contexto de un cliente '
    +'(objetivos contractuales, lineas de conversion con sus metricas y notas de que cambio en cada bloque, hitos y cambios, '
    +'y resumenes de llamadas con su sentiment, action items y riesgos), genera un reporte claro y accionable para presentar '
    +'en la proxima llamada con el cliente. Tono profesional, directo, orientado a resultados, en espanol rioplatense neutro. '
    +'Apoyate en los numeros concretos del contexto (CPL, OCs, inversion) y comparalos contra los objetivos. '
    +'Responde SOLO con un JSON valido, sin markdown ni texto extra, con esta forma exacta:\n'
    +'{ "titulo": "string", "periodo": "string corto del rango analizado", "secciones": [ '
    +'{ "titulo": "Resumen ejecutivo", "items": ["string"] }, '
    +'{ "titulo": "Performance vs objetivos", "items": ["string"] }, '
    +'{ "titulo": "Que cambio desde la ultima llamada", "items": ["string"] }, '
    +'{ "titulo": "Riesgos y puntos de atencion", "items": ["string"] }, '
    +'{ "titulo": "Proximos pasos", "items": ["string"] }, '
    +'{ "titulo": "Puntos para hablar en la llamada", "items": ["string"] } ] }\n'
    +'Cada item es una frase concreta. Si falta informacion para una seccion, incluila igual con un item que lo aclare. '
    +'No inventes numeros que no esten en el contexto.\n\nCONTEXTO:\n'
    + JSON.stringify(ctx, null, 1);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:2500,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!res.ok){
      const err=await res.json().catch(function(){return {};});
      throw new Error('API '+res.status+': '+((err&&err.error&&err.error.message)||res.statusText));
    }
    const data=await res.json();
    const text=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    let report;
    try{ report=JSON.parse(clean); }
    catch(pe){ throw new Error('Respuesta invalida del modelo'); }
    report.generatedAt = new Date().toLocaleDateString('es-AR');
    c.lastReport = report;
    save();
    showCallReport(clientId);
    toast('Reporte generado OK');
  } catch(e){
    closeModal();
    toast('Error: '+e.message,'red');
    console.error('Report AI error:',e);
  }
}

function reportToPlainText(r){
  let out = (r.titulo||'Reporte')+'\n';
  if(r.periodo) out += 'Periodo: '+r.periodo+'\n';
  out += '\n';
  (r.secciones||[]).forEach(function(s){
    out += (s.titulo||'').toUpperCase()+'\n';
    (s.items||[]).forEach(function(it){ out += '  - '+it+'\n'; });
    out += '\n';
  });
  return out.trim();
}

function showCallReport(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.lastReport) return;
  const r=c.lastReport;
  const esc=function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
  let secHtml='';
  (r.secciones||[]).forEach(function(s){
    secHtml += '<div style="margin-bottom:16px">'
      +'<div style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">'+esc(s.titulo)+'</div>'
      +'<ul style="margin:0;padding-left:18px;display:flex;flex-direction:column;gap:6px">'
      +(s.items||[]).map(function(it){return '<li style="font-size:13px;color:var(--text2);line-height:1.55">'+esc(it)+'</li>';}).join('')
      +'</ul></div>';
  });
  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="max-width:680px;max-height:85vh;display:flex;flex-direction:column">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'
    +'<div><div class="modal-title">'+esc(r.titulo||('Reporte - '+c.name))+'</div>'
    +'<div class="modal-sub">'+esc(r.periodo||'')+(r.generatedAt?' - generado '+esc(r.generatedAt):'')+'</div></div>'
    +'</div>'
    +'<div style="overflow-y:auto;margin:14px 0;padding-right:6px;flex:1">'+secHtml+'</div>'
    +'<div class="modal-footer">'
    +'<button class="btn" onclick="closeModal()">Cerrar</button>'
    +'<button class="btn" onclick="downloadCallReport('+clientId+')">Descargar .txt</button>'
    +'<button class="btn btn-primary" onclick="copyCallReport('+clientId+')">Copiar</button>'
    +'</div></div></div>';
}

function copyCallReport(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.lastReport) return;
  const txt=reportToPlainText(c.lastReport);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('Reporte copiado OK');},function(){toast('No se pudo copiar','red');});
  } else {
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast('Reporte copiado OK');}catch(e){toast('No se pudo copiar','red');}
    document.body.removeChild(ta);
  }
}

function downloadCallReport(clientId){
  const c=DB.clients.find(function(x){return x.id===clientId;});
  if(!c||!c.lastReport) return;
  const txt=reportToPlainText(c.lastReport);
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='reporte-'+(c.name||'cliente').toLowerCase().replace(/\s+/g,'-')+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Reporte descargado');
}

// Init
load();renderSidebar();showOverview();
</script>
